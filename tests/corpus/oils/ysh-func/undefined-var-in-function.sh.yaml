disabled: true
name: Undefined var in function
dialect: bash
source: oils:spec/ysh-func#undefined-var-in-function
status: 1
stdout: "\n"
---

func g(x) {
  var z = y  # make sure dynamic scope is off
  return (x + z) 
}

func f() {
  var y = 42  # if dynamic scope were on, g() would see this
  return (g(0))
}

echo $[f()]
