name: Retrieve sparse array indices with ${!a}
dialect: bash
source: oils:spec/array#retrieve-sparse-array-indices-with-a
stdout: |
  ['99']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
a=()
(( a[99]=1 ))
argv.py "${!a[@]}"
