disabled: true
name: pipeline (nondeterministic)
dialect: bash
source: oils:spec/ysh-xtrace#pipeline-nondeterministic
stdout: |
  2
stderr: |2-
        . 12345 builtin echo 1
        . 12345 builtin echo 2
      . 12345 exec sort
      < 12345 proc myfunc
      > 12345 proc myfunc
    ; process 12345: status 0
    ; process 12345: status 0
    ; process 12345: status 0
    | command 12345: wc -l
    | part 12345
    | part 12345
  . builtin ':' begin
  . builtin set '+x'
  < pipeline
  > pipeline
---
shopt --set ysh:upgrade
set -x

myfunc() {
  echo 1
  echo 2
}

{
  : begin
  myfunc | sort | wc -l
  set +x
} 2>err.txt

do_sort=1

if test -n $do_sort; then
  # SORT for determinism
  sed --regexp-extended 's/[[:digit:]]{2,}/12345/g; s|/fd/.|/fd/N|g' err.txt | 
    LC_ALL=C sort >&2
else
  cat err.txt
fi
