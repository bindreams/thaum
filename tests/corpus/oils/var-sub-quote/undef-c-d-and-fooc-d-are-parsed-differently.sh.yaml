name: "\"${undef-'c d'}\" and \"${foo%'c d'}\" are parsed differently"
dialect: bash
source: oils:spec/var-sub-quote#undef-c-d-and-fooc-d-are-parsed-differently
stdout: |
  ["'c d'", "'c  d'"]
  ['c d', 'c  d']
  ---
  ['a b ', 'a b c d']
  ['a b zzz', 'a b c d']
  ['a b zzz', 'a b c d']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

# quotes are LITERAL here
argv.py "${undef-'c d'}" "${undef-'c  d'}"
argv.py ${undef-'c d'} ${undef-'c  d'}

echo ---

# quotes are RESPECTED here
foo='a b c d'
argv.py "${foo%'c d'}" "${foo%'c  d'}"

case $SH in dash) exit ;; esac

argv.py "${foo//'c d'/zzz}" "${foo//'c  d'/zzz}"
argv.py "${foo//'c d'/'zzz'}" "${foo//'c  d'/'zzz'}"
