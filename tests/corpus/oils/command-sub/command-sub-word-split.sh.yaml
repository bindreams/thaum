name: Command Sub word split
dialect: bash
source: oils:spec/command-sub#command-sub-word-split
stdout: "['hi', 'there', 'hi there']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
argv.py $(echo 'hi there') "$(echo 'hi there')"
