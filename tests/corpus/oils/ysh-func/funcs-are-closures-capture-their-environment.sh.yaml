disabled: true
name: Funcs are closures (capture their environment)
dialect: bash
source: oils:spec/ysh-func#funcs-are-closures-capture-their-environment
stdout: |-
  x = 43
---

func makeFunc() {
  var x = 42
  func inner() {
    echo "x = $x"
  }
  setvar x += 1
  return (inner)
}

const f = makeFunc()
call f()
