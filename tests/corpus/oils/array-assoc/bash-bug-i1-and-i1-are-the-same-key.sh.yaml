name: 'bash bug: "i+1" and i+1 are the same key'
dialect: bash
source: oils:spec/array-assoc#bash-bug-i1-and-i1-are-the-same-key
status: 1
stdout: |-
  array[i]=6
  array[i+1]=7
---

i=1
array=(5 6 7)
echo array[i]="${array[i]}"
echo array[i+1]="${array[i+1]}"

# arithmetic does NOT work here in bash.  These are unquoted strings!
declare -A assoc
assoc[i]=$i
assoc[i+1]=$i+1

assoc["i"]=string
assoc["i+1"]=string+1

echo assoc[i]="${assoc[i]}" 
echo assoc[i+1]="${assoc[i+1]}"

echo assoc[i]="${assoc["i"]}" 
echo assoc[i+1]="${assoc["i+1"]}"
