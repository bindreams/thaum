disabled: true
name: use builtin usage
dialect: bash
source: oils:spec/ysh-builtin-module#use-builtin-usage
stdout: |
  no-arg=2
  one-arg=1
  extern=0
  bad-flag=2
  too-many=2
  no-builtin=1
---

use
echo no-arg=$?

use foo
echo one-arg=$?

use --extern foo
echo extern=$?

use --bad-flag
echo bad-flag=$?

use too many
echo too-many=$?

use ///no-builtin
echo no-builtin=$?
