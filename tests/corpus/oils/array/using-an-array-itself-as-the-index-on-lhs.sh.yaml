name: Using an array itself as the index on LHS
dialect: bash
source: oils:spec/array#using-an-array-itself-as-the-index-on-lhs
status: 0
stdout: |
  ['42', '99', '42', '99', '']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
shopt -u strict_arith
a[a]=42
a[a]=99
argv.py "${a[@]}" "${a[0]}" "${a[42]}" "${a[99]}"
