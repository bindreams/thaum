name: Try to append list to element
dialect: bash
source: oils:spec/append#try-to-append-list-to-element
status: 2
stdout: ''
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
