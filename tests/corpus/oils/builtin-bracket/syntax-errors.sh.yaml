name: '] syntax errors'
dialect: bash
source: oils:spec/builtin-bracket#syntax-errors
stdout: |-
  status=2
  status=1
  status=2
  status=2
  status=2
---
[
echo status=$?
test  # not a syntax error
echo status=$?
[ -n x  # missing ]
echo status=$?
[ -n x ] y  # extra arg after ]
echo status=$?
[ -n x y  # extra arg
echo status=$?
