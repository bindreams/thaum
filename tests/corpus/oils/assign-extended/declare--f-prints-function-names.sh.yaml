name: declare -F prints function names
dialect: bash
source: oils:spec/assign-extended#declare--f-prints-function-names
stdout: "declare -f __ec\ndeclare -f _ab\ndeclare -f add\ndeclare -f div\ndeclare
  -f ek\n"
---
add () { expr 4 + 4; }
div () { expr 6 / 2; }
ek () { echo hello; }
__ec () { echo hi; }
_ab () { expr 10 % 3; }

declare -F
