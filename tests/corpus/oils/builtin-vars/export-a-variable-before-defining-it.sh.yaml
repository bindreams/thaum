name: Export a variable before defining it
dialect: bash
source: oils:spec/builtin-vars#export-a-variable-before-defining-it
stdout: "u\n"
setup: |
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py

---
export U
U=u
printenv.py U
