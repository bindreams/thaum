disabled: true
name: shell array :| a 'b c' |
dialect: bash
source: oils:spec/ysh-list#shell-array-a-b-c
stdout: "['/', 'a', 'b c', '/']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
shopt -s parse_at
var x = :| a 'b c' |
var empty = :||
argv.py / @x @empty /
