name: getopts with invalid flag
dialect: bash
source: oils:spec/builtin-getopts#getopts-with-invalid-flag
status: 2
stdout: |
  ERROR 3
---
set -- -h -x
while getopts "hc:" opt; do
  case $opt in
    h) FLAG_h=1 ;;
    c) FLAG_c="$OPTARG" ;;
    '?') echo ERROR $OPTIND; exit 2; ;;
  esac
done
echo status=$?
