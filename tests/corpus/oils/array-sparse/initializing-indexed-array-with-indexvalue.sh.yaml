name: Initializing indexed array with ([index]=value)
dialect: bash
source: oils:spec/array-sparse#initializing-indexed-array-with-indexvalue
stdout: "status=0\n['3']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
case $SH in mksh) exit 99 ;; esac
declare -a a=([xx]=1 [yy]=2 [zz]=3)
echo status=$?
argv.py "${a[@]}"
