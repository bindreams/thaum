name: Truncating 'return' status
dialect: bash
source: oils:spec/exit-status#truncating-return-status
stdout: |-
  status=255
  status=0
  status=1
  ===
  status=255
  status=254
---
f() { return 255; }; f
echo status=$?

f() { return 256; }; f
echo status=$?

f() { return 257; }; f
echo status=$?

echo ===

f() { return -1; }; f
echo status=$?

f() { return -2; }; f
echo status=$?


# dash aborts on bad exit code
