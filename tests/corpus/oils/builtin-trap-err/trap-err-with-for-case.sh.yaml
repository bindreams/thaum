name: trap ERR with for,  case, { }
dialect: bash
source: oils:spec/builtin-trap-err#trap-err-with-for-case
stdout: |-
  line=4
  line=4
  line=8
  line=12
  line=12
  line=12
  ok
---

trap 'echo line=$LINENO' ERR

for y in 1 2; do
  false
done

case x in
  x) false ;;
  *) false ;;
esac

{ false; false; false; }
echo ok
