name: When GLOBIGNORE is set, glob may become empty (nullglob too)
dialect: bash
source: 
  oils:spec/globignore#when-globignore-is-set-glob-may-become-empty-nullglob-too
stdout: |
  -foo.txt foo.txt
  *t
  nullglob
---
touch -- foo.txt -foo.txt

echo *t

GLOBIGNORE=*.txt
echo *t

shopt -s nullglob
echo nullglob *t
