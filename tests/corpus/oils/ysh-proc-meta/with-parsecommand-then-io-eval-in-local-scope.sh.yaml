disabled: true
name: with parseCommand() then io->eval(), in local scope
dialect: bash
source: oils:spec/ysh-proc-meta#with-parsecommand-then-io-eval-in-local-scope
stdout: |
  in-proc a
  in-proc b
  global a
  global b
---

proc p {
  var result = {}
  for param in a b {
    var s = """
    proc echo_$param (prefix) {
      echo \$prefix $param
    }
    """
    var cmd = parseCommand(s)
    #pp test_ (cmd)
    #pp asdl_ (cmd)

    # note: this creates its own frame, unlike 'eval'
    # call io->eval(cmd)

    var d = io->eval(cmd, to_dict=true)

    # bind my_echo_a globally
    call setVar("my_echo_$param", d["echo_$param"], global=true)
  }

  #= dict(vm.getFrame(0))

  my_echo_a in-proc
  my_echo_b in-proc
}

p

my_echo_a global
my_echo_b global
