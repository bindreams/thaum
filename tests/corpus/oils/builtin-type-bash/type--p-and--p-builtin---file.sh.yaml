name: type -p and -P builtin -> file
dialect: bash
source: oils:spec/builtin-type-bash#type--p-and--p-builtin---file
stdout: |-
  /tmp/mv
  /tmp/tar
  /tmp/grep
  --
  /tmp/mv
  /tmp/tar
  /tmp/grep
---
touch /tmp/{mv,tar,grep}
chmod +x /tmp/{mv,tar,grep}
PATH=/tmp:$PATH

type -p mv tar grep
echo --
type -P mv tar grep
