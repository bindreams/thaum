disabled: true
name: List insert() negative overflow
dialect: bash
source: oils:spec/ysh-list#list-insert-negative-overflow
stdout: |
  pass
---
shopt -s ysh:all

var l = :| foo bar |

for pos in ([-2, -3, -4]) {
  call l->insert(pos, str(pos))
}
assert [ :| -4 -3 -2 foo bar | === l ]

call l->insert(-100, "zzz")
assert [ :| zzz -4 -3 -2 foo bar | === l ]

echo pass
