name: Arith lexer mode
dialect: bash
source: oils:spec/for-expr#arith-lexer-mode
stdout: |-
  3
  4
  3
  4
  3
  4
  3
  4
---

# bash is lenient; zsh disagrees

for ((i = '3';  i < '5';  ++i)); do echo $i; done
for ((i = "3";  i < "5";  ++i)); do echo $i; done
for ((i = $'3'; i < $'5'; ++i)); do echo $i; done
for ((i = $"3"; i < $"5"; ++i)); do echo $i; done
