disabled: true
name: 'proc eval string: return'
dialect: bash
source: oils:spec/ysh-control-flow#proc-eval-string-return
stdout: |
  one
  end func
---
shopt -s ysh:all

proc proc-that-evals (s) {
  eval $s
}

f() {
  proc-that-evals '
    echo one
    return
    echo two
  '
  # this is reached because we're returning of proc-that-evals
  echo 'end func'
}
f
