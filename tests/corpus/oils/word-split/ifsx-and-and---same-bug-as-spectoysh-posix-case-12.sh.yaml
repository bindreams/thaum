name: "IFS=x and '' and $@ - same bug as spec/toysh-posix case #12"
dialect: bash
source: oils:spec/word-split#ifsx-and-and---same-bug-as-spectoysh-posix-case-12
stdout: "  $*   -one- -two-\n \"$*\"  -one  two-\n  $@   -one- -two-\n \"$@\"  -one-
  -- -two-\n['  $*  ', 'one', 'two']\n[' \"$*\" ', 'onezztwo']\n['  $@  ', 'one',
  'two']\n[' \"$@\" ', 'one', '', 'two']\n"
---
case $SH in yash) exit ;; esac  # no echo -n

setopt SH_WORD_SPLIT  # for zsh

set -- one '' two

IFS=zx
echo -n '  $*  ';  for i in  $*;  do echo -n ' '; echo -n -$i-; done; echo
echo -n ' "$*" ';  for i in "$*"; do echo -n ' '; echo -n -$i-; done; echo
echo -n '  $@  ';  for i in  $@;  do echo -n ' '; echo -n -$i-; done; echo
echo -n ' "$@" ';  for i in "$@"; do echo -n ' '; echo -n -$i-; done; echo

argv.py '  $*  '  $*
argv.py ' "$*" ' "$*"
argv.py '  $@  '  $@
argv.py ' "$@" ' "$@"
