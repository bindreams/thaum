name: compadjust with empty COMP_ARGV
dialect: bash
source: oils:spec/builtin-completion#compadjust-with-empty-compargv
stdout: "[]\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
case $SH in bash) exit ;; esac

COMP_ARGV=()
compadjust words
argv.py "${words[@]}"
