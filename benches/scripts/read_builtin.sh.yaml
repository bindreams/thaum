dialect: posix
setup: |
  #!/usr/bin/env python3
  import random
  random.seed(42)
  chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
  with open('data.txt', 'w') as f:
      for _ in range(1_000_000):
          f.write(''.join(random.choices(chars, k=1000)) + '\n')
---
count=0
while read LINE; do
    count=$((count + 1))
done < data.txt
echo "read $count lines"
