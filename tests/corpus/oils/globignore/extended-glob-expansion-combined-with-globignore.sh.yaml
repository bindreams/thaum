name: Extended glob expansion combined with GLOBIGNORE
dialect: bash
source: oils:spec/globignore#extended-glob-expansion-combined-with-globignore
stdout: |-
  bar.cc bar.h foo.cc foo.h
  bar.cc bar.h
---
shopt -s extglob

touch foo.cc foo.h bar.cc bar.h 
echo @(*.cc|*.h)
GLOBIGNORE=foo.*
echo @(*.cc|*.h)
