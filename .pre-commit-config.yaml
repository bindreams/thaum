repos:
  - repo: local
    hooks:
      - id: no-std-test
        name: no stray #[test] attribute
        entry: '^#\[test\]$'
        language: pygrep
        types: [rust]

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --features cli -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
