name: Env binding can use preceding bindings, but not subsequent ones
dialect: bash
source: 
  oils:spec/assign#env-binding-can-use-preceding-bindings-but-not-subsequent-ones
stdout: |
  foo
  [foo][]
  baz
  ## BUG mksh STDOUT:
  foo
  [][]
  baz
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
# This means that for ASSIGNMENT_WORD, on the RHS you invoke the parser again!
# Could be any kind of quoted string.
FOO="foo" BAR="[$FOO][$BAZ]" BAZ=baz printenv.py FOO BAR BAZ
