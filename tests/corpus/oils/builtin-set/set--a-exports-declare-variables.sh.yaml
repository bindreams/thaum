name: set -a exports declare variables
dialect: bash
source: oils:spec/builtin-set#set--a-exports-declare-variables
stdout: |
  zzz
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
set -a
declare ZZZ=zzz
printenv.py ZZZ
