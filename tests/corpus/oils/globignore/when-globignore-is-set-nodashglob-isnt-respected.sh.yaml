name: When GLOBIGNORE is set, no_dash_glob isn't respected
dialect: bash
source: oils:spec/globignore#when-globignore-is-set-nodashglob-isnt-respected
stdout: |-
  _tmp foo.txt
  -foo.txt _tmp
---
case $SH in bash) exit ;; esac

touch -- foo.txt -foo.txt

shopt -s no_dash_glob  # YSH option

echo *  # expansion does NOT include -foo.txt

GLOBIGNORE=f*.txt
echo *  # expansion includes -foo.txt, because it doesn't match GLOBIGNORE
