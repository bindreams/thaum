name: leading spaces are accepted in value given to %d %X, but not trailing 
  spaces
dialect: bash
source: 
  oils:spec/builtin-printf#leading-spaces-are-accepted-in-value-given-to-d-x-but-not-trailing-spaces
stdout: |
  -123
  status=0
  -123
  status=1
  ---
  63
  status=0
  255
  status=0
  FF
  status=0
  ff
  status=0
---

case $SH in zsh) exit ;; esac

# leading space is allowed
printf '%d\n' ' -123'
echo status=$?
printf '%d\n' ' -123 '
echo status=$?

echo ---

printf '%d\n' ' +077'
echo status=$?

printf '%d\n' ' +0xff'
echo status=$?

printf '%X\n' ' +0xff'
echo status=$?

printf '%x\n' ' +0xff'
echo status=$?
