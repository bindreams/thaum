name: Using ${x-default} after unsetting a temp binding shadowing a global
dialect: bash
source: 
  oils:spec/assign#using-x-default-after-unsetting-a-temp-binding-shadowing-a-global
stdout: |
  x=temp-binding
  x=local
  - operator = temp-binding
  :- operator = temp-binding
---
f() {
  echo "x=$x"
  local x='local'
  echo "x=$x"
  unset x
  echo "- operator = ${x-default}"
  echo ":- operator = ${x:-default}"
}
x=global
x=temp-binding f
