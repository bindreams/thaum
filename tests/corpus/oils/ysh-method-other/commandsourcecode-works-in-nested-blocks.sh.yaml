name: Command.sourceCode() works in nested blocks
dialect: bash
source: oils:spec/ysh-method-other#commandsourcecode-works-in-nested-blocks
stdout: "\n"
---

shopt --unset no_osh_builtins  # allow alias builtin

proc p ( ; ; ; block) {
  var src = block.sourceCode()

  pp test_ (src.code_str)

  call io->eval(block)
}


shopt --unset no_parse_backticks
shopt --unset no_parse_sh_arith
shopt --set expand_aliases

p { 
  echo foo
}

p { 
  #a[0]=`echo foo`
  echo foo
  p { 
    #a[inner]=`echo foo`
    echo inner
  }
}
