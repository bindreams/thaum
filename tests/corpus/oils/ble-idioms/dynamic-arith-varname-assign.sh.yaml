name: 'dynamic arith varname: assign'
dialect: bash
source: oils:spec/ble-idioms#dynamic-arith-varname-assign
stdout: |
  a_x=3 a_y=4
  b_x=5 b_y=12
---
vec2_set () {
  local this=$1 x=$2 y=$3
  : $(( ${this}_x = $2 ))
  : $(( ${this}_y = y ))
}
vec2_set a 3 4
vec2_set b 5 12
echo a_x=$a_x a_y=$a_y
echo b_x=$b_x b_y=$b_y
