name: ${!ref} to undefined string var is fatal, INCONSISTENT with array
dialect: bash
source: 
  oils:spec/nix-idioms#ref-to-undefined-string-var-is-fatal-inconsistent-with-array
status: 1
stdout: |
  []
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
hookSlice='preHooks'

argv.py ${!hookSlice}

set -u

argv.py ${!hookSlice}

echo end
