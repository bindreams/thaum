name: create empty assoc array, put, then get
dialect: bash
source: oils:spec/array-assoc#create-empty-assoc-array-put-then-get
stdout: |
  []
  []
  bar
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
declare -A A  # still undefined
argv.py "${A[@]}"
argv.py "${!A[@]}"
A['foo']=bar
echo ${A['foo']}
