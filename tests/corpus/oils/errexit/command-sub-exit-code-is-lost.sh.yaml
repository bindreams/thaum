name: Command sub exit code is lost
dialect: bash
source: oils:spec/errexit#command-sub-exit-code-is-lost
stdout: |-
  ft
  status=0
  f
  status=0
  ft
  status=0
---
echo ft $(false) $(true)
echo status=$?

set -o errexit
shopt -s inherit_errexit || true

# This changes it
#shopt -s command_sub_errexit || true

echo f $(date %x)
echo status=$?

# compare with 
# x=$(date %x)         # FAILS
# local x=$(date %x)   # does NOT fail

echo ft $(false) $(true)
echo status=$?
