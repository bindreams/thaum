name: compgen -W 'one two three'
dialect: bash
source: oils:spec/builtin-completion#compgen--w-one-two-three
stdout: "one\ntwo\nthree\n--\nvendor\nv1\nv2\n--\nvendor\nv1\nv2\n"
---
cd $REPO_ROOT
compgen -W 'one two three'
echo --
compgen -W 'v1 v2 three' -A directory v
echo --
compgen -A directory -W 'v1 v2 three' v  # order doesn't matter
