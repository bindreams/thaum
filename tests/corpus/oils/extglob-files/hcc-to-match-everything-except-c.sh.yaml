name: '!(*.h|*.cc) to match everything except C++'
dialect: bash
source: oils:spec/extglob-files#hcc-to-match-everything-except-c
stdout: |
  extglob2/bar.py extglob2/baz.py extglob2/foo.py
---
shopt -s extglob
mkdir -p extglob2
touch extglob2/{foo,bar}.cc extglob2/{foo,bar,baz}.h \
      extglob2/{foo,bar,baz}.py
echo extglob2/!(*.h|*.cc)
