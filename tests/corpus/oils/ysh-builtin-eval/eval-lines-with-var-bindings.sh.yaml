disabled: true
name: eval lines with var bindings
dialect: bash
source: oils:spec/ysh-builtin-eval#eval-lines-with-var-bindings
stdout: |-
  a b | a mylocal
  c d | c mylocal

  a b | a local2
  c d | c local2
---

proc my-split (;;; block) {
  while read --raw-line {
    var cols = split(_reply)
    call io->eval(block, vars={_line: _reply, _first: cols[0]})
  }
}

printf 'a b\nc d\n' | my-split {
  var mylocal = 'mylocal'
  echo "$_line | $_first $mylocal"
}

# Now do the same thing inside a proc
proc p {
  printf 'a b\nc d\n' | my-split {
    var local2 = 'local2'
    echo "$_line | $_first $local2"
  }
}

echo
p
