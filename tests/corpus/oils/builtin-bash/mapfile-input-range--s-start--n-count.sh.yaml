name: 'mapfile (input range): -s start -n count'
dialect: bash
source: oils:spec/builtin-bash#mapfile-input-range--s-start--n-count
stdout: "n=3\n[a5]\n[a6]\n[a7]\n"
---
type mapfile >/dev/null 2>&1 || exit 0
printf '%s\n' a{0..10} | {
  mapfile -s 5 -n 3 -t arr
  echo "n=${#arr[@]}"
  printf '[%s]\n' "${arr[@]}"
}
