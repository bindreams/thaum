disabled: true
name: dict() converts from BashAssoc to Dict
dialect: bash
source: oils:spec/ysh-convert#dict-converts-from-bashassoc-to-dict
stdout: |
  "BashAssoc"
  {
    "a": "1",
    "b": "2",
    "c": "3"
  }
---
declare -A foo
foo=([a]=1 [b]=2 [c]=3)

json write (type(foo))
json write (dict(foo))
