name: printf %*.*s (width/precision from args)
dialect: bash
source: oils:spec/builtin-printf#printf-s-widthprecision-from-args
stdout: |-
  [    hello]
  [hel]
  [      hel]
  [      hel]
  [      hel]
---
printf '[%*s]\n' 9 hello
printf '[%.*s]\n' 3 hello
printf '[%*.3s]\n' 9 hello
printf '[%9.*s]\n' 3 hello
printf '[%*.*s]\n' 9 3 hello
