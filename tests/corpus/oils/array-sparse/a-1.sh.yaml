name: ${a[@]#...}
dialect: bash
source: oils:spec/array-sparse#a
stdout: |
  ['0', '1', '5', '6', '8', '9']
  ['abc0', '1', '5', '6', '8', '9xyz']
  ['v', 'v', 'v', 'v6', 'v8', 'v9']
  ['abcv', 'v', 'v', 'v6', 'v8', 'v9xyz']
  ['', '', '', '', '', '']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
case $SH in mksh) exit ;; esac

a=(v{0..9})
unset -v 'a[2]' 'a[3]' 'a[4]' 'a[7]'

argv.py "${a[@]#v}"
argv.py "abc${a[@]#v}xyz"
argv.py "${a[@]%[0-5]}"
argv.py "abc${a[@]%[0-5]}xyz"
argv.py "${a[@]#v?}"
