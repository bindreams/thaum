disabled: true
name: Repeat {1,3} etc.
dialect: bash
source: oils:spec/ysh-regex#repeat-13-etc
stdout: |-
  [[:digit:]]{2}
  [[:digit:]]{1,3}
  [[:digit:]]{1,}
  [[:digit:]]{,3}
---
var pat = null

setvar pat = /d{2}/
echo $pat
setvar pat = /d{1,3}/
echo $pat
setvar pat = /d{1,}/
echo $pat
setvar pat = /d{,3}/
echo $pat
