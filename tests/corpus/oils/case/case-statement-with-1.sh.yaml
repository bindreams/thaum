name: Case statement with ;&
dialect: bash
source: oils:spec/case#case-statement-with
status: 0
stdout: |
  aa
  bb
  cc
  --
  bb
  cc
  --
  cc
  --
  dd
  --
  --
---
# ;& ignores the next condition.  Why would that be useful?

for x in aa bb cc dd zz; do
  case $x in
    aa) echo aa ;&
    bb) echo bb ;&
    cc) echo cc ;;
    dd) echo dd ;;
  esac
  echo --
done
