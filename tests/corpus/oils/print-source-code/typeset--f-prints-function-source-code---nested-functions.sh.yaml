name: typeset -f prints function source code - nested functions
dialect: bash
source: 
  oils:spec/print-source-code#typeset--f-prints-function-source-code---nested-functions
stdout: "outer\ninner\n"
---
outer() {
  echo outer
  : prefix; inner() {
    echo inner
  }
}

code=$(typeset -f outer)

if false; then
  echo ---
  echo $code
  echo ---
fi

$SH -c "$code; outer; inner"
