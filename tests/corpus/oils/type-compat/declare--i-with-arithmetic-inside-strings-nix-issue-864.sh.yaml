name: declare -i with arithmetic inside strings (Nix, issue 864)
dialect: bash
source: 
  oils:spec/type-compat#declare--i-with-arithmetic-inside-strings-nix-issue-864
stdout: |
  s=3
  item=3
---

# example
# https://github.com/NixOS/nixpkgs/blob/master/pkgs/stdenv/generic/setup.sh#L379

declare -i s
s='1 + 2'
echo s=$s

declare -a array=(1 2 3)
declare -i item
item='array[1+1]'
echo item=$item
