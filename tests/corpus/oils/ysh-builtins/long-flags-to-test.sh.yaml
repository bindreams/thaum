disabled: true
name: long flags to test
dialect: bash
source: oils:spec/ysh-builtins#long-flags-to-test
stdout: |
  status=0
  status=0
  status=0
  status=1
  status=2
---
# no options necessary!

test --dir /
echo status=$?

touch foo
test --file foo
echo status=$?

test --exists /
echo status=$?

test --symlink foo
echo status=$?

test --typo foo
echo status=$?
