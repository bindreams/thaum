disabled: true
name: Char Class Set
dialect: bash
source: oils:spec/ysh-regex#char-class-set
stdout: "[abc]+\nyes\nno\nno\n"
---
shopt -s ysh:all
var pat = ''

# This is NOT allowed
# setvar pat = /[a b c]+/

setvar pat = /['abc']+/
echo $pat

if ('cbcb' ~ pat) { echo yes } else { echo no }
if ('0123' ~ pat) { echo yes } else { echo no }
if ('' ~ pat) { echo yes } else { echo no }
