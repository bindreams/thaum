name: Array stored in associative array gets converted to string (without 
  strict_array)
dialect: bash
source: 
  oils:spec/array-assoc#array-stored-in-associative-array-gets-converted-to-string-without-strictarray
stdout: |
  ['1 2 3']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

array=('1 2' 3)
declare -A d
d['key']="${array[@]}"
argv.py "${d['key']}"
