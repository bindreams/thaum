name: coerce to string with ${A[*]}, etc.
dialect: bash
source: oils:spec/array-assoc#coerce-to-string-with-a-etc
stdout: |
  ['xx yy']
  ['X X Y Y']
  ['xx', 'yy']
  ['X', 'X', 'Y', 'Y']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
declare -A A
A['X X']=xx
A['Y Y']=yy
argv.py "${A[*]}"
argv.py "${!A[*]}"

argv.py ${A[@]}
argv.py ${!A[@]}
