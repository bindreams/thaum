name: dirs -v to print numbered stack, one entry per line
dialect: bash
source: 
  oils:spec/builtin-dirs#dirs--v-to-print-numbered-stack-one-entry-per-line
status: 0
stdout: |
  --
   0  /tmp
   1  /
  --
   0  /dev
   1  /tmp
   2  /
---
set -o errexit
cd /
pushd /tmp >/dev/null
echo --
dirs -v
pushd /dev >/dev/null
echo --
dirs -v
#
#  zsh uses tabs
