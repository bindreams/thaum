disabled: true
name: shopt -p
dialect: bash
source: oils:spec/ysh-builtin-shopt#shopt--p
stdout: |
  shopt -u errexit
  shopt -u nullglob
  --
  shopt -u strict_arg_parse
  shopt -u strict_argv
  shopt -u strict_arith
  --
  shopt -s strict_arg_parse
  shopt -s strict_argv
  shopt -s strict_arith
---

shopt -p errexit
shopt -p nullglob

echo --
shopt -p strict:all | head -n 3

echo --
shopt --set strict:all
shopt -p strict:all | head -n 3
