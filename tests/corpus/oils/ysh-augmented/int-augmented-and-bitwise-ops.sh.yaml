disabled: true
name: Int Augmented //= %= **= and bitwise ops
dialect: bash
source: oils:spec/ysh-augmented#int-augmented-and-bitwise-ops
stdout: "x=3\nx=1\nx=1000\n\nbitwise\nx=5\nx=15\nx=3\n\nshift\nx=16\nx=4\n"
---

var x = 0

setvar x = 10
setvar x //= 3
echo x=$x

setvar x = 10
setvar x %= 3
echo x=$x

setvar x = 10
setvar x **= 3
echo x=$x

echo
echo bitwise

setvar x  = 0b1111
setvar x &= 0b0101
echo x=$x

setvar x  = 0b1000
setvar x |= 0b0111
echo x=$x

setvar x = 0b1010
setvar x ^= 0b1001
echo x=$x

echo
echo shift

setvar x = 0b1000
setvar x <<= 1
echo x=$x

setvar x = 0b1000
setvar x >>= 1
echo x=$x
