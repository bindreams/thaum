name: Nested function stdout redirect
dialect: bash
source: oils:spec/redirect-command#nested-function-stdout-redirect
stdout: |
  i1
  i2
  --
  o1
  o2
environment:
  TMP: /tmp
---
# Shows that a stack is necessary.
inner() {
  echo i1
  echo i2
}
outer() {
  echo o1
  inner > $TMP/inner.txt
  echo o2
}
outer > $TMP/outer.txt
cat $TMP/inner.txt
echo --
cat $TMP/outer.txt
