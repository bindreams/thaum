name: -o plusdirs and -o dirnames with compgen
dialect: bash
source: oils:spec/builtin-completion#o-plusdirs-and--o-dirnames-with-compgen
stdout: |
  b1
  b2
  benchmarks
  bin
  build
  builtin
  ---
  benchmarks
  bin
  build
  builtin
---
cd $REPO_ROOT
compgen -o plusdirs -W 'a b1 b2' b | sort
echo ---
compgen -o dirnames b | sort
