disabled: true
name: trap ERR with YSH proc
dialect: bash
source: oils:spec/builtin-trap-err#trap-err-with-ysh-proc
status: 1
stdout: |
  err
---

case $SH in bash|mksh|ash) exit ;; esac

# seems the same

shopt -s ysh:upgrade

proc handler {
  echo err
}

if test -f /nope { echo file exists }

trap handler ERR

if test -f /nope { echo file exists }

false || true  # not run for the first part here
false
