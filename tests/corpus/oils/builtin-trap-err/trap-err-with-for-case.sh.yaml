name: trap ERR with for,  case, { }
dialect: bash
source: oils:spec/builtin-trap-err#trap-err-with-for-case
stdout: "line=4\nline=4\nline=8\nline=12\nline=12\nline=12\nok\n"
---

trap 'echo line=$LINENO' ERR

for y in 1 2; do
  false
done

case x in
  x) false ;;
  *) false ;;
esac

{ false; false; false; }
echo ok
