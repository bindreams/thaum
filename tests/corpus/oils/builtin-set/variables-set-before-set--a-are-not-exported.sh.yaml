name: variables set before set -a are not exported
dialect: bash
source: oils:spec/builtin-set#variables-set-before-set--a-are-not-exported
stdout: |
  None
  after_value
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
BEFORE=before_value
set -a
AFTER=after_value
printenv.py BEFORE AFTER
