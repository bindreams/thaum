name: complete with no args and complete -p both print completion spec
dialect: bash
source: 
  oils:spec/builtin-completion#complete-with-no-args-and-complete--p-both-print-completion-spec
stdout: |
  complete -W 'foo bar' mycommand
  complete -W 'foo bar' mycommand
  complete -F myfunc other
---

set -e

complete

complete -W 'foo bar' mycommand

complete -p

complete -F myfunc other

complete
