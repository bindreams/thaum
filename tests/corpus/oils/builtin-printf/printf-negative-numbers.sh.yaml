name: printf negative numbers
dialect: bash
source: oils:spec/builtin-printf#printf-negative-numbers
stdout: |
  [-42] status=0
  [-42] status=0
  [-42] status=0
  [-42] status=0
  [-42] status=1
  [-42] status=1
  [-42] status=1
  [-42] status=1
---
printf '[%d] ' -42
echo status=$?
printf '[%i] ' -42
echo status=$?

# extra LEADING space too
printf '[%d] ' ' -42'
echo status=$?
printf '[%i] ' ' -42'
echo status=$?

# extra TRAILING space too
printf '[%d] ' ' -42 '
echo status=$?
printf '[%i] ' ' -42 '
echo status=$?

# extra TRAILING chars
printf '[%d] ' ' -42z'
echo status=$?
printf '[%i] ' ' -42z'
echo status=$?

exit 0  # ok

# zsh is LESS STRICT

# osh is like zsh but has a hard failure (TODO: could be an option?)

# ash is MORE STRICT
