name: readarray (synonym for mapfile)
dialect: bash
source: oils:spec/builtin-bash#readarray-synonym-for-mapfile
stdout: |
  n=3
  [1
  ]
  [3
  ]
  [5
  ]
---
type readarray >/dev/null 2>&1 || exit 0
printf '%s\n' {1..5..2} | {
  readarray
  echo "n=${#MAPFILE[@]}"
  printf '[%s]\n' "${MAPFILE[@]}"
}
