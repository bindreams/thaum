disabled: true
name: 'setglobal d[key] inside proc should mutate global (bug #1841)'
dialect: bash
source: 
  oils:spec/ysh-scope#setglobal-dkey-inside-proc-should-mutate-global-bug-1841
stdout: "BEFORE mutate global\n(Dict)   {}\nlocal that is ignored\n(Dict)   {\"local\"\
  :1}\nAFTER mutate global\n(Dict)   {\"key\":\"mutated\",\"key2\":\"mutated\"}\n"
---

shopt -s ysh:upgrade

var g = {}

proc mutate {
  var g = {'local': 1}  # shadows global var

  setglobal g.key = 'mutated'
  setglobal g['key2'] = 'mutated'

  echo 'local that is ignored'
  pp test_ (g)
}

echo 'BEFORE mutate global'
pp test_ (g)

mutate

echo 'AFTER mutate global'
pp test_ (g)
