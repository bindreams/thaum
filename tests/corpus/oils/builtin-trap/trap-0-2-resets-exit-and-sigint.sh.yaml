name: trap 0 2 resets EXIT AND SIGINT
dialect: bash
source: oils:spec/builtin-trap#trap-0-2-resets-exit-and-sigint
stdout: |
  ---
  trap -- 'echo EXIT' EXIT
  ---
  ---
---

trap "echo EXIT" EXIT
echo ---
trap
echo ---
trap 0 2
trap
echo ---
trap "echo INT" INT
trap "echo EXIT" EXIT
trap 2 EXIT
trap
