disabled: true
name: builtin rm -f - ignores arguments that don't exist
dialect: bash
source: 
  oils:spec/ysh-builtin-private#builtin-rm--f---ignores-arguments-that-dont-exist
stdout: "status=1\nstatus=0\n"
---
case $SH in
  *osh) prefix='builtin' ;;
  *) prefix='' ;;
esac

touch foo bar
$prefix rm -- foo OOPS bar
echo status=$?

if test -f foo; then echo fail; fi
if test -f bar; then echo fail; fi

touch foo bar
$prefix rm -f -- foo OOPS bar
echo status=$?

if test -f foo; then echo fail; fi
if test -f bar; then echo fail; fi
