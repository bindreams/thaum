name: set -u with undefined var in interactive shell does NOT exit the 
  interpreter
dialect: bash
source: 
  oils:spec/builtin-set#set--u-with-undefined-var-in-interactive-shell-does-not-exit-the-interpreter
stdout: "before\nOK\nbefore\nline2\n"
---

# In bash, it aborts the LINE only.  The next line is executed!

# non-interactive
$SH -c 'set -u; echo before; echo $x; echo after
echo line2
'
if test $? -ne 0; then
  echo OK
fi

# interactive
$SH -i -c 'set -u; echo before; echo $x; echo after
echo line2
'
if test $? -ne 0; then
  echo OK
fi
