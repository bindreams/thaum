disabled: true
name: Match tab character with [\t]
dialect: bash
source: oils:spec/ysh-regex-bytes-chars#match-tab-character-with-t
stdout: |
  (Str)   "(a[\t]b)"
     a   a  \t   b   b  \n
---
shopt -s ysh:all

var pat = / ('a' [\t] 'b') /
pp test_ (str(pat))

var lines = :| b'aa\tbb' b'cc\tdd' |
write @lines | egrep $pat | od -A n -t c 
