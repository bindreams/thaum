name: static assignment doesn't split
dialect: bash
source: oils:spec/assign#static-assignment-doesnt-split
stdout: |
  ['a b c', 'a b c', 'a b c']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
words='a b c'
export ex=$words
glo=$words
readonly ro=$words
argv.py "$ex" "$glo" "$ro"
