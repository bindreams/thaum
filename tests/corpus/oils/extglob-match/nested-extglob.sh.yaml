name: nested extglob
dialect: bash
source: oils:spec/extglob-match#nested-extglob
stdout: |
  TRUE
  TRUE
  TRUE
  FALSE
---
[[ --help == --@(help|verbose=@(1|2)) ]] && echo TRUE
[[ --verbose=1 == --@(help|verbose=@(1|2)) ]] && echo TRUE
[[ --verbose=2 == --@(help|verbose=@(1|2)) ]] && echo TRUE
[[ --verbose == --@(help|verbose=@(1|2)) ]] || echo FALSE
