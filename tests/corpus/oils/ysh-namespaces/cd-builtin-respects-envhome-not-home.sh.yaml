disabled: true
name: cd builtin respects ENV.HOME, not HOME
dialect: bash
source: oils:spec/ysh-namespaces#cd-builtin-respects-envhome-not-home
stdout: |
  code=1

  code=0
  /tmp
---

try { cd }
echo code=$[_error.code]
echo

setglobal ENV.HOME = '/tmp'

# Now it's respected
try { cd }
echo code=$[_error.code]

pwd
