disabled: true
name: fork
dialect: bash
source: oils:spec/ysh-builtin-process#fork
stdout: |-
  hi
  status=42
  ok
---
shopt --set oil:upgrade
shopt --unset errexit

old=$PWD

fork {
  cd /
  echo hi
  sleep 0.01 
  exit 42
}
#echo status=$?  race condition

wait -n
echo status=$?

if test "$old" = "$PWD"; then
  echo ok
fi
