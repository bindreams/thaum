disabled: true
name: Slice bash array isn't allowed
dialect: bash
source: oils:spec/ysh-with-sh#slice-bash-array-isnt-allowed
status: 3
stdout: |
  ['c d', 'e']
  ['copy', 'bash']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

shopt --set parse_at

var ysh = :| ysh 'c d' e f |
var yslice = ysh[1:3]
argv.py @yslice

declare -a bash=(bash 'c d' e f)

# You can copy it and then slice it
var ysh2 = :| copy "${bash[@]}" |
var yslice = ysh2[0:2]
argv.py @yslice

# Note this
var sh_slice = bash[1:3]
argv.py @sh_slice
