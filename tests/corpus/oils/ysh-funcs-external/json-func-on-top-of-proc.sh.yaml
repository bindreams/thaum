disabled: true
name: JSON func on top of proc
dialect: bash
source: oils:spec/ysh-funcs-external#json-func-on-top-of-proc
stdout: "TODO\nresult = 3\n"
---

proc myadd {
  json read (&args)

  # convenient!
  redir >&2 {
    = args
  }

  json write (args[0] + args[1])
}

echo '[1, 2]' | myadd | json read (&result)

# TODO:
