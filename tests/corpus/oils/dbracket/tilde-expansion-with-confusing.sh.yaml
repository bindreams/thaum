name: tilde expansion with =~ (confusing)
dialect: bash
source: oils:spec/dbracket#tilde-expansion-with-confusing
stdout: "regex=0\nregex=0\nregex=1\nregex=0\n"
---
case $SH in mksh) exit ;; esac

HOME=foo
[[ ~ =~ $HOME ]]
echo regex=$?
[[ $HOME =~ ~ ]]
echo regex=$?

HOME='^a$'  # looks like regex
[[ ~ =~ $HOME ]]
echo regex=$?
[[ $HOME =~ ~ ]]
echo regex=$?
