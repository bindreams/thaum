disabled: true
name: Big floats like 1e309 and -1e309 go to Inf / -Inf
dialect: bash
source: oils:spec/ysh-int-float#big-floats-like-1e309-and--1e309-go-to-inf--inf
stdout: |-
  inf
  -inf
---
shopt --set parse_ysh_expr_sub

# Notes
# - Python float() and JS parseFloat() agree with this behavior
# - JSON doesn't have inf / -inf

echo $[1e309]
echo $[-1e309]
