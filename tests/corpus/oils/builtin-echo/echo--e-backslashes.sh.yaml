name: echo -e backslashes
dialect: bash
source: oils:spec/builtin-echo#echo--e-backslashes
stdout: |-
  \
  \
  \
  \

  \
  line2
  ## N-I dash STDOUT:
  -e \
  -e \
  -e \
  -e \

  -e \
  line2
---
echo -e \\
echo -e '\'
echo -e '\\'
echo -e "\\"
echo

# backslash at end of line
echo -e '\
line2'
