name: Export a local that shadows a global
dialect: bash
source: oils:spec/builtin-vars#export-a-local-that-shadows-a-global
---
V=global
f() {
  local V=local1
  export V
  printenv.py V
}
f
printenv.py V  # exported local out of scope; global isn't exported yet
export V
printenv.py V  # now it's exported
local1
None
global
