name: No tilde expansion in word that looks like assignment but isn't
dialect: bash
source: 
  oils:spec/tilde#no-tilde-expansion-in-word-that-looks-like-assignment-but-isnt
stdout: |-
  x=~
---
# bash and mksh mistakenly expand here!
# bash fixes this in POSIX mode (gah).
# http://lists.gnu.org/archive/html/bug-bash/2016-06/msg00001.html
HOME=/home/bob
echo x=~
