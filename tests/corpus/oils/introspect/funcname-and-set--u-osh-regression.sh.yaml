name: ${FUNCNAME} and "set -u" (OSH regression)
dialect: bash
source: oils:spec/introspect#funcname-and-set--u-osh-regression
status: 1
stdout: ''
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
set -u
argv.py "$FUNCNAME"
