disabled: true
name: subshell
dialect: bash
source: oils:spec/ysh-xtrace#subshell
stdout: ''
stderr: |2-
      . 12345 builtin ':' p
    + 12345 exit 3
    . 12345 builtin ':' 1
    < 12345 proc p
    > 12345 proc p
  . builtin ':' begin
  . builtin set '+x'
  ; process 12345: status 3
  | forkwait 12345
---
shopt --set ysh:upgrade
shopt --unset errexit
set -x

proc p {
  : p
}

{
  : begin
  ( 
    : 1
    p
    exit 3
  )
  set +x
} 2>err.txt

# Hack: sort for determinism
sed --regexp-extended 's/[[:digit:]]{2,}/12345/g' err.txt | LANG=C sort >&2
