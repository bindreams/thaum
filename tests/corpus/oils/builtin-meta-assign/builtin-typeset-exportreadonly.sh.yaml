name: builtin typeset, export,readonly
dialect: bash
source: oils:spec/builtin-meta-assign#builtin-typeset-exportreadonly
stdout: |-
  s=typeset
  s=export
  s=readonly
  --
  s2=typeset
  s2=export
  s2=readonly
---
case $SH in dash|ash) exit ;; esac

builtin typeset s=typeset
echo s=$s

builtin export s=export
echo s=$s

builtin readonly s=readonly
echo s=$s

echo --

builtin builtin typeset s2=typeset
echo s2=$s2

builtin builtin export s2=export
echo s2=$s2

builtin builtin readonly s2=readonly
echo s2=$s2
