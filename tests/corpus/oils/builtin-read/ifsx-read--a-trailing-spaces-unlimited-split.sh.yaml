name: "IFS='x ' read -a: trailing spaces (unlimited split)"
dialect: bash
source: oils:spec/builtin-read#ifsx-read--a-trailing-spaces-unlimited-split
stdout: "['a', 'b']\n['a', 'b']\n['a', 'b']\n['a', 'b']\n['a', 'b']\n['a', 'b']\n\
  ['a', 'b', '']\n"
---
case $SH in mksh|ash|dash|zsh) exit 99; esac
IFS='x '
echo 'a b'     | (read -a a; argv.py "${a[@]}")
echo 'a b '    | (read -a a; argv.py "${a[@]}")
echo 'a bx'    | (read -a a; argv.py "${a[@]}")
echo 'a bx '   | (read -a a; argv.py "${a[@]}")
echo 'a b x'   | (read -a a; argv.py "${a[@]}")
echo 'a b x '  | (read -a a; argv.py "${a[@]}")
echo 'a b x x' | (read -a a; argv.py "${a[@]}")
