name: type -P builtin -> not a file but file found
dialect: bash
source: oils:spec/builtin-type-bash#type--p-builtin---not-a-file-but-file-found
status: 1
stdout: "_tmp/mv\n_tmp/tar\n_tmp/grep\n"
---
touch _tmp/{mv,tar,grep}
chmod +x _tmp/{mv,tar,grep}
PATH=_tmp:$PATH

mv () { ls; }
tar () { ls; }
grep () { ls; }
type -P mv tar grep cd builtin command type
