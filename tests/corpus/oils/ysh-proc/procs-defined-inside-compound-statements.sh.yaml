disabled: true
name: Procs defined inside compound statements
dialect: bash
source: oils:spec/ysh-proc#procs-defined-inside-compound-statements
stdout: "loop\nbrace\n"
---

shopt --set ysh:upgrade

var p = null
for x in 1 2 {
  proc inner {
    echo 'loop'
  }
  setvar p = inner
}
p

{
  proc p {
    echo 'brace'
  }
}
p
