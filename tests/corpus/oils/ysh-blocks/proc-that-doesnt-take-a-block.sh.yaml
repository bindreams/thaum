name: Proc that doesn't take a block
dialect: bash
source: oils:spec/ysh-blocks#proc-that-doesnt-take-a-block
stdout: "task name=spam\nno block\nstatus=44\n\ntask name=foo\nrunning\nblock\nstatus=33\n"
---
shopt --set parse_brace parse_proc parse_paren

proc task(name ; ; ; b = null) {
  echo "task name=$name"
  if (b) {
    call io->eval(b)
    return 33
  } else {
    echo 'no block'
    return 44
  }
}

task spam
echo status=$?

echo

task foo {
  echo 'running'
  echo 'block'
}
echo status=$?
