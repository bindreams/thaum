name: The string to strip is space sensitive
dialect: bash
source: oils:spec/var-sub-quote#the-string-to-strip-is-space-sensitive
stdout: |
  ['a b ', 'a b c d']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
foo='a b c d'
argv.py "${foo%c d}" "${foo%c  d}"
