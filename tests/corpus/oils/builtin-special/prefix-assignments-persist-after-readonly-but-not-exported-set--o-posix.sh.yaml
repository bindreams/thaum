name: Prefix assignments persist after readonly, but NOT exported (set -o posix)
dialect: bash
source: 
  oils:spec/builtin-special#prefix-assignments-persist-after-readonly-but-not-exported-set--o-posix
stdout: |
  foo=bar
  spam=eggs
  None
  None
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---

# Bash only implements it behind the posix option
case $SH in
  bash) set -o posix ;;
esac
foo=bar readonly spam=eggs
echo foo=$foo
echo spam=$spam

# should NOT be exported
printenv.py foo
printenv.py spam
