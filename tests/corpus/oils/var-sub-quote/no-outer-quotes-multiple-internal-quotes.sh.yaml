name: No outer quotes, Multiple internal quotes
dialect: bash
source: oils:spec/var-sub-quote#no-outer-quotes-multiple-internal-quotes
stdout: |
  ['Aa', 'b', 'c', ' a b cD', 'E', 'F']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
# It's like a single command word.  Parts are joined directly.
var='a b c'
argv.py ${Unset:-A$var " $var"D E F}
