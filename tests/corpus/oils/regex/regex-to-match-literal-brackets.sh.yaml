name: Regex to match literal brackets []
dialect: bash
source: oils:spec/regex#regex-to-match-literal-brackets
stdout: |
  true
  true
---

# bash-completion relies on this, so we're making it match bash.
# zsh understandably differs.
[[ '[]' =~ \[\] ]] && echo true

# Another way to write this.
pat='\[\]'
[[ '[]' =~ $pat ]] && echo true
