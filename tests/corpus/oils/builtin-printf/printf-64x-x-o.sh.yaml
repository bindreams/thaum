name: printf %6.4x X o
dialect: bash
source: oils:spec/builtin-printf#printf-64x-x-o
stdout: |-
  [  002a]
  [002a]
  [    2a]
  --
  [  002A]
  [002A]
  [    2A]
  --
  [  0052]
  [0052]
  [    52]
---
printf '[%6.4x]\n' 42
printf '[%.4x]\n' 42
printf '[%6.x]\n' 42
echo --
printf '[%6.4X]\n' 42
printf '[%.4X]\n' 42
printf '[%6.X]\n' 42
echo --
printf '[%6.4o]\n' 42
printf '[%.4o]\n' 42
printf '[%6.o]\n' 42
