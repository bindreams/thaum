name: substitution of IFS character, quoted and unquoted
dialect: bash
source: 
  oils:spec/var-sub-quote#substitution-of-ifs-character-quoted-and-unquoted
stdout: |
  ['']
  [':']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
IFS=:
s=:
argv.py $s
argv.py "$s"
