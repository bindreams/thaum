name: Test above without 'local' (which is not POSIX)
dialect: bash
source: oils:spec/assign#test-above-without-local-which-is-not-posix
stdout: |
  x=temp-binding
  x=mutated-temp
  x=global
  x=global
---
f() {
  echo "x=$x"

  x=mutated-temp  # mutate temp frame
  echo "x=$x"

  # Unset it
  unset x
  echo "x=$x"
}

x=global
x=temp-binding f
echo "x=$x"
