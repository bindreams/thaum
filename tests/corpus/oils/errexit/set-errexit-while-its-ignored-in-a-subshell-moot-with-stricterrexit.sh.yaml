name: set errexit while it's ignored in a subshell (moot with strict_errexit)
dialect: bash
source: 
  oils:spec/errexit#set-errexit-while-its-ignored-in-a-subshell-moot-with-stricterrexit
status: 1
stdout: "1\n2\n3\n4\n5\n6\n"
---
set -o errexit
if ( echo 1; false; echo 2; set -o errexit; echo 3; false; echo 4 ); then
  echo 5;
fi
echo 6  # This is executed because the subshell just returns false
false 
echo 7
