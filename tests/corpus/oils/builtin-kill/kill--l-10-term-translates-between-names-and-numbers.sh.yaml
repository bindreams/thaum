name: kill -l 10 TERM translates between names and numbers
dialect: bash
source: 
  oils:spec/builtin-kill#kill--l-10-term-translates-between-names-and-numbers
stdout: |
  USR1
  SEGV
  USR2
  status=0

  10
  11
  12
  status=0

  USR1
  11
  USR2
  status=0

  ## N-I dash/mksh STDOUT:
---
case $SH in mksh|dash) exit ;; esac

builtin kill -l 10 11 12
echo status=$?
echo

builtin kill -l SIGUSR1 SIGSEGV USR2
echo status=$?
echo

# mixed kind
builtin kill -l 10 SIGSEGV 12
echo status=$?
echo
