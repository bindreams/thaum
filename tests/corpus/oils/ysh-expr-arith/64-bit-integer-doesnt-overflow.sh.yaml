name: 64-bit integer doesn't overflow
dialect: bash
source: oils:spec/ysh-expr-arith#64-bit-integer-doesnt-overflow
stdout: "2147483648\n4294967296\n6442450944\nmax positive = 9223372036854775807\n"
---

# same as spec/arith.test.sh case 38

var a= 1 << 31 
echo $a

var b = a + a
echo $b

var c = b + a  
echo $c

var x = 1 << 62
var y = x - 1
echo "max positive = $[ x + y ]"

#echo "overflow $[ x + x ]"
