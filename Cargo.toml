[package]
name = "thaum"
version = "0.1.0"
edition = "2021"

[features]
default = []
cli = ["dep:colored", "dep:clap"]

[dependencies]
thiserror = "2"
contracts = "0.6"
strum = { version = "0.27", features = ["derive"] }
colored = { version = "3", optional = true }
clap = { version = "4", features = ["derive"], optional = true }

[dev-dependencies]
pretty_assertions = "1"
serde = { version = "1", features = ["derive"] }
serde_yaml2 = "0.1"
yaml-rust2 = "0.8"
libtest-mimic = "0.8"
regex = "1"

[[test]]
name = "corpus"
path = "tests/corpus_runner.rs"
harness = false

[[bin]]
name = "thaum"
path = "src/main.rs"
required-features = ["cli"]
