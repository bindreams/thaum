disabled: true
name: captureStdout() is like $()
dialect: bash
source: oils:spec/ysh-method-io#capturestdout-is-like
stdout: |
  (Str)   "one\ncaptured"
---

proc p {
  var captured = 'captured'
  var cmd = ^(echo one; echo $captured)
  
  var stdout = io.captureStdout(cmd)
  pp test_ (stdout)
}

p
