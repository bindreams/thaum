name: Array expansion with nullary var op @a
dialect: bash
source: oils:spec/var-op-bash#array-expansion-with-nullary-var-op-a
stdout: |
  ['a', 'a', 'a', 'a', 'a', 'a', 'a', 'a', 'a']
  ['a a a a a a a a a']
  ['A', 'A', 'A', 'A']
  ['A A A A']
  []
  ['']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
declare -a a=({1..9})
declare -A A=(['a']=hello ['b']=world ['c']=osh ['d']=ysh)

argv.py "${a[@]@a}"
argv.py "${a[*]@a}"
argv.py "${A[@]@a}"
argv.py "${A[*]@a}"
argv.py "${u[@]@a}"
argv.py "${u[*]@a}"
