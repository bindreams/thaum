disabled: true
name: json write in command sub
dialect: bash
source: oils:spec/ysh-json#json-write-in-command-sub
stdout: "{\n  \"name\": \"bob\",\n  \"age\": 30\n}\n{\n  \"name\": \"bob\",\n  \"\
  age\": 30\n}\n"
---
shopt -s oil:all  # for echo
var mydict = {name: "bob", age: 30}
json write (mydict)
var x = $(json write (mydict))
echo $x
