disabled: true
name: type / type -a builtin on invokables - shell func, proc, invokable
dialect: bash
source: 
  oils:spec/ysh-proc#type-type--a-builtin-on-invokables---shell-func-proc-invokable
stdout: "function\nproc\nproc\n1\n---\nmy-shell-func is a shell function\nmy-shell-func()
  {\n   echo hi\n}\nmyproc is a YSH proc\ninvokable is a YSH invokable\n1\n---\nmy-shell-func
  is a shell function\nmy-shell-func() {\n   echo hi\n}\nmyproc is a YSH proc\ninvokable
  is a YSH invokable\n---\n"
---
shopt --set ysh:upgrade

my-shell-func() {
   echo hi
}

proc myproc {
  echo hi
}

proc boundProc(; self) {
  echo hi
}

var methods = Object(null, {__invoke__: boundProc})
var invokable = Object(methods, {})

type -t my-shell-func
type -t myproc
type -t invokable
try {
  type -t methods  # not invokable!
}
echo $[_error.code]

echo ---

type my-shell-func
type myproc
type invokable
try {
  type methods  # not invokable!
}
echo $[_error.code]

echo ---

type -a my-shell-func
type -a myproc
type -a invokable

echo ---

if false {  # can't redefine right now
  invokable() {
    echo sh-func
  }
  type -a invokable
}
