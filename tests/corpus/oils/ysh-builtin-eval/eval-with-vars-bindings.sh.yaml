disabled: true
name: eval with vars bindings
dialect: bash
source: oils:spec/ysh-builtin-eval#eval-with-vars-bindings
stdout: |
  (Str)   "abc"
  (Str)   "123"
  (Str)   "abc"
---
var myVar = "abc"
call io->eval(^(pp test_ (myVar)))
call io->eval(^(pp test_ (myVar)), vars={ 'myVar': '123' })

# eval doesn't modify it's environment
call io->eval(^(pp test_ (myVar)))
