name: Export a global variable and unset it
dialect: bash
source: oils:spec/builtin-vars#export-a-global-variable-and-unset-it
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
f() { export GLOBAL=X; }
f
echo $GLOBAL
printenv.py GLOBAL
unset GLOBAL
echo g=$GLOBAL
printenv.py GLOBAL
X
X
g=
None
