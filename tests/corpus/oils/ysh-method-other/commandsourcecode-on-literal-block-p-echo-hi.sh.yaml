disabled: true
name: 'Command.sourceCode() on literal block: p { echo hi }'
dialect: bash
source: oils:spec/ysh-method-other#commandsourcecode-on-literal-block-p-echo-hi
stdout: |
  {
    "location_str": "[ stdin ]",
    "location_start_line": 22
  }
  1
  2
  ---
  1
  2
---

proc p ( ; ; ; block) {
  var src = block.sourceCode()
  echo $[src.code_str] > out.ysh

  # don't assert this yet, because whitespace can change
  call src->erase('code_str')

  json write (src)

  # New location is out.ysh:4
  $[ENV.SH] out.ysh || true

  echo ---

  #echo 'zz (' > bad.ysh

  # Original location is [ stdin ]:20
  ... $[ENV.SH]
    --location-str $[src.location_str]
    --location-start-line $[src.location_start_line]
    out.ysh
    || true
    ;
}

p { 
  echo 1
  echo 2
  false
  echo 3
}
