name: Multiple here docs with different descriptors
dialect: bash
source: oils:spec/here-doc#multiple-here-docs-with-different-descriptors
stdout: "0: fd0\n3: fd3\n"
setup: |
  #!/bin/sh
  cat > read_from_fd.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for arg in sys.argv[1:]:
      fd = int(arg)
      try:
          data = os.read(fd, 1024)
      except OSError as e:
          print(f"FATAL: Error reading from fd {fd}: {e}", file=sys.stderr)
          sys.exit(1)
      sys.stdout.write(f"{fd}: ")
      sys.stdout.buffer.write(data)
  HELPER
  chmod +x read_from_fd.py

---
read_from_fd.py 0 3 <<EOF 3<<EOF3
fd0
EOF
fd3
EOF3
