name: Multiple LHS array words
dialect: bash
source: oils:spec/array-assign#multiple-lhs-array-words
stdout: |
  declare -a a=([0]="0" [1]="" [2]="2")
  declare -a b=([0]="3" [1]="4" [2]="/home/spec-test/src")
  ---
  ['b[2', '+', '0]=bar']
  status=0
  declare -a a=([0]="0" [1]="" [2]="2")
  declare -a b=([0]="3" [1]="4" [2]="/home/spec-test/src")
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
case $SH in zsh|ash) exit ;; esac

a=(0 1 2)
b=(3 4 5)

#declare -p a b

HOME=/home/spec-test

# empty string, and tilde sub
a[0 + 1]=  b[2 + 0]=~/src

typeset -p a b

echo ---

# In bash, this bad prefix binding prints an error, but nothing fails
a[0 + 1]='foo' argv.py b[2 + 0]='bar'
echo status=$?

typeset -p a b
