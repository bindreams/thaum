name: PROMPT_COMMAND that writes to BASH_REMATCH
dialect: bash
source: oils:spec/interactive#promptcommand-that-writes-to-bashrematch
stdout: "---\none\n---\n---\nbar b a r\n---\n^D\n"
---
export PS1=''

case $SH in
  *bash|*osh)
    $SH --rcfile /dev/null -i << 'EOF'
PROMPT_COMMAND='[[ clobber =~ (.)(.)(.) ]]; echo ---'
echo one
[[ bar =~ (.)(.)(.) ]]
echo ${BASH_REMATCH[@]}
EOF
    ;;
esac

# Paper over difference with OSH
case $SH in *bash) echo '^D' ;; esac
