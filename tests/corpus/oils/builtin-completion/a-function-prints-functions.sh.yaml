name: -A function prints functions
dialect: bash
source: oils:spec/builtin-completion#a-function-prints-functions
status: 0
stdout: |
  __ec
  _ab
  add
  div
  ek
  --
  __ec
  _ab
---
add () { expr 4 + 4; }
div () { expr 6 / 2; }
ek () { echo hello; }
__ec () { echo hi; }
_ab () { expr 10 % 3; }
compgen -A function
echo --
compgen -A function _
