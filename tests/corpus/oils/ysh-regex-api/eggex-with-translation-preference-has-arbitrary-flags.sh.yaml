disabled: true
name: Eggex with translation preference has arbitrary flags
dialect: bash
source: 
  oils:spec/ysh-regex-api#eggex-with-translation-preference-has-arbitrary-flags
stdout: |-
  yes
---
shopt -s ysh:upgrade

# TODO: can provide introspection so users can translate it?
# This is kind of a speculative corner of the language.

var pat = / d+ ; ignorecase ; PCRE /

# This uses ERE, as a test
if ('ab 12' ~ pat) {
  echo yes
}
