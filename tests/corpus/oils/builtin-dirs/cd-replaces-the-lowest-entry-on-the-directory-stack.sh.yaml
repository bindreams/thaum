name: cd replaces the lowest entry on the directory stack!
dialect: bash
source: 
  oils:spec/builtin-dirs#cd-replaces-the-lowest-entry-on-the-directory-stack
stdout: "pushd=0\n/tmp /tmp/oils-spec/builtin-dirs\ncd=0\n/ /tmp/oils-spec/builtin-dirs\n\
  popd=0\npopd=1\n"
---

# stable temp dir
dir=/tmp/oils-spec/builtin-dirs

mkdir -p $dir
cd $dir

pushd /tmp >/dev/null
echo pushd=$?

dirs

cd /
echo cd=$?

dirs

popd >/dev/null
echo popd=$?

popd >/dev/null
echo popd=$?
