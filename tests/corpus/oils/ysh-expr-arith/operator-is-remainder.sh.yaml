disabled: true
name: '% operator is remainder'
dialect: bash
source: oils:spec/ysh-expr-arith#operator-is-remainder
stdout: |-
  (Int)   2
  (Int)   -2
  (Int)   1
  (Int)   -1
---
pp test_ ( 5 % 3)
pp test_ (-5 % 3)

# negative divisor illegal (tested in test/ysh-runtime-errors.sh)
#pp test_ ( 5 % -3)
#pp test_ (-5 % -3)

var z = 10
setvar z %= 3
pp test_ (z)

var z = -10
setvar z %= 3
pp test_ (z)
