name: Syntax errors with double quotes within backticks
dialect: bash
source: oils:spec/command-sub#syntax-errors-with-double-quotes-within-backticks
stdout: "status=2\nstatus=2\n"
---

# bash does print syntax errors but somehow it exits 0

$SH -c 'echo `echo "`'
echo status=$?
$SH -c 'echo `echo \\\\"`'
echo status=$?
