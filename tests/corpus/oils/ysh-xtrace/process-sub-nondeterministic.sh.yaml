disabled: true
name: process sub (nondeterministic)
dialect: bash
source: oils:spec/ysh-xtrace#process-sub-nondeterministic
stdout: |
  4
  3
  1
stderr: |2-
    . 12345 builtin echo 1
    . 12345 exec seq 3 4
  . builtin ':' begin
  . builtin set '+x'
  ; process 12345: status 0
  ; process 12345: status 0
  ; process 12345: status 0
  | command 12345: tac /dev/fd/N /dev/fd/N
  | proc sub 12345
  | proc sub 12345
---
shopt --set ysh:upgrade
shopt --unset errexit
set -x

# we wait() for them all at the end

{
  : begin
  tac <(seq 3 4) <(echo 1)
  set +x
} 2>err.txt

# SORT for determinism
sed --regexp-extended 's/[[:digit:]]{2,}/12345/g; s|/fd/.|/fd/N|g' err.txt |
  LC_ALL=C sort >&2
#cat err.txt >&2
