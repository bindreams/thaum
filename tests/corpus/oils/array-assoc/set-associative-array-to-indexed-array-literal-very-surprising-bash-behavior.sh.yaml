name: set associative array to indexed array literal (very surprising bash 
  behavior)
dialect: bash
source: 
  oils:spec/array-assoc#set-associative-array-to-indexed-array-literal-very-surprising-bash-behavior
stdout: |-
  declare -A assoc=(['k1']=foo ['k2']='spam eggs')
  declare -A assoc=(['foo']='spam eggs')
---
declare -A assoc=([k1]=foo [k2]='spam eggs')
declare -p assoc

# Bash 5.1 assoc=(key value). Bash 5.0 (including the currently tested 4.4)
# does not implement this.

assoc=(foo 'spam eggs')
declare -p assoc
