name: trap DEBUG and command sub / subshell
dialect: bash
source: oils:spec/builtin-trap-bash#trap-debug-and-command-sub-subshell
stdout: "  [8]\nresult = command sub\ntwo\nsubshell\ntwo\n  [12]\ndone\n"
---
case $SH in dash|mksh) exit ;; esac

debuglog() {
  echo "  [$@]"
}
trap 'debuglog $LINENO' DEBUG

echo "result = $(echo command sub; echo two)"
( echo subshell
  echo two
)
echo done
