name: command -p (override existing program)
dialect: bash
source: oils:spec/builtin-meta#command--p-override-existing-program
stdout: "wrong\nbbb\n"
---
# Tests whether command -p overrides the path
# tr chosen because we need a simple non-builtin
mkdir -p $TMP/bin
echo "echo wrong" > $TMP/bin/tr
chmod +x $TMP/bin/tr
PATH="$TMP/bin:$PATH"
echo aaa | tr "a" "b"
echo aaa | command -p tr "a" "b"
rm $TMP/bin/tr
