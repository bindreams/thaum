disabled: true
name: Explicit __invoke__ for "objects in a loop", not closures in a loop
dialect: bash
source: 
  oils:spec/ysh-closures#explicit-invoke-for-objects-in-a-loop-not-closures-in-a-loop
stdout: |-
  i = 0
  i = 1
  i = 2
---
shopt --set ysh:upgrade

var procs = []
for i in (0 ..< 3) {
  proc __invoke__ (; self) {
    echo "i = $[self.i]"
  }
  var methods = Object(null, {__invoke__})
  var obj = Object(methods, {i})
  call procs->append(obj)
}

for p in (procs) {
  p
}

