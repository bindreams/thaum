name: Quotes '' "" $'' $"" in pattern
dialect: bash
source: oils:spec/regex#quotes-in-pattern
stdout: |
  sq
  sq=0
  dq
  dq=0
  dollar-sq
  dollar-sq=0
  dollar-dq
  dollar-dq=0
---

$SH <<'EOF'
[[ '|' =~ '|' ]] && echo sq
EOF
echo sq=$?

$SH <<'EOF'
[[ '|' =~ "|" ]] && echo dq
EOF
echo dq=$?

$SH <<'EOF'
[[ '|' =~ $'|' ]] && echo dollar-sq
EOF
echo dollar-sq=$?

$SH <<'EOF'
[[ '|' =~ $"|" ]] && echo dollar-dq
EOF
echo dollar-dq=$?
