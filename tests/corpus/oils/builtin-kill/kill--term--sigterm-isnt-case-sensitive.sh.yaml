name: kill -terM -SigterM isn't case sensitive
dialect: bash
source: oils:spec/builtin-kill#kill--term--sigterm-isnt-case-sensitive
stdout: |
  kill=0
  wait=143
  kill=0
  wait=143
  ## N-I dash/mksh/zsh STDOUT:
---
case $SH in mksh|dash|zsh) exit ;; esac

sleep 0.1 &
pid=$!
kill -SigterM $pid
echo kill=$?
wait $pid
echo wait=$?

sleep 0.1 &
pid=$!
kill -terM $pid
echo kill=$?
wait $pid
echo wait=$?
