name: '[bash_unset] local-unset for nested tempenvs'
dialect: bash
source: oils:spec/ble-unset#bashunset-local-unset-for-nested-tempenvs
stdout: "# value-unset, mksh-unset, tempenv-value-unset?\n[global,tempenv1,tempenv2,tempenv3]
  v: tempenv3\n[global,tempenv1,tempenv2,tempenv3] v: (unset) (unset 1)\n[global,tempenv1,tempenv2,tempenv3]
  v: (unset) (unset 2)\n[global,tempenv1,tempenv2,tempenv3] v: (unset) (unset 3)\n\
  [global,tempenv1,tempenv2,tempenv3] v: (unset) (unset 4)\n"
---
f4_unset() {
  v=tempenv2 eval '
    v=tempenv3 eval "
      echo \"[\$1,tempenv2,tempenv3] v: \${v-(unset)}\"
      unset v
      echo \"[\$1,tempenv2,tempenv3] v: \${v-(unset)} (unset 1)\"
      unset v
      echo \"[\$1,tempenv2,tempenv3] v: \${v-(unset)} (unset 2)\"
      unset v
      echo \"[\$1,tempenv2,tempenv3] v: \${v-(unset)} (unset 3)\"
      unset v
      echo \"[\$1,tempenv2,tempenv3] v: \${v-(unset)} (unset 4)\"
    "
  '
}
v=global
v=tempenv1 f4_unset global,tempenv1



# cell-unset
[global,tempenv1,tempenv2,tempenv3] v: tempenv3
[global,tempenv1,tempenv2,tempenv3] v: tempenv1 (unset 1)
[global,tempenv1,tempenv2,tempenv3] v: global (unset 2)
[global,tempenv1,tempenv2,tempenv3] v: (unset) (unset 3)
[global,tempenv1,tempenv2,tempenv3] v: (unset) (unset 4)
