name: printf negative integer overflow
dialect: bash
source: oils:spec/builtin-printf#printf-negative-integer-overflow
stdout: |+
  status=1
  status=1

  status=1
  status=1

...
---

# %i seems like a synonym for %d

for fmt in '%u\n' '%d\n'; do

  printf "$fmt" '-18446744073709551615'
  echo status=$?
  printf "$fmt" '-18446744073709551616'
  echo status=$?
  echo
done
