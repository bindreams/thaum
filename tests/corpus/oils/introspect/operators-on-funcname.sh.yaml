name: operators on FUNCNAME
dialect: bash
source: oils:spec/introspect#operators-on-funcname
status: 0
stdout: |
  ['check']
  ['5']
  ['c']
  ['heck']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
check() {
  argv.py "${FUNCNAME}"
  argv.py "${#FUNCNAME}"
  argv.py "${FUNCNAME::1}"
  argv.py "${FUNCNAME:1}"
}
check
