disabled: true
name: captureAll() is like $() but captures stderr and status
dialect: bash
source: 
  oils:spec/ysh-method-io#captureall-is-like-but-captures-stderr-and-status
stdout: |
  (Dict)   {"stdout":"stdout\ncaptured\n\u0000","stderr":"stderr\ncaptured\n","status":42}
---

proc p {
  var captured = 'captured'
  var cmd = ^(
    echo stdout
    echo stderr >&2
    echo $captured
    echo $captured >&2
    printf '\000'
    exit 42
  )

  var result = io.captureAll(cmd)
  pp test_ (result)
}

p
