disabled: true
name: ${#s} and len(s)
dialect: bash
source: oils:spec/ysh-unicode#s-and-lens
stdout: "farmer scalars = 4\nfacepalm scalars = 5\nfarmer len = 15\nfacepalm len =
  17\n"
