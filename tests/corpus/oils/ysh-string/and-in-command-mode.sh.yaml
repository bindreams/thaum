disabled: true
name: '""" and $""" in Command Mode'
dialect: bash
source: oils:spec/ysh-string#and-in-command-mode
stdout: "--\none \"\ntwo = 2 \"\"\nthree = 3\n\n--\none \"\ntwo = 2 \"\"\nthree =
  3\n\n--\nthree = 3\ntwo = 2 \"\"\none \"\n"
---

var two=2
var three=3

echo --
echo """
  one "
  two = $two ""
  three = $three
  """

# optional $ prefix
echo --
echo $"""
  one "
  two = $two ""
  three = $three
  """

echo --
tac <<< """
  one "
  two = $two ""
  three = $three
  """
