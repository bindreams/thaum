name: Str.leftMatch() can implement lexer pattern
dialect: bash
source: oils:spec/ysh-regex-api#strleftmatch-can-implement-lexer-pattern
stdout: "pos=0\nnull/ab/null/\n\npos=2\nnull/null/ /\n\npos=3\n12/null/null/\n\npos=5\n\
  ===\npos=0\nnull/ab/null/\n\npos=2\n"
---

shopt -s ysh:upgrade

var lexer = / <capture d+> | <capture [a-z]+> | <capture s+> /
#echo $lexer

proc show-tokens (s) {
  var pos = 0

  while (true) {
    echo "pos=$pos"

    var m = s.leftMatch(lexer, pos=pos)
    if (not m) {
      break
    }
    # TODO: add groups()
    #var groups = [m.group(1), m.group(2), m.group(3)]
    echo "$[m.group(1)]/$[m.group(2)]/$[m.group(3)]/"

    echo

    setvar pos = m.end(0)
  }
}

show-tokens 'ab 12'

echo '==='

# There's a token here that doesn't leftMatch()
show-tokens 'ab+12'
