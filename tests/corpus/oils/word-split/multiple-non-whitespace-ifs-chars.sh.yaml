name: Multiple non-whitespace IFS chars.
dialect: bash
source: oils:spec/word-split#multiple-non-whitespace-ifs-chars
stdout: "['a', '', 'b', '', '', 'c', 'd']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
IFS=_-
s1='a__b---c_d'
argv.py $s1
