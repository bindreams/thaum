disabled: true
name: ${#x} on List and Dict
dialect: bash
source: oils:spec/ysh-with-sh#x-on-list-and-dict
status: 3
stdout: "\n"
---

var L = [1,2,3]

echo List ${#L[@]}
echo List ${#L}
# Not supported.  TODO: could be a problem
#echo List ${#L[0]}

declare -a a=(abc d)

echo array ${#a[@]}
echo array ${#a}
echo array ${#a[0]}

var d = {k: 'v', '0': 'abc'}

echo Dict ${#d[@]}
echo Dict ${#d}
# Not supported.  TODO: could be a problem
#echo Dict ${#d[0]}

declare -A d=([k]=v [0]=abc)

echo Assoc ${#d[@]}
echo Assoc ${#d}
echo Assoc ${#d[0]}
