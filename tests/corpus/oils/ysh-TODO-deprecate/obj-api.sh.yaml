disabled: true
name: Obj API
dialect: bash
source: oils:spec/ysh-TODO-deprecate#obj-api
stdout: |
  (Obj)   ("x":4)
  0
  (Dict)   {"x":4}
  0
  (Null)   null
  0
---
shopt --set ysh:upgrade

try {
  var obj = Object(null, {x: 4})
  pp test_ (obj)
}
echo $[_error.code]

try {
  pp test_ (propView(obj))
}
echo $[_error.code]

try {
  pp test_ (prototype(obj))
}
echo $[_error.code]
