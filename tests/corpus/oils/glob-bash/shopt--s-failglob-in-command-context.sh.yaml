name: shopt -s failglob in command context
dialect: bash
source: oils:spec/glob-bash#shopt--s-failglob-in-command-context
stdout: |
  ['*.ZZ']
  status=1
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
argv.py *.ZZ
shopt -s failglob
argv.py *.ZZ  # nothing is printed, not []
echo status=$?
