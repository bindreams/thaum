name: is-array with ${var@a}
dialect: bash
source: oils:spec/ble-idioms#is-array-with-vara
stdout: |
  undef 1
  string 1
  array 0
---
case $SH in mksh|ash|dash|yash) exit 1 ;; esac

function ble/is-array { [[ ${!1@a} == *a* ]]; }

ble/is-array undef
echo undef $?

string=''
ble/is-array string
echo string $?

array=(one two three)
ble/is-array array
echo array $?
