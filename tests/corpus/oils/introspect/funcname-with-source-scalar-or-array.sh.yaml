name: FUNCNAME with source (scalar or array)
dialect: bash
source: oils:spec/introspect#funcname-with-source-scalar-or-array
stdout: "['  @', 'source', 'f', 'g']\n['  0', 'source']\n['${}', 'source']\n['  $',
  'source']\n-----\n['  @', 'source']\n['  0', 'source']\n['${}', 'source']\n['  $',
  'source']\n-----\n[]\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
cd $REPO_ROOT

# Comments on bash quirk:
# https://github.com/oilshell/oil/pull/656#issuecomment-599162211

f() {
  . spec/testdata/echo-funcname.sh
}
g() {
  f
}

g
echo -----

. spec/testdata/echo-funcname.sh
echo -----

argv.py "${FUNCNAME[@]}"

# Show bash inconsistency.  FUNCNAME doesn't behave like a normal array.
case $SH in 
  (bash)
    echo -----
    a=('A')
    argv.py '  @' "${a[@]}"
    argv.py '  0' "${a[0]}"
    argv.py '${}' "${a}"
    argv.py '  $' "$a"
    ;;
esac
