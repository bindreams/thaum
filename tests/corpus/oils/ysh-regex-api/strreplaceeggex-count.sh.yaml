disabled: true
name: Str.replace(Eggex, *, count)
dialect: bash
source: oils:spec/ysh-regex-api#strreplaceeggex-count
stdout: "1-2-3-\n1-2-3-\n1-2-3-\n1-2-3-\n1-2-3-\n1-2-3-\n1-2-3-\n1-2-3-\n1abc2abc3abc\n\
  1abc2abc3abc\n1abc2abc3abc\n1abc2abc3abc\n1-2abc3abc\n1-2abc3abc\n1-2abc3abc\n1-2abc3abc\n\
  1-2-3abc\n1-2-3abc\n1-2-3abc\n1-2-3abc\n1-2-3-\n1-2-3-\n1-2-3-\n1-2-3-\n"
---
shopt --set ysh:all

var mystr = '1abc2abc3abc'

for count in (-2..<4) {
  write $[mystr.replace('abc', "-", count=count)]
  write $[mystr.replace('abc', ^"-", count=count)]
  write $[mystr.replace(/ [a-z]+ /, "-", count=count)]
  write $[mystr.replace(/ [a-z]+ /, "-", count=count)]
}
