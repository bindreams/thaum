name: procs in hay eval
dialect: bash
source: oils:spec/hay-isolation#procs-in-hay-eval
stdout: "outside\ninside\n1 OUT\n"
---
shopt --set parse_brace parse_at parse_proc parse_ysh_expr_sub

hay define Package

proc outside {
  echo outside
  Package OUT
}

hay eval :result {
  outside

  proc inside {
    echo inside
  }

  inside
}

const args = result['children'][0]['args']
write --sep ' ' -- $[len(result['children'])] @args
