disabled: true
name: J8 supports superfluous \" escapes, but JSON doesn't support \' escapes
dialect: bash
source: 
  oils:spec/ysh-json#j8-supports-superfluous-escapes-but-json-doesnt-support-escapes
stdout: "reply=\"\n(Str)   \"''\\b\\f\\n\\r\\t\\\"\\\\\"\npython3=1\njson=1\n"
---

json8 read <<'EOF'
b'\"'
EOF
echo reply=$_reply

json8 read <<'EOF'
b'\'\'\b\f\n\r\t\"\\'
EOF
pp test_ (_reply)

# Suppress traceback
python3 -c 'import json, sys; print(json.load(sys.stdin))' 2>/dev/null <<'EOF'
"\'"
EOF
echo python3=$?

json read <<'EOF'
"\'"
EOF
echo json=$?
