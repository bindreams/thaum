disabled: true
name: Indexed array as key of associative array coerces to string (without shopt
  -s strict_array)
dialect: bash
source: 
  oils:spec/array-assoc#indexed-array-as-key-of-associative-array-coerces-to-string-without-shopt--s-strictarray
stdout: "foo\n1 2 3\n42\n"
---

declare -a array=(1 2 3)
declare -A assoc
assoc[42]=43
assoc["${array[@]}"]=foo

echo "${assoc["${array[@]}"]}"
for entry in "${!assoc[@]}"; do
  echo $entry
done | sort
