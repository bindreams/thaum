name: Retrieve array indices with ${!a}
dialect: bash
source: oils:spec/array#retrieve-array-indices-with-a
stdout: |
  ['0', '1']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
a=(1 '2 3')
argv.py "${!a[@]}"
