name: mapfile -t doesn't remove \r
dialect: bash
source: oils:spec/builtin-bash#mapfile--t-doesnt-remove-r
stdout: "['1\\r', '3\\r', '5\\r']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
type mapfile >/dev/null 2>&1 || exit 0
printf '%s\r\n' {1..5..2} | {
  mapfile -t arr
  argv.py "${arr[@]}"
}
