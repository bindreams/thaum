name: default value can yield multiple words
dialect: bash
source: oils:spec/word-split#default-value-can-yield-multiple-words
stdout: |
  ['1', '2 3', '4 5', '6']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
argv.py 1 ${undefined:-"2 3" "4 5"} 6
