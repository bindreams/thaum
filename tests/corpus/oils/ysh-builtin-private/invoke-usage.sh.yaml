disabled: true
name: invoke usage
dialect: bash
source: oils:spec/ysh-builtin-private#invoke-usage
stdout: |
  status=2
  status=2

  status=2
  status=2
  status=0
---
case $SH in bash) exit ;; esac

invoke
echo status=$?

invoke --
echo status=$?

echo

invoke sleep 0
echo status=$?

invoke -- sleep 0
echo status=$?

invoke --builtin -- sleep 0
echo status=$?
