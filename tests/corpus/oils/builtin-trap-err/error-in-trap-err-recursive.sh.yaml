name: error in trap ERR (recursive)
dialect: bash
source: oils:spec/builtin-trap-err#error-in-trap-err-recursive
status: 1
stdout: |
  A
  err status 1
  err 2
  B
  err status 1
---
case $SH in dash) exit ;; esac

err() {
  echo err status $?
  false
  ( exit 2 )  # not recursively triggered
  echo err 2
}
trap 'err' ERR 

echo A
false
echo B

# Try it with errexit
set -e
false
echo C
