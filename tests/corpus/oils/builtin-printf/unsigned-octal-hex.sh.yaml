name: unsigned / octal / hex
dialect: bash
source: oils:spec/builtin-printf#unsigned-octal-hex
stdout: |-
  [42]
  [52]
  [2a]
  [2A]

  [61]
  [61]
---
printf '[%u]\n' 42
printf '[%o]\n' 42
printf '[%x]\n' 42
printf '[%X]\n' 42
echo

printf '[%X]\n' \'a  # if first character is a quote, use character code
printf '[%X]\n' \'ab # extra chars ignored
