name: -u for setuid, -g too
dialect: bash
source: oils:spec/builtin-bracket#u-for-setuid--g-too
stdout: |
  status=0
  status=1
  status=1
  status=0
environment:
  TMP: /tmp
---

touch $TMP/setuid $TMP/setgid
chmod u+s $TMP/setuid
chmod g+s $TMP/setgid

test -u $TMP/setuid
echo status=$?

test -u $TMP/setgid
echo status=$?

test -g $TMP/setuid
echo status=$?

test -g $TMP/setgid
echo status=$?
