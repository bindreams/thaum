name: unsigned / octal / hex big
dialect: bash
source: oils:spec/builtin-printf#unsigned-octal-hex-big
stdout: "[4294967296]\n[40000000000]\n[100000000]\n[100000000]\n\n[9223372036854775807]\n\
  [777777777777777777777]\n[7fffffffffffffff]\n[7FFFFFFFFFFFFFFF]\n\n"
---

for big in $(( 1 << 32 )) $(( (1 << 63) - 1 )); do
  printf '[%u]\n' $big
  printf '[%o]\n' $big
  printf '[%x]\n' $big
  printf '[%X]\n' $big
  echo
done
