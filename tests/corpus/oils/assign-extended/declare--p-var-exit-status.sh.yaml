name: declare -p var (exit status)
dialect: bash
source: oils:spec/assign-extended#declare--p-var-exit-status
stdout: "1\n1\n0\n## N-I mksh STDOUT:\n127\n127\n127\n"
---
var1() { echo func; }  # function names are NOT found.
declare -p var1 var2 >/dev/null
echo $?

var1=x
declare -p var1 var2 >/dev/null
echo $?

var2=y
declare -p var1 var2 >/dev/null
echo $?
