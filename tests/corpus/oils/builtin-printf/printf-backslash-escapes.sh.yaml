name: printf backslash escapes
dialect: bash
source: oils:spec/builtin-printf#printf-backslash-escapes
stdout: "['a\\tb']\n['\\xe2\\x98\\xa0']\n['$e']\n['\\x1f7']\n"
---
argv.py "$(printf 'a\tb')"
argv.py "$(printf '\xE2\x98\xA0')"
argv.py "$(printf '\044e')"
argv.py "$(printf '\0377')"  # out of range
