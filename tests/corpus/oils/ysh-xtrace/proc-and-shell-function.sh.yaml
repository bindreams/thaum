disabled: true
name: proc and shell function
dialect: bash
source: oils:spec/ysh-xtrace#proc-and-shell-function
stdout: ''
stderr: |
  > proc shfunc 1
    . builtin ':' 1
  < proc shfunc
  > proc p 2
    . builtin ':' 2
  < proc p
---
shopt --set ysh:upgrade
set -x

shfunc() {
  : $1
}

proc p (x) {
  : $x
}

shfunc 1
p 2
