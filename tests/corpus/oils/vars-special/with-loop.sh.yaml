name: $_ with loop
dialect: bash
source: oils:spec/vars-special#with-loop
stdout: |-
  init
  begin=init
  prev=begin=init
  prev=prev=begin=init
  prev=prev=prev=begin=init
---

case $SH in dash|mksh) exit ;; esac

# zsh resets it when in a loop

echo init
echo begin=$_
for x in 1 2 3; do
  echo prev=$_
done
