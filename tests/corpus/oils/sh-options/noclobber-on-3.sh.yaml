name: noclobber on &> >
dialect: bash
source: oils:spec/sh-options#noclobber-on
stdout: "stdout=0\nagain=1\nfoo\nboth=0\nagain=1\nbaz\n"
---
case $SH in dash) exit ;; esac

set -C

rm -f $TMP/no-clobber
echo foo > $TMP/no-clobber
echo stdout=$?
echo bar > $TMP/no-clobber
echo again=$?
cat $TMP/no-clobber

rm -f $TMP/no-clobber
echo baz &> $TMP/no-clobber
echo both=$?
echo foo &> $TMP/no-clobber
echo again=$?
cat $TMP/no-clobber
