name: simple_eval_builtin
dialect: bash
source: oils:spec/strict-options#simpleevalbuiltin
stdout: |
  status=0
  one
  status=0
  two
  status=0
  ---
  status=2
  status=2
  two
  status=0
  ---
---
for i in 1 2; do
  eval  # zero args
  echo status=$?
  eval echo one
  echo status=$?
  eval 'echo two'
  echo status=$?
  shopt -s simple_eval_builtin
  echo ---
done
