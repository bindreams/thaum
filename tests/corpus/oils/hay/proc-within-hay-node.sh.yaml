disabled: true
name: Proc within Hay node
dialect: bash
source: oils:spec/hay#proc-within-hay-node
stdout: "\n"
---
shopt --set ysh:all

hay define Package

Package cpython {
  version = '3.11'

  proc build {
    # procs have to capture
    echo "version=$version"
    make
  }
}

# OK we have the proc
= _hay()

var build_proc = _hay().children[0].attrs.build

= build_proc

build_proc

#json write (_hay())
