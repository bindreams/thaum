disabled: true
name: Splice in array
dialect: bash
source: oils:spec/ysh-word-eval#splice-in-array
stdout: "['one', 'two', 'three']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
shopt -s ysh:upgrade
var a = %(one two three)
argv.py @a
