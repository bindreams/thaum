name: Splitting/Globbing doesn't happen on local assignment
dialect: bash
source: oils:spec/glob#splittingglobbing-doesnt-happen-on-local-assignment
stdout: |
  void *
---
cd $REPO_ROOT

f() {
  # Dash splits words and globs before handing it to the 'local' builtin.  But
  # ash doesn't!
  local foo=$1
  echo "$foo"
}
f 'void *'
