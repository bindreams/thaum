name: Getopts parses the function's arguments
dialect: bash
source: oils:spec/builtin-getopts#getopts-parses-the-functions-arguments
stdout: |-
  h=0 c=bar opt=? optind=3 argv=-h -c foo x y z
---
FLAG_h=0
FLAG_c=''
myfunc() {
  while getopts "hc:" opt; do
    case $opt in
      h) FLAG_h=1 ;;
      c) FLAG_c="$OPTARG" ;;
    esac
  done
}
set -- -h -c foo x y z
myfunc -c bar
echo h=$FLAG_h c=$FLAG_c opt=$opt optind=$OPTIND argv=$@
