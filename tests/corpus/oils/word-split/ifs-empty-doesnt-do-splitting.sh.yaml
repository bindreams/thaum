name: IFS empty doesn't do splitting
dialect: bash
source: oils:spec/word-split#ifs-empty-doesnt-do-splitting
stdout: |
  [' a b\tc']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
IFS=''
x=$(python2 -c 'print(" a b\tc\n")')
argv.py $x
