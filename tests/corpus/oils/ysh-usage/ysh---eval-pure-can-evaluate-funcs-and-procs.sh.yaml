name: ysh --eval-pure can evaluate funcs and procs
dialect: bash
source: oils:spec/ysh-usage#ysh---eval-pure-can-evaluate-funcs-and-procs
stdout: "my-proc\nmyFunc\n"
---

echo >pure.ysh '
proc my-proc { echo "my-proc" }
func myFunc() { return ("myFunc") }
'

$[ENV.SH] --eval-pure pure.ysh -c 'my-proc; echo $[myFunc()]'
