disabled: true
name: Binary operators, with conversions from string
dialect: bash
source: oils:spec/ysh-expr-arith#binary-operators-with-conversions-from-string
stdout: |2-
   i  i 3
  si  i 3
   i si 3
  ---
   f  f 1.0
  sf  f 1.0
   f sf 1.0
  ---
   i  f 6.0
  si  f 6.0
   i sf 6.0
  ---
   f  i 2.5
  sf  i 2.5
   f si 2.5
---
shopt --set parse_ysh_expr_sub

echo ' i  i' $[1 + 2]
echo 'si  i' $['1' + 2]
echo ' i si' $[1 + '2']
echo ---

echo ' f  f' $[2.5 - 1.5]
echo 'sf  f' $['2.5' - 1.5]
echo ' f sf' $[2.5 - '1.5']
echo ---

echo ' i  f' $[4 * 1.5]
echo 'si  f' $['4' * 1.5]
echo ' i sf' $[4 * '1.5']
echo ---

echo ' f  i' $[5.0 / 2]
echo 'sf  i' $['5.0' / 2]
echo ' f si' $[5.0 / '2']
