name: io->eval with in_captured_frame=true can express cd builtin
dialect: bash
source: 
  oils:spec/ysh-builtin-eval#io-eval-with-incapturedframetrue-can-express-cd-builtin
stdout: "/tmp\nmy_pwd=/tmp\nj = 43\n"
---

proc my-cd (new_dir; ; ; block) {
  pushd $new_dir >/dev/null

  if (0) {
    # Get calling frame.  (The top-most frame, this one, has index -1)
    # This idiom does NOT work with modules
    var calling_frame = vm.getFrame(-2)
    call io->evalInFrame(block, calling_frame)
  } else {
    #call io->evalInCapturedFrame(block)
    call io->eval(block, in_captured_frame=true)
  }

  popd >/dev/null
}

var i = 42
my-cd /tmp {
  echo $PWD
  var my_pwd = PWD
  var j = i + 1
}
echo "my_pwd=$my_pwd"
echo "j = $j"
