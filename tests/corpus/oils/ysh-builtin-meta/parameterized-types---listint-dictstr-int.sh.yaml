name: Parameterized types - List[Int], Dict[Str, Int]
dialect: bash
source: oils:spec/ysh-builtin-meta#parameterized-types---listint-dictstr-int
stdout: "(Obj)   (\"unique_id\":\"List[Int]\")\n(Obj)   (\"unique_id\":\"Dict[Str,Int]\"\
  )\n(Obj)   (\"unique_id\":\"List[List[Int]]\")\n(Obj)   (\"unique_id\":\"Dict[Str,List[Int]]\"\
  )\n"
---
shopt -s ysh:upgrade

var li = List[Int]
var dsi = Dict[Str, Int]

pp test_ (li)
pp test_ (dsi)

# test identity
for i in a b c {
  assert [li is List[Int]]
  assert [dsi is Dict[Str,Int]]
}

assert [li is not dsi]

var lli = List[li]
pp test_ (lli)

pp test_ (Dict[Str, List[Int]])
