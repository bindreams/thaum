name: trap DEBUG with non-compound commands
dialect: bash
source: oils:spec/builtin-trap-bash#trap-debug-with-non-compound-commands
stdout: |2-
    [8]
  a
    [9]
  b
    [9]
  c
    [11]
  d
    [11]
  e
    [12]
  f
    [14]
    [15]
    [17]
    [19]
---
case $SH in dash|mksh) exit ;; esac

debuglog() {
  echo "  [$@]"
}
trap 'debuglog $LINENO' DEBUG

echo a
echo b; echo c

echo d && echo e
echo f || echo g

(( h = 42 ))
[[ j == j ]]

var=value

readonly r=value
