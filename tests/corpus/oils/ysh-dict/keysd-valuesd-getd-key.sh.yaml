disabled: true
name: keys(d), values(d), get(d, key)
dialect: bash
source: oils:spec/ysh-dict#keysd-valuesd-getd-key
stdout: "(List)   [\"a\",\"b\"]\n(List)   [42,99]\n(Int)   42\n(Str)   \"default\"\
  \n"
---

var d = {a: 42, b: 99}

pp test_ (keys(d))
pp test_ (values(d))

pp test_ (get(d, 'a', 'default'))
pp test_ (get(d, 'key', 'default'))
