disabled: true
name: 'osh -O errexit: use -O everywhere, even for Bourne options'
dialect: bash
source: 
  oils:spec/ysh-options#osh--o-errexit-use--o-everywhere-even-for-bourne-options
stdout: "set -o errexit\n"
---
$SH -O errexit -c 'shopt -p -o errexit'
#$SH -O errexit -c 'shopt -p errexit'  # bash doesn't allow this, but Oils does
