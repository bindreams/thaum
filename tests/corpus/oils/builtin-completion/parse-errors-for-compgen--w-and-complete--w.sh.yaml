name: Parse errors for compgen -W and complete -W
dialect: bash
source: oils:spec/builtin-completion#parse-errors-for-compgen--w-and-complete--w
stdout: |
  status=2
  status=2
---
# bash doesn't detect as many errors because it lacks static parsing.
compgen -W '${'
echo status=$?
complete -W '${' foo
echo status=$?
