name: ${!r@a} with r='a[0]' (attribute for indirect expansion of an array 
  element)
dialect: bash
source: 
  oils:spec/var-op-bash#ra-with-ra0-attribute-for-indirect-expansion-of-an-array-element
stdout: |-
  a
  a
  A
  A
---

a=(1 2 3)
r='a'
echo ${!r@a}
r='a[0]'
echo ${!r@a}

declare -A d=([0]=foo [1]=bar)
r='d'
echo ${!r@a}
r='d[0]'
echo ${!r@a}
