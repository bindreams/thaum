disabled: true
name: trap block arg is a not a closure - like cd and other builtins
dialect: bash
source: 
  oils:spec/ysh-builtin-trap#trap-block-arg-is-a-not-a-closure---like-cd-and-other-builtins
stdout: "x = global\n"
---

# e.g. We're not using ctx_EnclosedFrame in RunTrapsOnExit() and in the signal
# handlers.  It's more similar to OSH.

var x = 'global'

proc register {
  var x = 'local'
  trap --add EXIT {
     echo "x = $x"
  }
}

register
