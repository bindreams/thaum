name: Array indirect expansion with suffix operators
dialect: bash
source: oils:spec/var-ref#array-indirect-expansion-with-suffix-operators
stdout: |
  ==== v1 ====
  ['lue']
  ['al']
  ['value']
  ['set']
  ['value']
  v1=value
  ==== v2 ====
  ['']
  ['']
  ['empty']
  ['']
  ['assign']
  v2=assign
  ==== a1 ====
  ['']
  ['']
  ['empty']
  ['']
  ['assign']
  ['assign']
  ==== a2[0] ====
  ['ement']
  ['le']
  ['element']
  ['set']
  ['element']
  ['element']
  ==== a3[@] ====
  ['3']
  ['2', '3']
  ['1', '2', '3']
  ['set']
  ['1', '2', '3']
  ['1', '2', '3']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

declare -A ref=(['dummy']=v1)
function test-suffixes {
  echo "==== $1 ===="
  ref['dummy']=$1
  argv.py "${!ref[@]:2}"
  argv.py "${!ref[@]:1:2}"
  argv.py "${!ref[@]:-empty}"
  argv.py "${!ref[@]:+set}"
  argv.py "${!ref[@]:=assign}"
}

v1=value
test-suffixes v1
echo "v1=$v1"

v2=
test-suffixes v2
echo "v2=$v2"

a1=()
test-suffixes a1
argv.py "${a1[@]}"

a2=(element)
test-suffixes 'a2[0]'
argv.py "${a2[@]}"

a3=(1 2 3)
test-suffixes 'a3[@]'
argv.py "${a3[@]}"
