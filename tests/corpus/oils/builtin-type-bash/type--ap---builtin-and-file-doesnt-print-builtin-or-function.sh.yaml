name: type -ap -> builtin and file; doesn't print builtin or function
dialect: bash
source: 
  oils:spec/builtin-type-bash#type--ap---builtin-and-file-doesnt-print-builtin-or-function
stdout: "/bin/pwd\n_tmp/pwd\n---\n"
---
touch _tmp/pwd
chmod +x _tmp/pwd
PATH=/bin:_tmp  # control output

# Function is also ignored
pwd() { echo function-too; }

type -ap pwd
echo ---

type -p pwd
