disabled: true
name: 'Regression: 1/3 gives 0.3+'
dialect: bash
source: oils:spec/ysh-int-float#regression-13-gives-03
stdout: "one-third\ntwo-thirds\n"
---

# We were using float precision, not double

shopt --set ysh:upgrade

pp test_ (1/3) | read --all
if (_reply ~ / '0.' '3'+ / ) {
  echo one-third
}

pp test_ (2/3) | read --all
#pp test_ (_reply)
if (_reply ~ / '0.' '6'+ / ) {
  echo two-thirds
}
