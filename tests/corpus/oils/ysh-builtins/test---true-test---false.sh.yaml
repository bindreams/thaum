disabled: true
name: test --true; test --false
dialect: bash
source: oils:spec/ysh-builtins#test---true-test---false
stdout: |+
  (Bool)   true
  true=0
  false=1

  (Bool)   false
  true=1
  false=0

  (Str)   ""
  true=1
  false=1

  (Str)   "other"
  true=1
  false=1

...
---
shopt --set ysh:upgrade

for expr in (true, false, '', 'other') {
  pp test_ (expr)

  try {
    test --true $[expr]
  }
  echo true=$[_error.code]

  try {
    test --false $[expr]
  }
  echo false=$[_error.code]
  echo
}
