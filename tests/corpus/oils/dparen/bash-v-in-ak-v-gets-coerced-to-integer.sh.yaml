name: 'bash: V in (( A["K"] = V )) gets coerced to integer'
dialect: bash
source: oils:spec/dparen#bash-v-in-ak-v-gets-coerced-to-integer
stdout: |
  A["key"]=
  keys = K
  values = 0
---
shopt -u strict_arith || true
K=key
V=value
typeset -A A || exit 1
(( A["K"] = V ))

# not there!
echo A[\"key\"]=${A[$K]}

echo keys = ${!A[@]}
echo values = ${A[@]}
