name: 'Issue #1069 [53] - LHS array parsing a[1 + 2]=3 (see spec/array-assign for
  more)'
dialect: bash
source: 
  oils:spec/ble-idioms#issue-1069-53---lhs-array-parsing-a1-23-see-specarray-assign-for-more
stdout: "declare -a a=([3]=\"7\" [7]=\"8\" [9]=\"9\")\ndeclare -a a=([3]=\"55\" [7]=\"\
  8\" [9]=\"9\" [41]=\"66\")\n"
---
case $SH in zsh|ash) exit ;; esac

a[1 + 2]=7
a[3|4]=8
a[(1+2)*3]=9

typeset -p a

# Dynamic parsing
expr='1 + 2'
a[expr]=55

b=(42)
expr='b[0]'
a[3 + $expr - 4]=66

typeset -p a
