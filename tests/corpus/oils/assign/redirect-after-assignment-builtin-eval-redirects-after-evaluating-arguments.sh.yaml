name: redirect after assignment builtin (eval redirects after evaluating 
  arguments)
dialect: bash
source: 
  oils:spec/assign#redirect-after-assignment-builtin-eval-redirects-after-evaluating-arguments
stdout: "done\n"
stderr: "STDERR\n"
setup: |
  #!/bin/sh
  cat > stdout_stderr.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  stdout = sys.argv[1] if len(sys.argv) > 1 else "STDOUT"
  stderr = sys.argv[2] if len(sys.argv) > 2 else "STDERR"
  status = int(sys.argv[3]) if len(sys.argv) > 3 else 0
  print(stdout)
  print(stderr, file=sys.stderr)
  sys.exit(status)
  HELPER
  chmod +x stdout_stderr.py

---

# See also: spec/redir-order.test.sh (#2307)
# The $(stdout_stderr.py) is evaluated *before* the 2>/dev/null redirection

readonly x=$(stdout_stderr.py) 2>/dev/null
echo done
