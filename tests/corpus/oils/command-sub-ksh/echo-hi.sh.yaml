name: ${ echo hi;}
dialect: bash
source: oils:spec/command-sub-ksh#echo-hi
status: 1
stdout: "[hi]\n\n[one\ntwo]\n\n[ 3 \n 4 5 ]\n\n"
---

x=${ echo hi;}
echo "[$x]"
echo

# trailing space allowed
x=${ echo one; echo two; }
echo "[$x]"
echo

myfunc() {
  echo ' 3 '
  echo ' 4 5 '
}

x=${ myfunc;}
echo "[$x]"
echo

# SYNTAX ERROR
x=${myfunc;}
echo "[$x]"
