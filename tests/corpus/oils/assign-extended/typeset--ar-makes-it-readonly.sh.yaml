name: typeset -ar makes it readonly
dialect: bash
source: oils:spec/assign-extended#typeset--ar-makes-it-readonly
status: 1
stdout: ''
---
typeset -a -r array1=(1 2)
typeset -ar array2=(3 4)

array1=('c')
echo status=$?
array2=('d')
echo status=$?

array1+=('e')
echo status=$?
array2+=('f')
echo status=$?

unset array1
echo status=$?
unset array2
echo status=$?
