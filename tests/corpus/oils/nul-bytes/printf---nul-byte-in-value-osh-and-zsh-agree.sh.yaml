name: printf - NUL byte in value (OSH and zsh agree)
dialect: bash
source: oils:spec/nul-bytes#printf---nul-byte-in-value-osh-and-zsh-agree
stdout: "  \\n\n  0a\n  \\n\n  0a\n"
---
case $SH in dash) exit ;; esac
show_hex() { od -A n -t c -t x1; }

nul=$'\0'
echo "$nul" | show_hex
printf '%s\n' "$nul" | show_hex
