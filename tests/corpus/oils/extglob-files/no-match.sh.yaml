name: no match
dialect: bash
source: oils:spec/extglob-files#no-match
stdout: |-
  @(__nope__)
  @(__nope__*|__nope__?|*|?|[:alpha:]||)
---
shopt -s extglob
echo @(__nope__)

# OSH has glob quoting here
echo @(__nope__*|__nope__?|'*'|'?'|'[:alpha:]'|'|')

if test $SH != osh; then
  exit
fi

# OSH has this alias for @()
echo ,(osh|style)
