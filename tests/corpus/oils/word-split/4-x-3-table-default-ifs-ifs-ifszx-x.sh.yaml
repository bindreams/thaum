name: "4 x 3 table: (default IFS, IFS='', IFS=zx) x ( $* \"$*\" $@ \"$@\" )"
dialect: bash
source: oils:spec/word-split#4-x-3-table-default-ifs-ifs-ifszx-x
stdout: |
  ['  $*  ', 'a', 'b', 'c']
  [' "$*" ', 'a b c ']
  ['  $@  ', 'a', 'b', 'c']
  [' "$@" ', 'a b', 'c', '']

  ['  $*  ', 'a b', 'c']
  [' "$*" ', 'a bc']
  ['  $@  ', 'a b', 'c']
  [' "$@" ', 'a b', 'c', '']

  ['  $*  ', 'a b', 'c']
  [' "$*" ', 'a bzcz']
  ['  $@  ', 'a b', 'c']
  [' "$@" ', 'a b', 'c', '']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

setopt SH_WORD_SPLIT  # for zsh

set -- 'a b' c ''

# default IFS
argv.py '  $*  '  $*
argv.py ' "$*" ' "$*"
argv.py '  $@  '  $@
argv.py ' "$@" ' "$@"
echo

IFS=''
argv.py '  $*  '  $*
argv.py ' "$*" ' "$*"
argv.py '  $@  '  $@
argv.py ' "$@" ' "$@"
echo

IFS=zx
argv.py '  $*  '  $*
argv.py ' "$*" ' "$*"
argv.py '  $@  '  $@
argv.py ' "$@" ' "$@"


# zsh disagrees on
# - $@ with default IFS an
# - $@ with IFS=zx
