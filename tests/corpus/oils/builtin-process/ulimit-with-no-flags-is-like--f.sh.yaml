name: ulimit with no flags is like -f
dialect: bash
source: oils:spec/builtin-process#ulimit-with-no-flags-is-like--f
stdout: "status=0\nstatus=0\ndiff=0\n"
---

ulimit > no-flags.txt
echo status=$?

ulimit -f > f.txt
echo status=$?

diff -u no-flags.txt f.txt
echo diff=$?

# Print everything
# ulimit -a
