disabled: true
name: Group ()
dialect: bash
source: oils:spec/ysh-regex#group
stdout: |
  (^[[:space:]]|[[:digit:]][[:digit:]])
  yes
  yes
  no
---
shopt -s ysh:all
var pat = ''

setvar pat = /(%start s or d d)/
echo $pat

if (' foo' ~ pat) { echo yes } else { echo no }
if ('-00-' ~ pat) { echo yes } else { echo no }
if ('foo' ~ pat) { echo yes } else { echo no }
