name: invoke usage
dialect: bash
source: oils:spec/ysh-builtin-private#invoke-usage
stdout: "status=2\nstatus=2\n\nstatus=2\nstatus=2\nstatus=0\n"
---
case $SH in bash) exit ;; esac

invoke
echo status=$?

invoke --
echo status=$?

echo

invoke sleep 0
echo status=$?

invoke -- sleep 0
echo status=$?

invoke --builtin -- sleep 0
echo status=$?
