name: with eval builtin command, reeturning Dict
dialect: bash
source: oils:spec/ysh-proc-meta#with-eval-builtin-command-reeturning-dict
stdout: "prefix a\nprefix b\n"
---

func genProcs() {
  var result = {}
  for param in a b {
    eval """
    proc echo_$param(prefix) {
      echo \$prefix $param
    }
    """
    setvar result["echo_$param"] = getVar("echo_$param")
  }
  return (result)
}

var procs = genProcs()

# bind to global scope
for name in (procs) {
  call setVar("my_$name", procs[name], global=true)
}

my_echo_a prefix
my_echo_b prefix
