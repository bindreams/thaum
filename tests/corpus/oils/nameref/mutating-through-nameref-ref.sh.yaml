name: 'mutating through nameref: ref='
dialect: bash
source: oils:spec/nameref#mutating-through-nameref-ref
stdout: |
  1 ref=y
  2 ref=YY
  3 ref=XXXX
  4 y=XXXX
---
x=XX
y=YY

ref=x
ref=y
echo 1 ref=$ref

# now it's a reference
typeset -n ref

echo 2 ref=$ref  # prints YY

ref=XXXX
echo 3 ref=$ref  # it actually prints y, which is XXXX

# now Y is mutated!
echo 4 y=$y
