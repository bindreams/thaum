name: bind -r
dialect: bash
source: oils:spec/builtin-bind#bind--r
stdout: |-
  status=1
  \C-o\C-s\C-h
  status=0
  status=1
---
bind -q yank | grep -oF '\C-o\C-s\C-h'
echo status=$?

bind '"\C-o\C-s\C-h": yank'
bind -q yank | grep -oF '\C-o\C-s\C-h'
echo status=$?

bind -r "\C-o\C-s\C-h"
bind -q yank | grep -oF '\C-o\C-s\C-h'
echo status=$?
