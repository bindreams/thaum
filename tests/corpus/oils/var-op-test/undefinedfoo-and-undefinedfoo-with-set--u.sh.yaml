name: '"${undefined[@]+foo}" and "${undefined[@]:+foo}", with set -u'
dialect: bash
source: oils:spec/var-op-test#undefinedfoo-and-undefinedfoo-with-set--u
stdout: "plus //\nplus colon //\n"
---
case $SH in dash) exit ;; esac

set -u

echo plus /"${array[@]+foo}"/
echo plus colon /"${array[@]:+foo}"/
