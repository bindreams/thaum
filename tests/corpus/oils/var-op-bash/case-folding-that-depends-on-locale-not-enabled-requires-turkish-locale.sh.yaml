name: Case folding that depends on locale (not enabled, requires Turkish locale)
dialect: bash
source: 
  oils:spec/var-op-bash#case-folding-that-depends-on-locale-not-enabled-requires-turkish-locale
stdout: |-
  u I
  U I
  l i
  L i
---

# Hm this works in demo/survey-case-fold.sh
# Is this a bash 4.4 thing?

#export LANG='tr_TR.UTF-8'
#echo $LANG

x='i'

echo u ${x^}
echo U ${x^^}

echo l ${x,}
echo L ${x,,}
