disabled: true
name: type / type -a agrees on ordering of shell functions and procs
dialect: bash
source: 
  oils:spec/ysh-proc#type-type--a-agrees-on-ordering-of-shell-functions-and-procs
stdout: "sh-func\nfunction\n\nYSH proc\nproc\n"
---
shopt --set ysh:upgrade

#type -t p

p() {
   echo 'sh-func'
}
p
type -t p
echo

proc p {
  echo 'YSH proc'
}
p
type -t p
