name: Arrays are incorrectly compared, but strict_array prevents it
dialect: bash
source: 
  oils:spec/strict-options#arrays-are-incorrectly-compared-but-strictarray-prevents-it
status: 1
stdout: |
  2
  4
  EQUAL
---

# NOTE: from spec/dbracket has a test case like this
# sane-array should turn this ON.
# bash and mksh allow this because of decay

a=('a b' 'c d')
b=('a' 'b' 'c' 'd')
echo ${#a[@]}
echo ${#b[@]}
[[ "${a[@]}" == "${b[@]}" ]] && echo EQUAL

shopt -s strict_array || true
[[ "${a[@]}" == "${b[@]}" ]] && echo EQUAL
