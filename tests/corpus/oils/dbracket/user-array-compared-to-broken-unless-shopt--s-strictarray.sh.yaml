name: User array compared to "$@" (broken unless shopt -s strict_array)
dialect: bash
source: 
  oils:spec/dbracket#user-array-compared-to-broken-unless-shopt--s-strictarray
stdout: "true\nfalse\n"
---
# Both are coerced to string!  It treats it more like an  UNQUOTED ${a[@]}.

a=('1 3' 5)
b=(1 2 3)
set -- 1 '3 5'
[[ "$@" = "${a[@]}" ]] && echo true
[[ "$@" = "${b[@]}" ]] || echo false
