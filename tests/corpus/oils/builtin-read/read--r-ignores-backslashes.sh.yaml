name: read -r ignores backslashes
dialect: bash
source: oils:spec/builtin-read#read--r-ignores-backslashes
stdout: "['one two', 'one\\\\ two']\n"
environment:
  TMP: /tmp
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
echo 'one\ two' > $TMP/readr.txt
read escaped < $TMP/readr.txt
read -r raw < $TMP/readr.txt
argv.py "$escaped" "$raw"
