name: HISTFILE is written in interactive shell
dialect: bash
source: oils:spec/interactive#histfile-is-written-in-interactive-shell
stdout: |
  hist1
  hist2
  ^D
  echo hist1; echo hist2
---

rm -f myhist
export HISTFILE=myhist
echo 'echo hist1; echo hist2' | $SH --norc -i

if test -n "$BASH_VERSION"; then
  echo '^D'  # match OSH for now
fi

cat myhist
