name: trap 'echo hi' KILL (regression test, caught by smoosh suite)
dialect: bash
source: 
  oils:spec/builtin-trap#trap-echo-hi-kill-regression-test-caught-by-smoosh-suite
stdout: |-
  status=0
  status=0
  status=0
  status=0
---
trap 'echo hi' 9
echo status=$?

trap 'echo hi' KILL
echo status=$?

trap 'echo hi' STOP
echo status=$?

trap 'echo hi' TERM
echo status=$?
