name: "getopts handles '--' #2579"
dialect: bash
source: oils:spec/builtin-getopts#getopts-handles----2579
stdout: |-
  a
  name=?
  3
---
set -- "-a" "--"
while getopts "a" name; do
        case "$name" in
                a)
                        echo "a"
                        ;;
                ?)
                        echo "?"
                        ;;
        esac
done
echo "name=$name"
echo "$OPTIND"
