name: break/continue within eval
dialect: bash
source: oils:spec/loop#breakcontinue-within-eval
stdout: |-
  1
  3
---
# NOTE: This changes things
# set -e
f() {
  for i in $(seq 5); do 
    if test $i = 2; then
      eval continue
    fi
    if test $i = 4; then
      eval break
    fi
    echo $i
  done

  eval 'return'
  echo 'done'
}
f
