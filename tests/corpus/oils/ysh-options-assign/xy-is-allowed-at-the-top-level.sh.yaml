disabled: true
name: x=y is allowed at the top level
dialect: bash
source: oils:spec/ysh-options-assign#xy-is-allowed-at-the-top-level
status: 2
stdout: "status=0\nx=42\n"
---
shopt --set ysh:all

# allow errors
set +o errexit +o nounset

x=42
echo status=$?
echo x=$x

y = 2  # fails because = is ambiguous
echo status=$?
echo y=$y
