name: PROMPT_COMMAND can see $?, like bash
dialect: bash
source: oils:spec/interactive#promptcommand-can-see-like-bash
stdout: "last_status=0\nlast_status=42\nlast_status=43\nok\nlast_status=0\n^D\n"
---

# bug fix #853

export PS1=''  # OSH prints prompt to stdout

case $SH in
  *bash|*osh)
    $SH --rcfile /dev/null -i << 'EOF'
myfunc() { echo last_status=$?;  }
PROMPT_COMMAND='myfunc'
( exit 42 )
( exit 43 )
echo ok
EOF
    ;;
esac

# Paper over difference with OSH
case $SH in *bash) echo '^D' ;; esac
