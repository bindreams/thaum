disabled: true
name: Regex with [ (bug regression)
dialect: bash
source: oils:spec/ysh-regex-api#regex-with-bug-regression
stdout: |-
  sq
  char class
---
shopt --set ysh:all

if ('[' ~ / '[' /) {
  echo 'sq'
}

if ('[' ~ / [ '[' ] /) {
  echo 'char class'
}

# User-reported string
if ("a" ~ / s* 'imports' s* '=' s* '[' /) {
  echo "yes"
}
