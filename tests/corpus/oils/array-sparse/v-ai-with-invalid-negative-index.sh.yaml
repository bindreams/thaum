name: '[[ -v a[i] ]] with invalid negative index'
dialect: bash
source: oils:spec/array-sparse#v-ai-with-invalid-negative-index
status: 1
stdout: "\n"
stderr: "  ([[ -v sp1[-1] ]]; echo \"$? (expect 1)\")\n         ^~~\n[ stdin ]:4:
  fatal: -v got index -1, which is out of bounds for array of length 0\n  ([[ -v sp2[-10]
  ]]; echo \"$? (expect 1)\")\n         ^~~\n[ stdin ]:6: fatal: -v got index -10,
  which is out of bounds for array of length 9\n  ([[ -v sp3[-10] ]]; echo \"$? (expect
  1)\")\n         ^~~\n[ stdin ]:9: fatal: -v got index -10, which is out of bounds
  for array of length 9\n"
---
case $SH in mksh) exit ;; esac

sp1=()
([[ -v sp1[-1] ]]; echo "$? (expect 1)")
sp2=({1..9})
([[ -v sp2[-10] ]]; echo "$? (expect 1)")
sp3=({1..9})
unset -v 'sp3[4]'
([[ -v sp3[-10] ]]; echo "$? (expect 1)")
