name: "Issue #1069 [57] BUG: variable v is invisible after IFS= eval 'local v=...'"
dialect: bash
source: 
  oils:spec/ble-idioms#issue-1069-57-bug-variable-v-is-invisible-after-ifs-eval-local-v
stdout: |-
  l:1
  g:x
---
v=x
case $SH in
mksh) f() { IFS= eval 'typeset v=1'; echo "l:$v"; } ;;
*)    f() { IFS= eval 'local   v=1'; echo "l:$v"; } ;;
esac
f
echo "g:$v"
