name: Word elision with non-whitespace IFS
dialect: bash
source: oils:spec/word-split#word-elision-with-non-whitespace-ifs
stdout: "['']\n[' ']\n[]\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
# Treated differently than the default IFS.  What is the rule here?
IFS='_'
char='_'
space=' '
empty=''
argv.py $char
argv.py $space
argv.py $empty
