status: 3
stdout: |-
  (List)   [3,4,5]
  (List)   [5,6]
  (List)   [3,4]
  (List)   [5,6]
  (List)   [3,4]
---

var a = list(0..<10)
#pp test_ (a)

pp test_ (a['3': '6'])

var i = '5'

pp test_ (a[i : 7])
pp test_ (a[3 : i])

var i = '-5'

pp test_ (a[i : -3])
pp test_ (a[-7 : i])

# Not allowed
pp test_ (a['a' : 'z'])
