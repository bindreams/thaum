name: PS4 with runtime error
dialect: bash
source: oils:spec/xtrace#ps4-with-runtime-error
stdout: "one\nstatus=0\n"
---
# osh shows inline error; maybe fail like dash/mksh?
x=1
PS4='+oops $(( 1 / 0 )) \$'
set -o xtrace
echo one
echo status=$?
# mksh and dash both fail.  bash prints errors to stderr.
