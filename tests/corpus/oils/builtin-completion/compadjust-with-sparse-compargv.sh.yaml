name: compadjust with sparse COMP_ARGV
dialect: bash
source: oils:spec/builtin-completion#compadjust-with-sparse-compargv
stdout: |
  ['0', '2', '5', '9']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
case $SH in bash) exit ;; esac

COMP_ARGV=({0..9})
unset -v 'COMP_ARGV['{1,3,4,6,7,8}']'
compadjust words
argv.py "${words[@]}"
