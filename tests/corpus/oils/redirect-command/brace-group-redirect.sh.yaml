name: Brace group redirect
dialect: bash
source: oils:spec/redirect-command#brace-group-redirect
stdout: "15\n"
environment:
  TMP: /tmp
---
# Suffix works, but prefix does NOT work.
# That comes from '| compound_command redirect_list' in the grammar!
{ echo block-redirect; } > $TMP/br.txt
cat $TMP/br.txt | wc -c
