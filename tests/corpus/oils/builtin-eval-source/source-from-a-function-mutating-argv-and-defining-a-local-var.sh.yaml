name: Source from a function, mutating argv and defining a local var
dialect: bash
source: 
  oils:spec/builtin-eval-source#source-from-a-function-mutating-argv-and-defining-a-local-var
stdout: "source-argv: args to func\nsource-argv: args to src\nto func\nfoo=foo_val\n\
  foo=\n"
---
f() {
  . $REPO_ROOT/spec/testdata/source-argv.sh              # no argv
  . $REPO_ROOT/spec/testdata/source-argv.sh args to src  # new argv
  echo $@
  echo foo=$foo  # defined in source-argv.sh
}
f args to func
echo foo=$foo  # not defined
