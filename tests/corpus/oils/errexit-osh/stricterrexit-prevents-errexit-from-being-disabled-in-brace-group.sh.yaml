name: strict_errexit prevents errexit from being disabled in brace group
dialect: bash
source: 
  oils:spec/errexit-osh#stricterrexit-prevents-errexit-from-being-disabled-in-brace-group
status: 1
stdout: |
  foo
  bar
---
set -o errexit
# false failure is NOT respected either way
{ echo foo; false; echo bar; } || echo "failed"

shopt -s strict_errexit || true
{ echo foo; false; echo bar; } || echo "failed"
