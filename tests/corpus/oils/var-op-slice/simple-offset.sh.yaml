name: Simple ${@:offset}
dialect: bash
source: oils:spec/var-op-slice#simple-offset
stdout: |
  ['SHELL', '4', '5', '6']
  ['4', '5', '6']
  ['5', '6']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

set -- 4 5 6

result=$(argv.py ${@:0})
echo ${result//"$0"/'SHELL'}

argv.py ${@:1}
argv.py ${@:2}
