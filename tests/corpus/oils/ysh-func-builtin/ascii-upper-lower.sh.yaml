disabled: true
name: ASCII upper() lower()
dialect: bash
source: oils:spec/ysh-func-builtin#ascii-upper-lower
stdout: |-
  abc-
  XYZ!

  ABC-
  abc-
  XYZ!
  xyz!
---

var x = 'abc-'
var y = 'XYZ!'

echo $x
echo $y
echo

echo $[x => upper()]
echo $[x => lower()]
echo $[y => upper()]
echo $[y => lower()]
