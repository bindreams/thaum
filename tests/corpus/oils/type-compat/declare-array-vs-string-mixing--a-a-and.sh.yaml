name: "declare array vs. string: mixing -a +a and () ''"
dialect: bash
source: oils:spec/type-compat#declare-array-vs-string-mixing--a-a-and
stdout: "['1', '(2 3)', '4', '5', '6']\n"
---
# dynamic parsing of first argument.
declare +a 'xyz1=1'
declare +a 'xyz2=(2 3)'
declare -a 'xyz3=4'
declare -a 'xyz4=(5 6)'
argv.py "${xyz1}" "${xyz2}" "${xyz3[@]}" "${xyz4[@]}"
