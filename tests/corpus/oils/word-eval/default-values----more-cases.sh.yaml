name: Default values -- more cases
dialect: bash
source: oils:spec/word-eval#default-values----more-cases
stdout: |
  ['hi', 'a b', 'c d', 'e f', "'g h'"]
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
argv.py ${undef:-hi} ${undef:-'a b'} "${undef:-c d}" "${un:-"e f"}" "${un:-'g h'}"
