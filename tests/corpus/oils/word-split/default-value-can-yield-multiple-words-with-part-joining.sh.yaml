name: default value can yield multiple words with part joining
dialect: bash
source: 
  oils:spec/word-split#default-value-can-yield-multiple-words-with-part-joining
stdout: "['12 3', '4 56']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
argv.py 1${undefined:-"2 3" "4 5"}6
