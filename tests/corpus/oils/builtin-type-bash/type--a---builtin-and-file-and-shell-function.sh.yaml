name: type -a -> builtin and file and shell function
dialect: bash
source: 
  oils:spec/builtin-type-bash#type--a---builtin-and-file-and-shell-function
stdout: |-
  pwd is a shell builtin
  pwd is /bin/pwd
  pwd is _tmp/pwd
  ---
  pwd is a function
  pwd () 
  { 
      echo function-too
  }
  pwd is a shell builtin
  pwd is /bin/pwd
  pwd is _tmp/pwd
  ---
  pwd is a shell builtin
  pwd is /bin/pwd
  pwd is _tmp/pwd
---
touch _tmp/pwd
chmod +x _tmp/pwd
PATH=/bin:_tmp  # control output

type -a pwd
echo ---

pwd () 
{ 
    echo function-too
}

osh-normalize() {
  sed 's/shell function/function/'
}

type -a pwd | osh-normalize
echo ---

type -a -f pwd | osh-normalize
