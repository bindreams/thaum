name: Similar to above with set -u
dialect: bash
source: oils:spec/nix-idioms#similar-to-above-with-set--u
stdout: |
  show
  []
  show
  ['foo bar', 'baz']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
show() {
  echo show

  # bash gives an error here - !hookSlice unbound, even though preHooks exists
  # OSH currently does the "logical" thing

  # NOT testing this -- I think this is WHAT NIX WORKS AROUND WITH
  #argv.py ${!hooksSlice}

  argv.py ${!hooksSlice+"${!hooksSlice}"}
}

hooksSlice='preHooks[@]'

set -u
preHooks=()
show

preHooks=('foo bar' baz)
show
