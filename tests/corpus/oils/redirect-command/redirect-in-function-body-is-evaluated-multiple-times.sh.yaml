name: Redirect in function body is evaluated multiple times
dialect: bash
source: 
  oils:spec/redirect-command#redirect-in-function-body-is-evaluated-multiple-times
environment:
  TMP: /tmp
---
i=0
fun() { echo "file $i"; } 1> "$TMP/file$((i++))"
fun
fun
echo i=$i
echo __
cat $TMP/file0
echo __
cat $TMP/file1
i=2
__
file 1
__
file 2
