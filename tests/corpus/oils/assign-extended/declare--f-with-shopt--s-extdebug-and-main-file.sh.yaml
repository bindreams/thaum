name: declare -F with shopt -s extdebug and main file
dialect: bash
source: 
  oils:spec/assign-extended#declare--f-with-shopt--s-extdebug-and-main-file
stdout: |-
  declare -f add
  declare -f g

  add 5 ROOT/spec/testdata/extdebug.sh
  g 3 ROOT/spec/testdata/bash-source-2.sh
---
case $SH in mksh) exit ;; esac

$SH $REPO_ROOT/spec/testdata/extdebug.sh | sed "s;$REPO_ROOT;ROOT;g"
