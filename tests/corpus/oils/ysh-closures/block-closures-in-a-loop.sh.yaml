disabled: true
name: Block Closures in a Loop !
dialect: bash
source: oils:spec/ysh-closures#block-closures-in-a-loop
stdout: "x: i = 0, j = 2\nx: i = 1, j = 3\nx: i = 2, j = 4\n"
---
shopt --set ysh:upgrade

proc task (; tasks; ; b) {
  call tasks->append(b)
}

func makeTasks() {
  var tasks = []
  var x = 'x'
  for i in (0 ..< 3) {
    var j = i + 2
    task (tasks) { echo "$x: i = $i, j = $j" }
  }
  return (tasks)
}

var blocks = makeTasks()
#= blocks

for b in (blocks) {
  call io->eval(b)
}
