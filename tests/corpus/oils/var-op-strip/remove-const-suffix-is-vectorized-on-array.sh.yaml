name: Remove const suffix is vectorized on $@ array
dialect: bash
source: oils:spec/var-op-strip#remove-const-suffix-is-vectorized-on-array
status: 0
stdout: "['1', '2', '3']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
