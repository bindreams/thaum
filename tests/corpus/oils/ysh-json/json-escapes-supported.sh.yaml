disabled: true
name: JSON \/ escapes supported
dialect: bash
source: oils:spec/ysh-json#json-escapes-supported
stdout: |-
  /
  reply=/
  reply=/
---

msg='"\/"'

echo "$msg" | python3 -c 'import json, sys; print(json.load(sys.stdin))'

echo "$msg" | json read
echo reply=$_reply

j8="b'\\/'"
echo "$msg" | json read
echo reply=$_reply
