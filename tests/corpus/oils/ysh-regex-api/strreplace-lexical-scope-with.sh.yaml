disabled: true
name: Str.replace() lexical scope with ^""
dialect: bash
source: oils:spec/ysh-regex-api#strreplace-lexical-scope-with
stdout: "<Expr>\nreplace   my[x st t x]r\nmyreplace my[x st t x]r\n"
---
shopt --set ysh:upgrade

var s = 'mystr'
var pat = / 's' <capture dot> /

proc p {
  var x = 'x'
  var template = ^"[$x $0 $1 $x]"
  pp test_ (template)
  
  var new = s.replace(pat, template)
  echo 'replace  ' $new
  
  func myreplace(s, template) {
    return (s.replace(pat, template))
  }
  
  echo myreplace $[myreplace(s, template)]
}

p
