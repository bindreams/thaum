name: mapfile -t bugs (ble.sh)
dialect: bash
source: oils:spec/builtin-bash#mapfile--t-bugs-blesh
stdout: "len=3\nlen=2\nlen=2\n"
---

# empty line
mapfile -t lines <<< $'hello\n\nworld'
echo len=${#lines[@]}
#declare -p lines

# initial newline
mapfile -t lines <<< $'\nhello'
echo len=${#lines[@]}
#declare -p lines

# trailing newline
mapfile -t lines <<< $'hello\n'
echo len=${#lines[@]}
#declare -p lines
