name: File with no shebang is executed
dialect: bash
source: oils:spec/command#file-with-no-shebang-is-executed
status: 0
stdout: |
  hi
environment:
  TMP: /tmp
---
# most shells execute /bin/sh; bash may execute itself
echo 'echo hi' > $TMP/no-shebang
chmod +x $TMP/no-shebang
$SH -c '$TMP/no-shebang'
