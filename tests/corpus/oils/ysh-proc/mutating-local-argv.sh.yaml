disabled: true
name: Mutating local ARGV
dialect: bash
source: oils:spec/ysh-proc#mutating-local-argv
stdout: "['global', 'a b', 'c']\n['local', 'a b', 'c']\n['local', 'a b', 'c', 'LL']\n\
  ['global', 'a b', 'c']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---

$SH -o ysh:upgrade -c '
argv.py global @ARGV

proc p {
  argv.py @ARGV
  call ARGV->append("LL")
  argv.py @ARGV
}

p local @ARGV

argv.py global @ARGV

' dummy0 'a b' c
