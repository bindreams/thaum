dialect: bash
---
a=7
b=3
echo "$((a + b)) $((a - b)) $((a * b)) $((a / b)) $((a % b))"

x=1
(( x += 10 ))
(( x *= 2 ))
echo "x=$x"

sum=0
for (( i = 1; i <= 100; i++ )); do
    (( sum += i ))
done
echo "sum 1..100 = $sum"

arr=(10 20 30 40 50)
total=0
for (( i = 0; i < ${#arr[@]}; i++ )); do
    (( total += arr[i] ))
done
echo "arr total: $total"

echo "$(( (5 + 3) * 2 - 1 ))"
echo "$(( 2 ** 10 ))"
echo "$(( 255 & 0xF0 ))"
echo "$(( 1 << 8 ))"

(( 10 > 5 )) && echo "gt ok"
(( 3 == 3 )) && echo "eq ok"

n=720
f=2
while (( n > 1 )); do
    while (( n % f == 0 )); do
        (( n /= f ))
    done
    (( f++ ))
done
echo "factored"
