disabled: true
name: '""" and $""" in Command Mode'
dialect: bash
source: oils:spec/ysh-string#and-in-command-mode
stdout: |
  --
  one "
  two = 2 ""
  three = 3

  --
  one "
  two = 2 ""
  three = 3

  --
  three = 3
  two = 2 ""
  one "
---

var two=2
var three=3

echo --
echo """
  one "
  two = $two ""
  three = $three
  """

# optional $ prefix
echo --
echo $"""
  one "
  two = $two ""
  three = $three
  """

echo --
tac <<< """
  one "
  two = $two ""
  three = $three
  """
