name: args that look like flags are passed after script
dialect: bash
source: oils:spec/sh-usage#args-that-look-like-flags-are-passed-after-script
stdout: "['--help', '--help', '-h']\n"
environment:
  TMP: /tmp
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
script=$TMP/sh1.sh
echo 'argv.py "$@"' > $script
chmod +x $script
$SH $script --help --help -h
