name: pipeline (nondeterministic)
dialect: bash
source: oils:spec/ysh-xtrace#pipeline-nondeterministic
stdout: "2\n"
stderr: "      . 12345 builtin echo 1\n      . 12345 builtin echo 2\n    . 12345 exec
  sort\n    < 12345 proc myfunc\n    > 12345 proc myfunc\n  ; process 12345: status
  0\n  ; process 12345: status 0\n  ; process 12345: status 0\n  | command 12345:
  wc -l\n  | part 12345\n  | part 12345\n. builtin ':' begin\n. builtin set '+x'\n\
  < pipeline\n> pipeline\n"
---
shopt --set ysh:upgrade
set -x

myfunc() {
  echo 1
  echo 2
}

{
  : begin
  myfunc | sort | wc -l
  set +x
} 2>err.txt

do_sort=1

if test -n $do_sort; then
  # SORT for determinism
  sed --regexp-extended 's/[[:digit:]]{2,}/12345/g; s|/fd/.|/fd/N|g' err.txt | 
    LC_ALL=C sort >&2
else
  cat err.txt
fi
