disabled: true
name: write --sep, --end, -n, varying flag syntax
dialect: bash
source: oils:spec/ysh-builtins#write---sep---end--n-varying-flag-syntax
stdout: |-
  a b
  c d
  .
  a b
  c d
  .
  a bc d
  .
  a b_c d
  a b_c d END
  xy
---
shopt -s ysh:all
var a = %('a b' 'c d')
write @a
write .
write -- @a
write .

write --sep '' --end '' @a; write
write .

write --sep '_' -- @a
write --sep '_' --end b' END\n' -- @a

write -n x
write -n y
write
