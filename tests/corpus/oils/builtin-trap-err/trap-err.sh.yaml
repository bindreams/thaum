name: trap ERR
dialect: bash
source: oils:spec/builtin-trap-err#trap-err
status: 99
stdout: |
  A
  err [x y] 1
  B
  err [x y] 42
  C
  D
  after errexit 99
---
err() {
  echo "err [$@] $?"
}
trap 'err x y' ERR 

echo A

false
echo B

( exit 42 )
echo C

trap - ERR  # disable trap

false
echo D

trap 'echo after errexit $?' ERR 

set -o errexit

( exit 99 )
echo E
