name: nameref and assoc array
dialect: bash
source: oils:spec/array-assoc#nameref-and-assoc-array
stdout: |
  values: val
  before val
  after val2
  values: val2
  ---
  before val2
  after val3
  values: val3
---
show-values() {
  echo values: ${A[@]}
}

declare -A A=(['K']=val)
show-values

declare -n ref='A["K"]'
echo before $ref
ref='val2'
echo after $ref
show-values

echo ---

key=K
declare -n ref='A[$key]'
echo before $ref
ref='val3'
echo after $ref
show-values
