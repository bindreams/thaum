name: history -w writes out the in-memory history to the history file
dialect: bash
source: 
  oils:spec/builtin-history#history--w-writes-out-the-in-memory-history-to-the-history-file
stdout: "found=1\n"
environment:
  TMP: /tmp
---

cd $TMP

# Populate a history file with a command to be overwritten
echo 'cmd old' > tmp
HISTFILE=tmp
history -c
echo 'cmd new' > /dev/null
history -w # Overwrite history file

# Verify that old command is gone
grep 'old' tmp > /dev/null
echo "found=$?"
