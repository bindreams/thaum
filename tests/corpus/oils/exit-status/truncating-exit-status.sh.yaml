name: Truncating 'exit' status
dialect: bash
source: oils:spec/exit-status#truncating-exit-status
stdout: "status=255\nstatus=0\nstatus=1\n===\nstatus=255\nstatus=254\n"
---

$SH -c 'exit 255'
echo status=$?

$SH -c 'exit 256'
echo status=$?

$SH -c 'exit 257'
echo status=$?

echo ===

$SH -c 'exit -1'
echo status=$?

$SH -c 'exit -2'
echo status=$?
