name: Globbing escaping
dialect: bash
source: oils:spec/word-eval#globbing-escaping
stdout: |
  ['_tmp/[bc]ar.mm', '-', '_tmp/bar.mm', '_tmp/car.mm']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
mkdir -p _tmp
touch '_tmp/[bc]ar.mm' # file that looks like a glob pattern
touch _tmp/bar.mm _tmp/car.mm
argv.py '_tmp/[bc]'*.mm - _tmp/?ar.mm
