name: The string to strip can be single quoted, outer is unquoted
dialect: bash
source: 
  oils:spec/var-sub-quote#the-string-to-strip-can-be-single-quoted-outer-is-unquoted
stdout: "['a', 'b', 'a', 'b', 'c', 'd']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
foo='a b c d'
argv.py ${foo%'c d'} ${foo%'c  d'}
