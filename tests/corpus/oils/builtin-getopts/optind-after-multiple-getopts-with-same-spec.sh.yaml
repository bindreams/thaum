name: OPTIND after multiple getopts with same spec
dialect: bash
source: oils:spec/builtin-getopts#optind-after-multiple-getopts-with-same-spec
stdout: "OPTIND=1\n-\n-\nOPTIND=4\nOPTIND=1\n"
---
while getopts "hc:" opt; do
  echo '-'
done
echo OPTIND=$OPTIND

set -- -h -c foo x y z
while getopts "hc:" opt; do
  echo '-'
done
echo OPTIND=$OPTIND

set --
while getopts "hc:" opt; do
  echo '-'
done
echo OPTIND=$OPTIND
