disabled: true
name: GetValue scope and shopt --unset dynamic_scope
dialect: bash
source: oils:spec/ysh-scope#getvalue-scope-and-shopt---unset-dynamicscope
stdout: |
  sh x=dynamic
  ysh x=global
  sh x=global
  x=global
---
shopt --set parse_proc

f() {
  echo "sh x=$x"
}

proc p {
  echo "ysh x=$x"
}

demo() {
  local x=dynamic
  f
  p

  shopt --unset dynamic_scope
  f
}

x=global
demo
echo x=$x
