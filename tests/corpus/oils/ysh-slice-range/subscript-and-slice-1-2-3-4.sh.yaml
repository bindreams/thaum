disabled: true
name: subscript and slice :| 1 2 3 4 |
dialect: bash
source: oils:spec/ysh-slice-range#subscript-and-slice-1-2-3-4
stdout: "(Str)   \"2\"\n(List)   [\"2\",\"3\"]\nimplicit\n(List)   [\"1\",\"2\"]\n\
  (List)   [\"3\",\"4\"]\nout of bounds\n(List)   [\"1\",\"2\",\"3\",\"4\"]\n(List)\
  \   [\"1\",\"2\",\"3\",\"4\"]\n"
---
var myarray = :|1 2 3 4|
pp test_ (myarray[1])
pp test_ (myarray[1:3])

echo 'implicit'
pp test_ (myarray[:2])
pp test_ (myarray[2:])

echo 'out of bounds'
pp test_ (myarray[:5])
pp test_ (myarray[-5:])

# Stride not supported
#= myarray[1:4:2]

# Now try omitting some
#= myarray[1:4:2]
