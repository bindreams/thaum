name: 'Regression: unset a[-2]: out-of-bound negative index should cause error'
dialect: bash
source: 
  oils:spec/array#regression-unset-a-2-out-of-bound-negative-index-should-cause-error
status: 1
stdout: "\n"
stderr: |2-
    unset -v 'a[-2]'
             ^
  [ stdin ]:4: a[-2]: Index is out of bounds for array of length 1
---
case $SH in mksh) exit ;; esac

a=(1)
unset -v 'a[-2]'
