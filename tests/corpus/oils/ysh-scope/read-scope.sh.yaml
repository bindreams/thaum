disabled: true
name: read scope
dialect: bash
source: oils:spec/ysh-scope#read-scope
stdout: |-
  x_before=42
  x_after=dynamic-scope
  x=
  ---
  x_before=42
  x_after=42
  x=
---
set -o errexit

read-x() {
  echo dynamic-scope | read x
}
demo() {
  local x=42
  echo x_before=$x
  read-x
  echo x_after=$x
}
demo
echo x=$x

echo ---

# Now 'read x' creates a local variable
shopt --unset dynamic_scope
demo
echo x=$x
