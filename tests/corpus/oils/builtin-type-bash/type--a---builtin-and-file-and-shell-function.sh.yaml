name: type -a -> builtin and file and shell function
dialect: bash
source: 
  oils:spec/builtin-type-bash#type--a---builtin-and-file-and-shell-function
stdout: "pwd is a shell builtin\npwd is /bin/pwd\npwd is _tmp/pwd\n---\npwd is a function\n\
  pwd () \n{ \n    echo function-too\n}\npwd is a shell builtin\npwd is /bin/pwd\n\
  pwd is _tmp/pwd\n---\npwd is a shell builtin\npwd is /bin/pwd\npwd is _tmp/pwd\n"
---
touch _tmp/pwd
chmod +x _tmp/pwd
PATH=/bin:_tmp  # control output

type -a pwd
echo ---

pwd () 
{ 
    echo function-too
}

osh-normalize() {
  sed 's/shell function/function/'
}

type -a pwd | osh-normalize
echo ---

type -a -f pwd | osh-normalize
