name: Syntax error for single quote in double quote
dialect: bash
source: oils:spec/var-sub-quote#syntax-error-for-single-quote-in-double-quote
status: 2
stdout: ''
parse-error: "unterminated single quote"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
foo="'a b c d'"
argv.py "${foo%d'}"
