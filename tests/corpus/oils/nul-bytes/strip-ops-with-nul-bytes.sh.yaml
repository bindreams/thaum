name: 'Strip ops # ## % %% with NUL bytes'
dialect: bash
source: oils:spec/nul-bytes#strip-ops-with-nul-bytes
stdout: |-
  len=1
   2e
  ---
  len=0
  len=0
  len=0
  len=0
---

show_bytes() {
  echo -n "$1" | od -A n -t x1
}

s=$(printf '\000.\000')
echo len=${#s}
show_bytes "$s"

echo ---

t=${s#?}
echo len=${#t}
show_bytes "$t"

t=${s##?}
echo len=${#t}
show_bytes "$t"

t=${s%?}
echo len=${#t}
show_bytes "$t"

t=${s%%?}
echo len=${#t}
show_bytes "$t"
