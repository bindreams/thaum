name: var in branches of case (Aidan)
dialect: bash
source: oils:spec/ysh-user-feedback#var-in-branches-of-case-aidan
stdout: "\n"
---
shopt -s ysh:all

# at top level, there is no static check
case (1) {
  (1) { var name = "one" }
  (2) { var name = "two" }
}
echo name=$name

proc my-proc {
  case (1) {
    (1) { var name = "one" }
    (2) { var name = "two" }
  }
}
