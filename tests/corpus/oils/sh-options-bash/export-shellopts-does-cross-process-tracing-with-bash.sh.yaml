name: export SHELLOPTS does cross-process tracing with bash
dialect: bash
source: 
  oils:spec/sh-options-bash#export-shellopts-does-cross-process-tracing-with-bash
stdout: |-
  + echo 1
  1
  sh -c 'echo 2'
  + echo 2
  2
---

# calling bash
$SH -c '
export SHELLOPTS
set -x
#echo SHELLOPTS=$SHELLOPTS
echo 1
bash -c "echo 2"
' 2>&1 | sed 's/.*sh /sh /g'
