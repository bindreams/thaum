name: part_value tree on RHS
dialect: bash
source: oils:spec/var-sub-quote#partvalue-tree-on-rhs
stdout: |
  ['1 2 3 45 6 7']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
v=${a:-${a:-"1 2" "3 4"}5 "6 7"}
argv.py "${v}"
