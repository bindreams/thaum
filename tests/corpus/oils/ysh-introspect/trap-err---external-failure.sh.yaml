name: trap ERR - external failure
dialect: bash
source: oils:spec/ysh-introspect#trap-err---external-failure
status: 1
stdout: "[ stdin ]:16\n    f\n    ^\n[ stdin ]:9\n      g\n      ^\n"
---

source $[ENV.REPO_ROOT]/spec/testdata/debug-frame-lib.ysh

trap --add ERR {
  print-stack (prefix=false)
}
set -o errtrace  # enable always

proc f {
  g
}

proc g {
  false
}

f
