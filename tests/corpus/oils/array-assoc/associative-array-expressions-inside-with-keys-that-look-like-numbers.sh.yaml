name: Associative array expressions inside (( )) with keys that look like 
  numbers
dialect: bash
source: 
  oils:spec/array-assoc#associative-array-expressions-inside-with-keys-that-look-like-numbers
stdout: |
  42
  42
---
declare -A assoc
assoc[0]=42
(( var = ${assoc[0]} ))
echo $var
(( var = assoc[0] ))
echo $var
