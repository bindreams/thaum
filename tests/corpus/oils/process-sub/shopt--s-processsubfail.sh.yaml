name: shopt -s process_sub_fail
dialect: bash
source: oils:spec/process-sub#shopt--s-processsubfail
status: 3
stdout: "a\nb\nstatus=0 ps 2 3\n__\na\nb\nstatus=3 ps 2 3\na\nb\n"
---

case $SH in bash*|zsh) exit ;; esac

shopt --set parse_at

cat <(echo a; exit 2) <(echo b; exit 3)
echo status=$? ps @_process_sub_status

echo __
shopt -s process_sub_fail

cat <(echo a; exit 2) <(echo b; exit 3)
echo status=$? ps @_process_sub_status

# Now exit because of it
set -o errexit

cat <(echo a; exit 2) <(echo b; exit 3)
echo status=$? ps @_process_sub_status
