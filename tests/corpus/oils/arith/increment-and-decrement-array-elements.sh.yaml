name: Increment and decrement array elements
dialect: bash
source: oils:spec/arith#increment-and-decrement-array-elements
stdout: |
  6 7 6 7 - 1 1 -1 -1
---
shopt -u strict_arith || true
a=(5 6 7 8)
(( a[0]++, ++a[1], a[2]--, --a[3] ))
(( undef[0]++, ++undef[1], undef[2]--, --undef[3] ))
echo "${a[@]}" - "${undef[@]}"
