disabled: true
name: json read then json write
dialect: bash
source: oils:spec/ysh-json#json-read-then-json-write
stdout: |-
  {
    "name": "bob",
    "age": 42,
    "ok": true
  }
  {
    "name": "bob",
    "age": 42,
    "ok": true
  }
  {
    "name": {},
    "age": {},
    "x": -1,
    "y": 0
  }
---

# BUG with space before true
echo '{"name": "bob", "age": 42, "ok": true}' | json read
json write (_reply)

echo '{"name": "bob", "age": 42, "ok":true}' | json read
json write (_reply)

echo '{"name": {}, "age": {}, "x":-1, "y": -0}' | json read
json write (_reply)
