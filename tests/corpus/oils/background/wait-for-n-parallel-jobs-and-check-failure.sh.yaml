name: wait for N parallel jobs and check failure
dialect: bash
source: oils:spec/background#wait-for-n-parallel-jobs-and-check-failure
stdout: |-
  1
  2
  3
  status=3
  status=2
  status=1
---

set -o errexit

pids=''
for i in 3 2 1; do
  { sleep 0.0$i; echo $i; exit $i; } &
  pids="$pids $!"
done

for pid in $pids; do
  set +o errexit
  wait $pid
  status=$?
  set -o errexit

  echo status=$status
done
