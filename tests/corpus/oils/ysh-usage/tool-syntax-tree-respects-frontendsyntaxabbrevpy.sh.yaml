disabled: true
name: --tool syntax-tree respects frontend/syntax_abbrev.py
dialect: bash
source: oils:spec/ysh-usage#tool-syntax-tree-respects-frontendsyntaxabbrevpy
stdout: |
  (C (w <Lit_Chars echo>) (w (SQ sq)))
  (C
    (w <Lit_Chars echo>)
    (w (DQ <Lit_Chars "hi "> ($ x) <Lit_Chars " "> (${ VSub_Name y)))
  )
  (VarDecl
    keyword:<KW_Var var>
    lhs:[(NameType left:<Expr_Name x> name:x)]
    rhs:(expr.Binary op:<Arith_Plus "+"> left:(Const Expr_DecInt _) right:(Var a))
  )
---

$[ENV.SH] --tool syntax-tree <<< '''
echo 'sq'
'''

$[ENV.SH] --tool syntax-tree <<< '''
echo "hi $x ${y}"
'''

$[ENV.SH] --tool syntax-tree <<< '''
var x = 42 + a
'''

# this reflects the default width
