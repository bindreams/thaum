disabled: true
name: Char Class Ranges
dialect: bash
source: oils:spec/ysh-regex#char-class-ranges
stdout: |
  [0-9a-f]+
  [0-9a-f]+
  yes
  no
  no
---
shopt -s ysh:all

var pat = ''
setvar pat = /[0-9 a-f]+/
echo $pat
# This is equivalent
setvar pat = /['0' - '9' 'a' - 'f']+/
echo $pat

if ('0123' ~ pat) { echo yes } else { echo no }
if ('zzz' ~ pat) { echo yes } else { echo no }
if ('' ~ pat) { echo yes } else { echo no }
