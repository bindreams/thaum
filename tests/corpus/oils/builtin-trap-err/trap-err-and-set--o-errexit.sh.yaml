name: trap ERR and set -o errexit
dialect: bash
source: oils:spec/builtin-trap-err#trap-err-and-set--o-errexit
status: 1
stdout: |
  line=3
  a
  b
  line=9
---

trap 'echo line=$LINENO' ERR

false
echo a

set -o errexit

echo b
false   # trap executed, and executation also halts
echo c  # doesn't get here
