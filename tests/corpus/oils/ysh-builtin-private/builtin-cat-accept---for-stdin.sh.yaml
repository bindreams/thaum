name: builtin cat accept - for stdin
dialect: bash
source: oils:spec/ysh-builtin-private#builtin-cat-accept---for-stdin
stdout: "FOO\n3\n4\nFOO\nFOO\n---\n5\n6\n"
---
case $SH in
  *osh) prefix='builtin' ;;
  *) prefix='' ;;
esac

echo FOO > foo
seq 3 4 | $prefix cat foo - foo foo

echo ---

# second - is a no-op
seq 5 6 | $prefix cat - -
