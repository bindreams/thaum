name: ysh:upgrade allows assoc arrays, with parse_ysh_string
dialect: bash
source: oils:spec/ysh-options#yshupgrade-allows-assoc-arrays-with-parseyshstring
stdout: "2\n"
---

shopt --set ysh:upgrade

# parse_ysh_string disallows it
# do we need another option?  strict_parse_string or strict_parse_word?

declare -A assoc=(['key']=value ["dq"]=dq)

#declare -A assoc=([key]=value [dq]=dq)
echo ${#assoc[@]}
