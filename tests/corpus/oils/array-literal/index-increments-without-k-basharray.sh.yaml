name: index increments without [k]= (BashArray)
dialect: bash
source: oils:spec/array-literal#index-increments-without-k-basharray
stdout: |
  keys: ['100', '101', '102', '103']
  vals: ['1', '2', '3', '4']
  keys: ['5', '6', '7', '8', '100', '101', '102', '103']
  vals: ['a', 'b', 'c', 'd', '1', '2', '3', '4']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
a=([100]=1 2 3 4)
printf 'keys: '; argv.py "${!a[@]}"
printf 'vals: '; argv.py "${a[@]}"
a=([100]=1 2 3 4 [5]=a b c d)
printf 'keys: '; argv.py "${!a[@]}"
printf 'vals: '; argv.py "${a[@]}"
