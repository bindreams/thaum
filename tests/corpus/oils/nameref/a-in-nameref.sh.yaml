name: a[@] in nameref
dialect: bash
source: oils:spec/nameref#a-in-nameref
stdout: |
  ['ref', 'A B', 'C']
  status=1
  ['ref[@]']
  ['ref', 'A B', 'C']
  ['a[@]', 'A B', 'C']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

# this confuses code and data
typeset -n ref='a[@]'
a=('A B' C)
argv.py ref "$ref"  # READ through ref works
ref=(X Y Z)    # WRITE through doesn't work
echo status=$?
argv.py 'ref[@]' "${ref[@]}"
argv.py ref "$ref"  # JOINING mangles the array?
argv.py 'a[@]' "${a[@]}"
