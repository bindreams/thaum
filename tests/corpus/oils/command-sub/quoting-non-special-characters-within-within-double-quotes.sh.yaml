name: Quoting non-special characters within `` within double quotes
dialect: bash
source: 
  oils:spec/command-sub#quoting-non-special-characters-within-within-double-quotes
stdout: |-
  [1 z]
  [2 z]
  [3 \z]
  [4 \z]
---
echo "[1 `echo \z`]"
echo "[2 `echo \\z`]"
echo "[3 `echo \\\z`]"
echo "[4 `echo \\\\z`]"
