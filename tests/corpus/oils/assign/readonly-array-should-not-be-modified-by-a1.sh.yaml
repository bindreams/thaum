name: readonly array should not be modified by a+=(1)
dialect: bash
source: oils:spec/assign#readonly-array-should-not-be-modified-by-a1
stdout: |
  ['1', '2', '3']
  ['1', '2', '3']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
case $SH in dash) exit 99 ;; esac # dash/mksh does not support associative arrays

a=(1 2 3)
readonly -a a
eval 'a+=(4)'
argv.py "${a[@]}"
eval 'declare -n r=a; r+=(4)'
argv.py "${a[@]}"
