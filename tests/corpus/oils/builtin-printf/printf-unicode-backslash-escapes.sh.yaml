name: printf unicode backslash escapes
dialect: bash
source: oils:spec/builtin-printf#printf-unicode-backslash-escapes
stdout: "['\\xe2\\x98\\xa0']\n['\\xd9\\x9f']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
argv.py "$(printf '\u2620')"
argv.py "$(printf '\U0000065f')"
