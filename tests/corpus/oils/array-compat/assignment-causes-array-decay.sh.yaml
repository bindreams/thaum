name: Assignment Causes Array Decay
dialect: bash
source: oils:spec/array-compat#assignment-causes-array-decay
stdout: "['[x', 'y', 'z]']\n['[x y z]']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
set -- x y z
argv.py "[$@]"
var="[$@]"
argv.py "$var"
