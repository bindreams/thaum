name: readonly a[7]=8
dialect: bash
source: oils:spec/assign-deferred#readonly-a78
stdout: |
  status=0
  ['7', '8']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
readonly b[7]=8
echo status=$?
argv.py "${!b[@]}" "${b[@]}"

