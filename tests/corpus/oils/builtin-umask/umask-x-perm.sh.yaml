name: umask X perm
dialect: bash
source: oils:spec/builtin-umask#umask-x-perm
status: 0
stdout: |
  ret0 = 0
  666
  ret1 = 0
  777
  ret2 = 0
  246
---
umask 0124
umask a=X
echo ret0 = $?
umask | tail -c 4

umask 0246
umask a=X
echo ret1 = $?
umask | tail -c 4

umask 0246
umask a-X
echo ret2 = $?
umask | tail -c 4
