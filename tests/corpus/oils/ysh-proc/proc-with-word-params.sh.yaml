disabled: true
name: Proc with word params
dialect: bash
source: oils:spec/ysh-proc#proc-with-word-params
stdout: |
  a b c
  status=42
---
shopt --set parse_proc

# doesn't require ysh:all
proc f(x, y, z) {
  echo $x $y $z
  var ret = 42
  return $ret
}
# this gets called with 3 args then?
f a b c
echo status=$?
