disabled: true
name: _start() and _end()
dialect: bash
source: oils:spec/ysh-regex-api#start-and-end
stdout: |
  start=3 end=6
  ---
  start=0 end=3
  start=3 end=6
  ---
  start=0 end=3
  start=-1 end=-1
---
shopt -s ysh:upgrade

var s = 'foo123bar'
if (s ~ /digit+/) {
  echo start=$[_start(0)] end=$[_end(0)]
}
echo ---

if (s ~ / <capture [a-z]+> <capture digit+> /) {
  echo start=$[_start(1)] end=$[_end(1)]
  echo start=$[_start(2)] end=$[_end(2)]
}
echo ---

if (s ~ / <capture [a-z]+> | <capture digit+> /) {
  echo start=$[_start(1)] end=$[_end(1)]
  echo start=$[_start(2)] end=$[_end(2)]
}
