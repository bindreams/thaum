name: pp test_ supports BashArray, BashAssoc
dialect: bash
source: oils:spec/ysh-builtin-meta#pp-test-supports-basharray-bashassoc
stdout: "{\"type\":\"BashArray\",\"data\":{\"0\":\"a\",\"1\":\"b\",\"2\":\"c\"}}\n\
  {\"type\":\"BashArray\",\"data\":{\"0\":\"a\",\"1\":\"b\",\"2\":\"c\",\"5\":\"z\"\
  }}\n{\"type\":\"BashAssoc\",\"data\":{\"k\":\"v\",\"k2\":\"v2\"}}\n{\"type\":\"\
  BashAssoc\",\"data\":{\"k\":\"v\",\"k2\":\"v2\",\"k3\":\"\"}}\n"
---

declare -a array=(a b c)
pp test_ (array)

array[5]=z
pp test_ (array)

declare -A assoc=([k]=v [k2]=v2)
pp test_ (assoc)

# I think assoc arrays can never null / unset

assoc['k3']=
pp test_ (assoc)
