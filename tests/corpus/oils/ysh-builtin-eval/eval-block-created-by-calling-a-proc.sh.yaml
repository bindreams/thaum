disabled: true
name: Eval block created by calling a proc
dialect: bash
source: oils:spec/ysh-builtin-eval#eval-block-created-by-calling-a-proc
stdout: |-
  0
  1
---
proc lazy-block ( ; out; ; block) {
  call out->setValue(block)
}

var myglobal = 0

lazy-block (&my_block) {
  json write (myglobal)
}

call io->eval(my_block)
setvar myglobal = 1
call io->eval(my_block)
