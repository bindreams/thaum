name: Invalid brace expansions mixing characters and numbers
dialect: bash
source: 
  oils:spec/brace-expansion#invalid-brace-expansions-mixing-characters-and-numbers
stdout: |-
  {1..a}
  {z..3}
---
# zsh does something crazy like : ; < = > that I'm not writing
case $SH in *zsh) echo BUG; exit ;; esac
echo {1..a}
echo {z..3}
