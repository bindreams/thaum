name: printf -v and assoc array
dialect: bash
source: oils:spec/array-assoc#printf--v-and-assoc-array
stdout: |-
  values: val
  values: /val2/
  values: /val3/
---

show-values() {
  echo values: ${assoc[@]}
}

declare -A assoc=(['K']=val)
show-values

printf -v 'assoc["K"]' '/%s/' val2
show-values

key=K
printf -v 'assoc[$key]' '/%s/' val3
show-values

