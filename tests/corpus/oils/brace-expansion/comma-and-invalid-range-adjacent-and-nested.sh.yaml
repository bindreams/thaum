name: comma and invalid range (adjacent and nested)
dialect: bash
source: oils:spec/brace-expansion#comma-and-invalid-range-adjacent-and-nested
stdout: |
  -a{1...3}- -b{1...3}-
  -a- -{1...3}-
  a{} b{}
---
echo -{a,b}{1...3}-
echo -{a,{1...3}}-
echo {a,b}{}
# osh doesn't expand ANYTHING on invalid syntax.  That's OK because of the test
# case below.
