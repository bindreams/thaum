name: 'bug from pnut: negative number $((-1))'
dialect: bash
source: oils:spec/builtin-bracket#bug-from-pnut-negative-number--1
stdout: |
  status=0
  status=0

  status=0
  status=0

  status=0
  status=0
---

# https://lobste.rs/s/lplim1/design_self_compiling_c_transpiler#c_km2ywc

[ $((-42)) -le 0 ]
