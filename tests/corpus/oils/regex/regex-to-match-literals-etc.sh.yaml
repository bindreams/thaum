name: Regex to match literals . ^ $ etc.
dialect: bash
source: oils:spec/regex#regex-to-match-literals-etc
stdout: |-
  false
  true
  false
  true
  false
  true
  false
  true
---
[[ 'x' =~ \. ]] || echo false
[[ '.' =~ \. ]] && echo true

[[ 'xx' =~ \^\$ ]] || echo false
[[ '^$' =~ \^\$ ]] && echo true

[[ 'xxx' =~ \+\*\? ]] || echo false
[[ '*+?' =~ \*\+\? ]] && echo true

[[ 'xx' =~ \{\} ]] || echo false
[[ '{}' =~ \{\} ]] && echo true
