disabled: true
name: 'Executor: can run Hay (while Hay is hard-coded)'
dialect: bash
source: oils:spec/ysh-purity#executor-can-run-hay-while-hay-is-hard-coded
stdout: |-
  {
    "version": "1.1"
  }
---

shopt --set ysh:upgrade

hay define Package/INSTALL

var cmd = ^(
  Package foo {
    version = '1.1'
    INSTALL { echo hi }
  }
)

call eval(cmd)

json write (_hay().children[0].attrs)
