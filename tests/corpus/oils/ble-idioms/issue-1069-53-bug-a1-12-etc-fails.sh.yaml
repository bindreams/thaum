name: 'Issue #1069 [53] BUG: a[1 + 1]=2, etc. fails'
dialect: bash
source: oils:spec/ble-idioms#issue-1069-53-bug-a1-12-etc-fails
stdout: "status=0, a[1]=hello\nstatus=0, a[2]=hello\nstatus=0, a[3]=hello\n"
---
case $SH in ash|dash|yash) exit 99 ;; esac
a=()

a[1]=x
eval 'a[5&3]=hello'
echo "status=$?, a[1]=${a[1]}"

a[2]=x
eval 'a[1 + 1]=hello'
echo "status=$?, a[2]=${a[2]}"

a[3]=x
eval 'a[1|2]=hello'
echo "status=$?, a[3]=${a[3]}"
# Note: ash/dash does not have arrays
# Note: yash does not support a[index]=value
