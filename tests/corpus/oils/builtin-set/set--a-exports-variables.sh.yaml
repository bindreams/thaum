name: set -a exports variables
dialect: bash
source: oils:spec/builtin-set#set--a-exports-variables
stdout: |
  bar
  qux
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
set -a
FOO=bar
BAZ=qux
printenv.py FOO BAZ
