name: Performance demo
dialect: bash
source: oils:spec/array-sparse#performance-demo
stdout: |
  BashArray
  len: 6
  subst: foo 25 26 27 bar sparse
  keys: 0 1 2 3 4 10
  slice: 26 27 bar
  get0: set0
  get1: 25
  ---
  append
  subst: set0 25 26 27 bar sparse x y
  keys: 0 1 2 3 4 10 11 12
  ---
  unset
  subst: set0 25 26 27 bar sparse y
  keys: 0 1 2 3 4 10 12
---

case $SH in bash|mksh) exit ;; esac

shopt -s ysh:upgrade

#pp test_ (a)

sp=( foo {25..27} bar )

sp[10]='sparse'

echo $[type(sp)]

echo len: "${#sp[@]}"

#echo $[len(sp)]

echo subst: "${sp[@]}"
echo keys: "${!sp[@]}"

echo slice: "${sp[@]:2:3}"

sp[0]=set0

echo get0: "${sp[0]}"
echo get1: "${sp[1]}"
echo ---

to_append=(x y)
echo append
sp+=("${to_append[@]}")
echo subst: "${sp[@]}"
echo keys: "${!sp[@]}"
echo ---

echo unset
unset -v 'sp[11]'
echo subst: "${sp[@]}"
echo keys: "${!sp[@]}"
