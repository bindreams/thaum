name: Unimplemented options - print, query, set, unset
dialect: bash
source: oils:spec/sh-options#unimplemented-options---print-query-set-unset
stdout: "q=2\np=2\nnoflag=2\nset=1\n"
---
case $SH in dash|mksh) exit ;; esac

opt_name=xpg_echo

shopt -p xpg_echo
shopt -q xpg_echo; echo q=$?

shopt -s xpg_echo
shopt -p xpg_echo

shopt -u xpg_echo
shopt -p xpg_echo
echo p=$?  # weird, bash also returns a status

shopt xpg_echo >/dev/null
echo noflag=$?

shopt -o errexit >/dev/null
echo set=$?
