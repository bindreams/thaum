disabled: true
name: raw strings and J8 strings don't work in OSH
dialect: bash
source: oils:spec/ysh-string#raw-strings-and-j8-strings-dont-work-in-osh
stdout: |+
  rhello \
  umu \u{3bc}
  bbyte \yff
  --
  r
  raw multi

  u
  u multi

  b
  b multi

...
---
shopt --unset ysh:all

echo r'hello \'
echo u'mu \u{3bc}'
echo b'byte \yff'

echo --

echo r'''
raw multi
'''

echo u'''
u multi
'''

echo b'''
b multi
'''
