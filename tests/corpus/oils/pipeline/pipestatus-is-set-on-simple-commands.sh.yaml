name: PIPESTATUS is set on simple commands
dialect: bash
source: oils:spec/pipeline#pipestatus-is-set-on-simple-commands
stdout: |-
  pipestatus 1
  pipestatus 55 44
  pipestatus 0
---
case $SH in dash|zsh) exit ;; esac

false
echo pipestatus ${PIPESTATUS[@]}

exit 55 | (exit 44)
echo pipestatus ${PIPESTATUS[@]}

true
echo pipestatus ${PIPESTATUS[@]}
