name: invokable Obj with more typed args
dialect: bash
source: oils:spec/ysh-proc#invokable-obj-with-more-typed-args
stdout: "sum = 1\n(Dict)   {\"x\":0,\"y\":1}\n(List)   [\"a\",\"b\",42,43]\n\nsum
  = 5\n(Obj)   (\"x\":2,\"y\":3) --> (\"__invoke__\":<Proc>)\n(List)   [\"a\",\"b\"\
  ,44,45]\n"
---
shopt --set ysh:upgrade

proc myInvoke (word1, word2; self, int1, int2) {
  echo "sum = $[self.x + self.y]"
  pp test_ (self)
  pp test_ ([word1, word2, int1, int2])
}

# call it directly with 'self'
myInvoke a b ({x: 0, y: 1}, 42, 43)
echo

var methods = Object(null, {__invoke__: myInvoke})

var callable = Object(methods, {x: 2, y: 3})

# call it through the obj
callable a b (44, 45)
