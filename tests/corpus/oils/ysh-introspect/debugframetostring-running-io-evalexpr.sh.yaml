disabled: true
name: DebugFrame.toString() running io->evalExpr()
dialect: bash
source: oils:spec/ysh-introspect#debugframetostring-running-io-evalexpr
stdout: |2-
    %1 [ -c flag ]:15
      p
      ^
    %2 [ -c flag ]:12
        call io->evalExpr(e)
                         ^
    %3 [ -c flag ]:9
      var e = ^[2 + $(print-num)]
                      ^~~~~~~~~
    %4 [ -c flag ]:5
        print-stack > stack-trace.txt
        ^~~~~~~~~~~
---

$[ENV.SH] -c '
source $[ENV.REPO_ROOT]/spec/testdata/debug-frame-lib.ysh

proc print-num {
  print-stack > stack-trace.txt
  echo 42
}

var e = ^[2 + $(print-num)]

proc p {
  call io->evalExpr(e)
}

p
' 

sed 's;#;%;g' stack-trace.txt
