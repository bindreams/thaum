name: append to element (BashAssoc)
dialect: bash
source: oils:spec/array-literal#append-to-element-bashassoc
stdout: "keys: ['hello']\nvals: ['12']\nkeys: ['hello']\nvals: ['12:34:56']\n"
---
declare -A a
hello=100
a=([hello]=1 [hello]+=2)
printf 'keys: '; argv.py "${!a[@]}"
printf 'vals: '; argv.py "${a[@]}"
a+=([hello]+=:34 [hello]+=:56)
printf 'keys: '; argv.py "${!a[@]}"
printf 'vals: '; argv.py "${a[@]}"
# Bash >= 5.1 has a bug. Bash <= 5.0 is OK.
