name: cd to symlink with -L and -P
dialect: bash
source: oils:spec/builtin-cd#cd-to-symlink-with--l-and--p
stdout: "OK\nOK\nOK\n"
environment:
  TMP: /tmp
---
targ=$TMP/cd-symtarget
lnk=$TMP/cd-symlink
mkdir -p $targ
ln -s $targ $lnk

# -L behavior is the default
cd $lnk
test $PWD = "$TMP/cd-symlink" && echo OK

cd -L $lnk
test $PWD = "$TMP/cd-symlink" && echo OK

cd -P $lnk
test $PWD = "$TMP/cd-symtarget" && echo OK || echo $PWD
