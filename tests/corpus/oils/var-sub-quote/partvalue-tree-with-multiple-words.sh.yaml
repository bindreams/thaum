name: part_value tree with multiple words
dialect: bash
source: oils:spec/var-sub-quote#partvalue-tree-with-multiple-words
stdout: "['1 2', '3 45', '6 7']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
argv.py ${a:-${a:-"1 2" "3 4"}5 "6 7"}
