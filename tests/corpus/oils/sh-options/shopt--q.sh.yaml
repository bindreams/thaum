name: shopt -q
dialect: bash
source: oils:spec/sh-options#shopt--q
stdout: |
  nullglob=1
  nullglob=0
  nullglob,failglob=1
  nullglob,failglob=0
---
shopt -q nullglob
echo nullglob=$?

# set it
shopt -s nullglob

shopt -q nullglob
echo nullglob=$?

shopt -q nullglob failglob
echo nullglob,failglob=$?

# set it
shopt -s failglob
shopt -q nullglob failglob
echo nullglob,failglob=$?
