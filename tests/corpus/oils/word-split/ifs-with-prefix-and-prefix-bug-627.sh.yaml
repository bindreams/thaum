name: "IFS='' with ${!prefix@} and ${!prefix*} (bug #627)"
dialect: bash
source: oils:spec/word-split#ifs-with-prefix-and-prefix-bug-627
stdout: |
  ['at', 'gLwbmGzS_var1', 'gLwbmGzS_var2']
  ['star', 'gLwbmGzS_var1', 'gLwbmGzS_var2']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
case $SH in dash | mksh | ash | yash) exit 0 ;; esac

gLwbmGzS_var1=1
gLwbmGzS_var2=2
IFS=''
argv.py at ${!gLwbmGzS_@}
argv.py star ${!gLwbmGzS_*}
