name: bind -q
dialect: bash
source: oils:spec/builtin-bind#bind--q
stdout: |-
  status=1
  vi-subst is not bound to any keys.
  status=1
  yank can be invoked via "\C-y".
  status=0
---

bind -q zz-bad
echo status=$?

# bash prints message to stdout

bind -q vi-subst
echo status=$?

bind -q yank
echo status=$?
