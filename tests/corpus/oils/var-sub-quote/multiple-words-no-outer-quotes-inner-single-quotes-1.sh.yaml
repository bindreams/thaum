name: 'Multiple words: no outer quotes, inner single quotes'
dialect: bash
source: 
  oils:spec/var-sub-quote#multiple-words-no-outer-quotes-inner-single-quotes
stdout: "['$var']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
var='a b c'
argv.py ${Unset:-'$var'}
