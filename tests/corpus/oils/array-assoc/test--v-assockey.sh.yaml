name: test -v assoc[key]
dialect: bash
source: oils:spec/array-assoc#test--v-assockey
stdout: |-
  no quotes
  empty=0
  k=0
  nonexistent=1

  quotes
  empty=0
  k=0
  nonexistent=1
---

typeset -A assoc
assoc=([empty]='' [k]=v)

echo 'no quotes'

test -v assoc[empty]
echo empty=$?

test -v assoc[k]
echo k=$?

test -v assoc[nonexistent]
echo nonexistent=$?

echo

# Now with quotes
echo 'quotes'

test -v assoc["empty"]
echo empty=$?

test -v assoc['k']
echo k=$?

test -v assoc['nonexistent'] 
echo nonexistent=$?
