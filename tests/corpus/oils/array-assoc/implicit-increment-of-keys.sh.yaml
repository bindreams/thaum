name: Implicit increment of keys
dialect: bash
source: oils:spec/array-assoc#implicit-increment-of-keys
stdout: "['30', '31', '40', '41']\n['a', 'b', 'x', 'y']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
declare -a arr=( [30]=a b [40]=x y)
argv.py "${!arr[@]}"
argv.py "${arr[@]}"
