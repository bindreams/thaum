disabled: true
name: Background pipeline (separate code path)
dialect: bash
source: oils:spec/ysh-xtrace#background-pipeline-separate-code-path
stdout: |
  status=0
stderr: |2-
      . 12345 builtin echo 1
      . 12345 builtin echo 2
    . 12345 exec grep ZZZ
    . 12345 exec sort
    ; process 12345: status 0
    ; process 12345: status 0
    ; process 12345: status 1
    < 12345 proc myfunc
    > 12345 proc myfunc
  . builtin ':' begin
  . builtin echo 'status=0'
  . builtin set '+x'
  < wait
  > wait
  | part 12345
  | part 12345
  | part 12345
---

shopt --set ysh:upgrade
shopt --unset errexit
set -x

myfunc() {
  echo 2
  echo 1
}

{
	: begin
	myfunc | sort | grep ZZZ &
	wait
	echo status=$?
  set +x
} 2>err.txt

# SORT for determinism
sed --regexp-extended 's/[[:digit:]]{2,}/12345/g' err.txt |
  LC_ALL=C sort >&2
