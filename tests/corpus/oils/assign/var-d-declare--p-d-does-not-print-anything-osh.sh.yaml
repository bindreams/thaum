name: '"var d = {}; declare -p d" does not print anything (OSH)'
dialect: bash
source: oils:spec/assign#var-d-declare--p-d-does-not-print-anything-osh
status: 1
stdout: "\n"
---
case $SH in bash-4.4|dash|mksh|zsh) exit 99 ;; esac

# We pretend that the variable does not exist when the variable is not
# representable with the "declare -p" format.

var d = {}
declare -p d
