disabled: true
name: Combine multi-line command and strings
dialect: bash
source: oils:spec/ysh-multiline#combine-multi-line-command-and-strings
stdout: |
  FOUR
  THREE
  TWO
  ONE
---
shopt --set ysh:all
shopt --unset no_parse_osh  # allow $'' for this test

var x = 'one'

# Print 3 args without separators
... write --sep '' --end '' -- 
    """
    $x
    """                         # 1. Double quoted
    '''
    two
    three
    '''                         # 2. Single quoted
    $'four\n'                   # 3. C-style with explicit newline
   | tac                        # Reverse
   | tr a-z A-Z                 # Uppercase
   ;
