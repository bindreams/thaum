name: negative numbers with unsigned / octal / hex
dialect: bash
source: oils:spec/builtin-printf#negative-numbers-with-unsigned-octal-hex
stdout: "[18446744073709551574]\nstatus=0\n[1777777777777777777726]\nstatus=0\n[ffffffffffffffd6]\n\
  status=0\n[FFFFFFFFFFFFFFD6]\nstatus=0\n"
---
printf '[%u]\n' -42
echo status=$?

printf '[%o]\n' -42
echo status=$?

printf '[%x]\n' -42
echo status=$?

printf '[%X]\n' -42
echo status=$?


# osh DISALLOWS this because the output depends on the machine architecture.
