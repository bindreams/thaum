name: 'Multiple words: no outer quotes, inner double quotes'
dialect: bash
source: 
  oils:spec/var-sub-quote#multiple-words-no-outer-quotes-inner-double-quotes
stdout: |
  ['a b c']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
argv.py ${Unset:-"a b c"}
