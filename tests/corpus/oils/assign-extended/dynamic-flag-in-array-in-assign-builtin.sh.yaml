name: dynamic flag in array in assign builtin
dialect: bash
source: oils:spec/assign-extended#dynamic-flag-in-array-in-assign-builtin
stdout: "foo=F\nbar=B\nF\nB\n"
---
typeset b
b=(unused1 unused2)  # this works in mksh

a=(x 'foo=F' 'bar=B')
typeset -"${a[@]}"
echo foo=$foo
echo bar=$bar
printenv.py foo
printenv.py bar

