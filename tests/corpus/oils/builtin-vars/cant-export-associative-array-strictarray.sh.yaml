name: can't export associative array (strict_array)
dialect: bash
source: oils:spec/builtin-vars#cant-export-associative-array-strictarray
stdout: |
  None
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
shopt -s strict_array

typeset -A a
a["foo"]=bar

export a
printenv.py a
