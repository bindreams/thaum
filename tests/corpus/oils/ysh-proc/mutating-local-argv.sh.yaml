name: Mutating local ARGV
dialect: bash
source: oils:spec/ysh-proc#mutating-local-argv
stdout: "['global', 'a b', 'c']\n['local', 'a b', 'c']\n['local', 'a b', 'c', 'LL']\n\
  ['global', 'a b', 'c']\n"
---

$SH -o ysh:upgrade -c '
argv.py global @ARGV

proc p {
  argv.py @ARGV
  call ARGV->append("LL")
  argv.py @ARGV
}

p local @ARGV

argv.py global @ARGV

' dummy0 'a b' c
