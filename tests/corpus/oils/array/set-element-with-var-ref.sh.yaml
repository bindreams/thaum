name: Set element with var ref
dialect: bash
source: oils:spec/array#set-element-with-var-ref
stdout: "['9', '2 3']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
a=(1 '2 3')
i=0
a[$i]=9
argv.py "${a[@]}"
