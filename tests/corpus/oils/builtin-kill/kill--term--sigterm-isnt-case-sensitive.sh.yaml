name: kill -terM -SigterM isn't case sensitive
dialect: bash
source: oils:spec/builtin-kill#kill--term--sigterm-isnt-case-sensitive
stdout: "kill=0\nwait=143\nkill=0\nwait=143\n## N-I dash/mksh/zsh STDOUT:\n"
---
case $SH in mksh|dash|zsh) exit ;; esac

sleep 0.1 &
pid=$!
kill -SigterM $pid
echo kill=$?
wait $pid
echo wait=$?

sleep 0.1 &
pid=$!
kill -terM $pid
echo kill=$?
wait $pid
echo wait=$?
