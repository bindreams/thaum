name: eval -- "$(declare -p arr)" (restore arrays w/ unset elements)
dialect: bash
source: 
  oils:spec/assign-extended#eval----declare--p-arr-restore-arrays-w-unset-elements
stdout: |-
  arr[0]: unset
  arr[1]: unset
  arr[2]: unset
  arr[3]: set ... []
  arr[4]: set ... [foo]
---
arr=(1 2 3)
eval -- "$(arr=(); arr[3]= arr[4]=foo; declare -p arr)"
for i in {0..4}; do
  echo "arr[$i]: ${arr[$i]+set ... [}${arr[$i]-unset}${arr[$i]+]}"
done
