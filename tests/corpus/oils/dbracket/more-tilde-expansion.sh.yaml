name: more tilde expansion
dialect: bash
source: oils:spec/dbracket#more-tilde-expansion
stdout: |-
  status=0
  status=1
  unary=1
  status=0
  fnmatch=0
  fnmatch=0
---
[[ ~ ]]
echo status=$?
HOME=''
[[ ~ ]]
echo status=$?
[[ -n ~ ]]
echo unary=$?

[[ ~ == ~ ]]
echo status=$?

[[ $HOME == ~ ]]
echo fnmatch=$?
[[ ~ == $HOME ]]
echo fnmatch=$?
