name: Truncating 'exit' status
dialect: bash
source: oils:spec/exit-status#truncating-exit-status
stdout: |-
  status=255
  status=0
  status=1
  ===
  status=255
  status=254
---

$SH -c 'exit 255'
echo status=$?

$SH -c 'exit 256'
echo status=$?

$SH -c 'exit 257'
echo status=$?

echo ===

$SH -c 'exit -1'
echo status=$?

$SH -c 'exit -2'
echo status=$?
