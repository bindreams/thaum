name: Word splitting
dialect: bash
source: oils:spec/word-eval#word-splitting
stdout: "['1', '23', '4', '5 6']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
s1='1 2'
s2='3 4'
s3='5 6'
argv.py $s1$s2 "$s3"
