name: fc -l [first] where first is an index
dialect: bash
source: oils:spec/builtin-fc#fc--l-first-where-first-is-an-index
stdout: |-
  2	 echo 1
  3	 echo 2
  4	 echo 3
  ^D
---
printf "echo %s\n" {1..3} > tmp

echo '
HISTFILE=tmp
history -c
history -r

fc -l 2
' | $SH --norc -i

# match osh's behaviour of echoing ^D for EOF
case $SH in bash) echo '^D' ;; esac
