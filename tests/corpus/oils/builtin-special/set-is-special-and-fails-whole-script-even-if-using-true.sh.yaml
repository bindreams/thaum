name: set is special and fails whole script, even if using || true
dialect: bash
source: 
  oils:spec/builtin-special#set-is-special-and-fails-whole-script-even-if-using-true
stdout: |
  ok
  non-zero status
---
$SH -c '
if test -n "$BASH_VERSION"; then
  set -o posix
fi

shopt -s invalid_ || true
echo ok
set -o invalid_ || true
echo should not get here
'
if test "$?" != 0; then
  echo 'non-zero status'
fi
