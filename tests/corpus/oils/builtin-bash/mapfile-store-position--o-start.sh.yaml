name: 'mapfile (store position): -O start'
dialect: bash
source: oils:spec/builtin-bash#mapfile-store-position--o-start
stdout: |
  n=5
  [x]
  [y]
  [a0]
  [a1]
  [a2]
---
type mapfile >/dev/null 2>&1 || exit 0
printf '%s\n' a{0..2} | {
  arr=(x y z)
  mapfile -O 2 -t arr
  echo "n=${#arr[@]}"
  printf '[%s]\n' "${arr[@]}"
}
