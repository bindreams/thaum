name: IFS='\'
dialect: bash
source: oils:spec/word-split#ifs
stdout: "['a', 'b']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
# NOTE: OSH fails this because of double backslash escaping issue!
IFS='\'
s='a\b'
argv.py $s
