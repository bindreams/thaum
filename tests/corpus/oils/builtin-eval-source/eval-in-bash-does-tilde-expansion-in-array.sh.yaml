name: Eval in bash does tilde expansion in array
dialect: bash
source: oils:spec/builtin-eval-source#eval-in-bash-does-tilde-expansion-in-array
stdout: |
  FALSE
  FALSE
  TRUE
---

# the "make" plugin in bash-completion relies on this?  wtf?
x="~"

# UPSTREAM CODE

#eval array=( "$x" )

# FIXED CODE -- proper quoting.

eval 'array=(' "$x" ')'  # array

test "$x" = "${array[0]}" || echo FALSE
[[ $x == /* ]] || echo FALSE  # doesn't start with /
[[ "${array[0]}" == /* ]] && echo TRUE
