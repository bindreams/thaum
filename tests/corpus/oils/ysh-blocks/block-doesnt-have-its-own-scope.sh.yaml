disabled: true
name: block doesn't have its own scope
dialect: bash
source: oils:spec/ysh-blocks#block-doesnt-have-its-own-scope
stdout: "x=1\nx=42\nx=42\n"
---
shopt -s ysh:all
var x = 1
echo "x=$x"
cd / {
  #set y = 5  # This would be an error because set doesn't do dynamic lookup
  var x = 42
  echo "x=$x"
}
echo "x=$x"
