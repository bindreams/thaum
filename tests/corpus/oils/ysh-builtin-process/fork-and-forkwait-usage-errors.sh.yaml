disabled: true
name: fork and forkwait usage  errors
dialect: bash
source: oils:spec/ysh-builtin-process#fork-and-forkwait-usage-errors
stdout: "status=2\nstatus=2\nstatus=2\nstatus=2\nstatus=2\nstatus=2\n"
---
shopt --set oil:upgrade
shopt --unset errexit

fork
echo status=$?

fork extra
echo status=$?

fork extra {
  echo hi
}
echo status=$?

#

forkwait
echo status=$?

forkwait extra
echo status=$?

forkwait extra {
  echo hi
}
echo status=$?
