name: "IFS='x ' read a b: trailing spaces (with max_split)"
dialect: bash
source: oils:spec/builtin-read#ifsx-read-a-b-trailing-spaces-with-maxsplit
stdout: |
  ['hello', 'world  test']
  -- IFS=x --
  ['a', 'ax  x']
  ['a', 'ax  x  x']
  ['a', 'ax  x  x']
  ['a', 'ax  x  x  a']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
echo 'hello world  test   ' | (read a b; argv.py "$a" "$b")
echo '-- IFS=x --'
IFS='x '
echo 'a ax  x  '     | (read a b; argv.py "$a" "$b")
echo 'a ax  x  x'    | (read a b; argv.py "$a" "$b")
echo 'a ax  x  x  '  | (read a b; argv.py "$a" "$b")
echo 'a ax  x  x  a' | (read a b; argv.py "$a" "$b")
