disabled: true
name: DebugFrame.toString() running io->eval() on command
dialect: bash
source: oils:spec/ysh-introspect#debugframetostring-running-io-eval-on-command
stdout: |2-
    %1 [ -c flag ]:7
      p
      ^
    %2 [ -c flag ]:5
        call io->eval(b)
                     ^
    %3 [ -c flag ]:3
      var b = ^(my-proc a b)
                ^~~~~~~
    %4 MYROOT/spec/testdata/debug-frame-lib.ysh:15
        print-stack
        ^~~~~~~~~~~
---
$[ENV.SH] -c '
source $[ENV.REPO_ROOT]/spec/testdata/debug-frame-lib.ysh
var b = ^(my-proc a b)
proc p {
  call io->eval(b)
}
p
' | sed -e "s;$[ENV.REPO_ROOT];MYROOT;g" -e 's;#;%;g'
