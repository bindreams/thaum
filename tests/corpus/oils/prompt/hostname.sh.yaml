name: hostname
dialect: bash
source: oils:spec/prompt#hostname
stdout: |-
  status=0
  status=0
---

# NOTE: This test is not hermetic.  On my machine the short and long host name
# are the same.

PS1='\h '
test "${PS1@P}" = "$(hostname -s) "  # short name
echo status=$?
PS1='\H '
test "${PS1@P}" = "$(hostname) "
echo status=$?
