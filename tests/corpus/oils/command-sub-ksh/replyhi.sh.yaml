name: ${|REPLY=hi}
dialect: bash
source: oils:spec/command-sub-ksh#replyhi
status: 1
stdout: "[ reply var ]\n\n[from file]\n\n"
---

x=${|y=" reply var "; REPLY=$y}
echo "[$x]"
echo

echo '  from file  ' > tmp.txt

x=${|read -r < tmp.txt}
echo "[$x]"
echo

# SYNTAX ERROR
x=${ |REPLY=zz}
echo "[$x]"
