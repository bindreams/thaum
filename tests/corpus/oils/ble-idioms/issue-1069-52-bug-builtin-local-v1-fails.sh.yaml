name: 'Issue #1069 [52] BUG: \builtin local v=1 fails'
dialect: bash
source: oils:spec/ble-idioms#issue-1069-52-bug-builtin-local-v1-fails
stdout: |
  l:v=1
  g:v=x
---
case $SH in ash|dash|yash) exit 99 ;; esac
v=x
case $SH in
mksh) f1() { \builtin typeset v=1; echo "l:v=$v"; } ;;
*)    f1() { \builtin local   v=1; echo "l:v=$v"; } ;;
esac
f1
echo "g:v=$v"
# Note: ash/dash/yash does not have "builtin"
