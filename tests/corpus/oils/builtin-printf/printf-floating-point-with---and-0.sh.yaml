name: printf floating point with - and 0
dialect: bash
source: oils:spec/builtin-printf#printf-floating-point-with---and-0
stdout: |
  [  3.1400]
  [003.1400]
  [  3.1400]
  [003.1400]
  ---
  [3.1400  ]
  [3.1400  ]
  [3.1400  ]
  [3.1400  ]
---
printf '[%8.4f]\n' 3.14
printf '[%08.4f]\n' 3.14
printf '[%8.04f]\n' 3.14  # meaning less 0
printf '[%08.04f]\n' 3.14
echo ---
# these all boil down to the same thing.  The -, 8, and 4 are respected, but
# none of the 0 are.
printf '[%-8.4f]\n' 3.14
printf '[%-08.4f]\n' 3.14
printf '[%-8.04f]\n' 3.14
printf '[%-08.04f]\n' 3.14
