name: setting key to itself (from bash-bug mailing list)
dialect: bash
source: oils:spec/array-assoc#setting-key-to-itself-from-bash-bug-mailing-list
stdout: |-
  value1
  value1 value2
---
declare -A foo
foo=(["key"]="value1")
echo ${foo["key"]}
foo=(["key"]="${foo["key"]} value2")
echo ${foo["key"]}
