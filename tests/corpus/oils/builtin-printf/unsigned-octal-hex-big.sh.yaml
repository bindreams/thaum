name: unsigned / octal / hex big
dialect: bash
source: oils:spec/builtin-printf#unsigned-octal-hex-big
stdout: |+
  [4294967296]
  [40000000000]
  [100000000]
  [100000000]

  [9223372036854775807]
  [777777777777777777777]
  [7fffffffffffffff]
  [7FFFFFFFFFFFFFFF]

...
---

for big in $(( 1 << 32 )) $(( (1 << 63) - 1 )); do
  printf '[%u]\n' $big
  printf '[%o]\n' $big
  printf '[%x]\n' $big
  printf '[%X]\n' $big
  echo
done
