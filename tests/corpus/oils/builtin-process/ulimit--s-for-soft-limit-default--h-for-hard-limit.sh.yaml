name: ulimit -S for soft limit (default), -H for hard limit
dialect: bash
source: 
  oils:spec/builtin-process#ulimit--s-for-soft-limit-default--h-for-hard-limit
stdout: "init\n  unlimited\n  unlimited\n\n-S\n  123456\n  unlimited\n\n-H\n  123456\n\
  \  123457\n\nno flag\n  123455\n  123455\n\nGET\n  123454\n  123454\n  123455\n"
---
case $SH in dash|zsh) exit ;; esac

# Note: ulimit -n -S 1111 is OK in osh/dash/mksh, but not bash/zsh
# Mus be ulimit -S -n 1111

show_state() {
  local msg=$1
  echo "$msg"
  echo -n '  '; ulimit -S -t
  echo -n '  '; ulimit -H -t
  echo
}

show_state 'init'

ulimit -S -t 123456
show_state '-S'

ulimit -H -t 123457
show_state '-H'

ulimit -t 123455
show_state 'no flag'

echo 'GET'

ulimit -S -t 123454
echo -n '  '; ulimit -t
echo -n '  '; ulimit -S -t
echo -n '  '; ulimit -H -t
