disabled: true
name: shSplit() respects IFS
dialect: bash
source: oils:spec/ysh-func-builtin#shsplit-respects-ifs
stdout: |
  ['aa', 'a', 'bb', 'b']
  [' ', '', ' ', ' bb b   ']
  [' aa a ', '', ' ', '   ']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

var s = ' aa a bb b   '

argv.py @[shSplit(s)]

setvar IFS = 'a'

argv.py @[shSplit(s)]

setvar IFS = 'b'

argv.py @[shSplit(s)]
