name: 'typeset +r removes read-only attribute (TODO: documented in bash to do nothing)'
dialect: bash
source: 
  oils:spec/assign-extended#typeset-r-removes-read-only-attribute-todo-documented-in-bash-to-do-nothing
status: 0
stdout: "r=r1\nr=r2\nr=r3\n"
---
readonly r=r1
echo r=$r

# clear the readonly flag.  Why is this accepted in bash, but doesn't do
# anything?
typeset +r r=r2 
echo r=$r

r=r3
echo r=$r


