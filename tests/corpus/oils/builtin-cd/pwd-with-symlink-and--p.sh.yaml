name: pwd with symlink and -P
dialect: bash
source: oils:spec/builtin-cd#pwd-with-symlink-and--p
stdout: "pwd:\nsymlink\npwd -P:\ntarget\n"
environment:
  TMP: /tmp
---
tmp=$TMP/builtins-pwd-1
mkdir -p $tmp/target
ln -s -f $tmp/target $tmp/symlink

cd $tmp/symlink

echo pwd:
basename $(pwd)

echo pwd -P:
basename $(pwd -P)
