name: Redirect in the middle of two assignments
dialect: bash
source: oils:spec/redirect-command#redirect-in-the-middle-of-two-assignments
stdout: "bar\nfoo\n"
environment:
  TMP: /tmp
setup: |
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py

---
FOO=foo >$TMP/out.txt BAR=bar printenv.py FOO BAR
tac $TMP/out.txt
