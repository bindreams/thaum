name: Make an existing local variable readonly
dialect: bash
source: oils:spec/builtin-vars#make-an-existing-local-variable-readonly
stdout: "local\nstatus=1\nglobal\n"
---
f() {
	local x=local
	readonly x
	echo $x
	eval 'x=bar'  # Wrap in eval so it's not fatal
	echo status=$?
}
x=global
f
echo $x

# mksh aborts the function, weird
