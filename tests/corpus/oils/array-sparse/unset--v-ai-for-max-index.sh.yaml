name: unset -v a[i] for max index
dialect: bash
source: oils:spec/array-sparse#unset--v-ai-for-max-index
stdout: "declare -a a=(1 2 3 4 5 6 7 x)\ndeclare -a a=(1 2 3 4 5 6 x)\n"
---
case $SH in mksh) exit ;; esac

a=({1..9})
unset -v 'a[-1]'
a[-1]=x
declare -p a
unset -v 'a[-1]'
a[-1]=x
declare -p a
