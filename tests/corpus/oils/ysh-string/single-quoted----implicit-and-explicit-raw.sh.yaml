disabled: true
name: single quoted -- implicit and explicit raw
dialect: bash
source: oils:spec/ysh-string#single-quoted----implicit-and-explicit-raw
stdout: |
  foo bar
  foo bar
  \t\n
---
var x = 'foo bar'
echo $x
setvar x = r'foo bar'  # Same string
echo $x
setvar x = r'\t\n'  # This is raw
echo $x
