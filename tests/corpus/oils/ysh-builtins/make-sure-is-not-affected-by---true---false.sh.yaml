disabled: true
name: Make sure [[ is not affected by --true --false
dialect: bash
source: oils:spec/ysh-builtins#make-sure-is-not-affected-by---true---false
stdout: |
  dbracket=0
  dbracket=0
  parse error 2
  parse error 2
---

set +o errexit

$SH +o ysh:all -c '[[ --true ]]; echo dbracket=$?'
$SH +o ysh:all -c '[[ --false ]]; echo dbracket=$?'

$SH +o ysh:all -c '[[ --true true ]]; echo dbracket=$?'
echo "parse error $?"
$SH +o ysh:all -c '[[ --false false ]]; echo dbracket=$?'
echo "parse error $?"
