name: command -v with multiple names
dialect: bash
source: oils:spec/builtin-meta#command--v-with-multiple-names
stdout: |-
  echo
  myfunc
  for
  status=1
  ## BUG bash STDOUT:
  echo
  myfunc
  for
  status=0
  ## BUG-2 dash/ash STDOUT: 
  echo
  status=0
  ## OK mksh STDOUT: 
  echo
  myfunc
  status=1
---
# ALL FOUR SHELLS behave differently here!
#
# bash chooses to swallow the error!  We agree with zsh if ANY word lookup
# fails, then the whole thing fails.

myfunc() { echo x; }
command -v echo myfunc ZZZ for
echo status=$?
