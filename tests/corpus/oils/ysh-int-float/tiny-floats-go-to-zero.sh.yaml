disabled: true
name: Tiny floats go to zero
dialect: bash
source: oils:spec/ysh-int-float#tiny-floats-go-to-zero
stdout: |-
  float=0.0
---

shopt -s ysh:upgrade
# TODO: need equivalent of in YSh
# '0' * 309
# ['0'] * 309

# 1e-324 == 0.0 in Python

var zeros = []
for i in (1 ..< 324) {
  call zeros->append('0')
}

#= zeros

var s = "0.$[join(zeros)]1"
#echo $s

echo float=$[float(s)]
