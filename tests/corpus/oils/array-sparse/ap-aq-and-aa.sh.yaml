name: ${a[@]@P}, ${a[@]@Q}, and ${a[@]@a}
dialect: bash
source: oils:spec/array-sparse#ap-aq-and-aa
stdout: "['v0', 'v1', 'v5', 'v6', 'v8', 'v9']\n['v0 v1 v5 v6 v8 v9']\n['v0', 'v1',
  'v5', 'v6', 'v8', 'v9']\n['v0 v1 v5 v6 v8 v9']\n['a', 'a', 'a', 'a', 'a', 'a']\n\
  ['a a a a a a']\n"
---
case $SH in mksh) exit ;; esac

a=(v{0..9})
unset -v 'a[2]' 'a[3]' 'a[4]' 'a[7]'

argv.py "${a[@]@P}"
argv.py "${a[*]@P}"
argv.py "${a[@]@Q}"
argv.py "${a[*]@Q}"
argv.py "${a[@]@a}"
argv.py "${a[*]@a}"
