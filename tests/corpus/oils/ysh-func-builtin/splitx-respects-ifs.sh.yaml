disabled: true
name: '@[split(x)] respects IFS'
dialect: bash
source: oils:spec/ysh-func-builtin#splitx-respects-ifs
stdout: "['one', 'two', 'three']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
setvar IFS = ":"
var x = "one:two:three"
argv.py @[split(x)]
