disabled: true
name: help topics that are embedded
dialect: bash
source: oils:spec/ysh-builtin-help#help-topics-that-are-embedded
stdout: |+
  no args 0

  ~~~ help
  help 0

  ~~~ oils-usage
  oils-usage 0

  ~~~ osh-usage
  osh-usage 0

  ~~~ ysh-usage
  ysh-usage 0

  ~~~ osh-chapters
  osh-chapters 0

  ~~~ ysh-chapters
  ysh-chapters 0

...
---

help > help.txt
echo no args $?
echo

for topic in help oils-usage {osh,ysh}-usage {osh,ysh}-chapters; do
  help $topic | fgrep -o "~~~ $topic"
  echo $topic $?
  echo
done
