disabled: true
name: More shvar PATH=''
dialect: bash
source: oils:spec/hay-isolation#more-shvar-path
stdout: |
  status=127
  status=127
  _status 127
---
shopt --set parse_brace command_sub_errexit parse_proc parse_ysh_expr_sub

shvar PATH='' {
  ( cp -v file /tmp >&2 )
  echo status=$?

  forkwait {
    cp -v file /tmp >&2
  }
  echo status=$?

  try {
    true $(cp -v file /tmp >&2)
  }
  echo _status $[_error.code]
}
