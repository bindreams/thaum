name: 'YSH readability: ulimit --all the same as ulimit -a'
dialect: bash
source: 
  oils:spec/builtin-process#ysh-readability-ulimit---all-the-same-as-ulimit--a
stdout: "  8 short.txt\n  8 long.txt\n 16 total\nstatus=0\n"
---

case $SH in bash|dash|mksh|zsh) exit ;; esac

ulimit -a > short.txt
ulimit --all > long.txt

wc -l short.txt long.txt

diff -u short.txt long.txt
echo status=$?
