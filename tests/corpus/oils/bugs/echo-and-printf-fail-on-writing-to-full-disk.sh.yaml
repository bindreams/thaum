name: "'echo' and printf fail on writing to full disk"
dialect: bash
source: oils:spec/bugs#echo-and-printf-fail-on-writing-to-full-disk
stdout: |
  status=1
  status=1
---

# Inspired by https://blog.sunfishcode.online/bugs-in-hello-world/

echo hi > /dev/full
echo status=$?

printf '%s\n' hi > /dev/full
echo status=$?
