name: Array indirect expansion with @? conversion
dialect: bash
source: oils:spec/var-ref#array-indirect-expansion-with-conversion
stdout: |
  ==== v1 ====
  ['value']
  ['value']
  ['']
  ==== v2 ====
  ["''"]
  ['']
  ['']
  ==== a1 ====
  ['']
  ['']
  ['a']
  ==== a2[0] ====
  ['element']
  ['element']
  ['a']
  ==== a3[@] ====
  ['1', '2', '3']
  ['1', '2', '3']
  ['a', 'a', 'a']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

declare -A ref=(['dummy']=v1)
function test-op0 {
  echo "==== $1 ===="
  ref['dummy']=$1
  argv.py "${!ref[@]@Q}"
  argv.py "${!ref[@]@P}"
  argv.py "${!ref[@]@a}"
}

v1=value
test-op0 v1

v2=
test-op0 v2

a1=()
test-op0 a1

a2=(element)
test-op0 'a2[0]'

a3=(1 2 3)
test-op0 'a3[@]'


# Bash 4.4 had a bug in the section "==== a3[@] ====":
#
# ==== a3[@] ====
# []
# []
# []
