disabled: true
name: '""" and $""" in Expression Mode'
dialect: bash
source: oils:spec/ysh-string#and-in-expression-mode
stdout: |
  line1=line1
  line2=line2
  [one "
  two = 2 ""
   three = 3
  ]
  [good
   bad 42
  ]
  [good
   bad 42
  ]
---

var line1 = """line1"""
echo line1=$line1
var line2 = """
line2"""
echo line2=$line2

var two = 2
var three = 3
var x = """
  one "
  two = $two ""
   three = $three
  """
echo "[$x]"

var i = 42
var x = """
  good
 bad $i
  """
echo "[$x]"

# alias
var x = $"""
  good
 bad $i
  """
echo "[$x]"
