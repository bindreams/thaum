disabled: true
name: 'round trip: decode surrogate half and encode'
dialect: bash
source: oils:spec/ysh-json#round-trip-decode-surrogate-half-and-encode
stdout: |+
  "\ud83e"
  (Str)   b'\yed\ya0\ybe'
  json "\ud83e"
  json8 b'\yed\ya0\ybe'

  "\udd26"
  (Str)   b'\yed\yb4\ya6'
  json "\udd26"
  json8 b'\yed\yb4\ya6'

...
---

shopt -s ysh:upgrade

for j in '"\ud83e"' '"\udd26"' {
  var s = fromJson(j)
  write -- "$j"
  pp test_ (s)

  write -n 'json ';  json write (s)

  write -n 'json8 '; json8 write (s)

  echo
}
