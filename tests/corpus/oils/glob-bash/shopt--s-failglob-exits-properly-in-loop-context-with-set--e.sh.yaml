name: shopt -s failglob exits properly in loop context with set -e
dialect: bash
source: 
  oils:spec/glob-bash#shopt--s-failglob-exits-properly-in-loop-context-with-set--e
status: 1
stdout: |-
  *.ZZ
  status=0
---
set -e
for x in *.ZZ; do echo $x; done
echo status=$?

shopt -s failglob
for x in *.ZZ; do echo $x; done
echo status=$?
