name: DebugFrame.toString() with 'use' builtin
dialect: bash
source: oils:spec/ysh-introspect#debugframetostring-with-use-builtin
stdout: "  %1 [ -c flag ]:1\n    use $[ENV.REPO_ROOT]/spec/testdata/debug-frame-use.ysh\n\
  \    ^~~\n  %2 MYROOT/spec/testdata/debug-frame-use.ysh:5\n    debug-frame-lib my-proc\n\
  \                    ^~~~~~~\n  %3 MYROOT/spec/testdata/debug-frame-lib.ysh:15\n\
  \      print-stack\n      ^~~~~~~~~~~\n"
---

# Work around spec test builtin limitation: line starting with # is treated as
# a comment

#echo $[ENV.REPO_ROOT]

$[ENV.SH] -c 'use $[ENV.REPO_ROOT]/spec/testdata/debug-frame-use.ysh' | 
  sed -e "s;$[ENV.REPO_ROOT];MYROOT;g" -e 's;#;%;g'

#write -- $[ENV.REPO_ROOT] | sed "s;$[ENV.REPO_ROOT];REPO_ROOT;g"
