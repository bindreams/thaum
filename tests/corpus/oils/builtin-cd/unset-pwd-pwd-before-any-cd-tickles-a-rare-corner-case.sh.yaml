name: "'unset PWD; pwd' before any cd (tickles a rare corner case)"
dialect: bash
source: 
  oils:spec/builtin-cd#unset-pwd-pwd-before-any-cd-tickles-a-rare-corner-case
stdout: "/tmp/oil-spec-test/pwd-2\n"
---
dir=/tmp/oil-spec-test/pwd-2
mkdir -p $dir
cd $dir

# ensure clean shell process state
$SH -c 'unset PWD; pwd'
