name: assignment using dynamic keyword (splits in most shells, not in zsh/osh)
dialect: bash
source: 
  oils:spec/assign#assignment-using-dynamic-keyword-splits-in-most-shells-not-in-zshosh
stdout: |
  ['a b c', 'a b c']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
words='a b c'
e=export
r=readonly
$e ex=$words
$r ro=$words
argv.py "$ex" "$ro"

# zsh and OSH are smart
