name: 'Multiple words: outer double quotes, inner single quotes'
dialect: bash
source: 
  oils:spec/var-sub-quote#multiple-words-outer-double-quotes-inner-single-quotes
stdout: |
  ["'a b c'"]
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
# WEIRD ONE.
#
# I think I should just disallow any word with single quotes inside double
# quotes.
var='a b c'
argv.py "${Unset:-'$var'}"
