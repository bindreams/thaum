name: Export existing global variables
dialect: bash
source: oils:spec/builtin-vars#export-existing-global-variables
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
G1=g1
G2=g2
export G1 G2
printenv.py G1 G2
g1
g2
