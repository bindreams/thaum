disabled: true
name: BashAssoc can be serialized
dialect: bash
source: oils:spec/ysh-json#bashassoc-can-be-serialized
stdout: |
  {
    "type": "BashAssoc",
    "data": {}
  }
  {
    "type": "BashAssoc",
    "data": {
      "foo": "bar",
      "42": "43"
    }
  }
---

declare -A empty_assoc

declare -A assoc=([foo]=bar [42]=43)

json write (empty_assoc)
json write (assoc)
