name: 'Nested % and # operators (bug reported by Crestwave)'
dialect: bash
source: oils:spec/var-op-strip#nested-and-operators-bug-reported-by-crestwave
stdout: "['']\n['\\n']\n['\\n']\n['']\n['a']\n['a']\n"
---
var=$'\n'
argv.py "${var#?}"
argv.py "${var%''}"
argv.py "${var%"${var#?}"}"
var='a'
argv.py "${var#?}"
argv.py "${var%''}"
argv.py "${var%"${var#?}"}"
