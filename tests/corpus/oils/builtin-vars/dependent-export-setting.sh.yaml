name: Dependent export setting
dialect: bash
source: oils:spec/builtin-vars#dependent-export-setting
stdout: |
  v=None
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
# FOO is not respected here either.
export FOO=foo v=$(printenv.py FOO)
echo "v=$v"
