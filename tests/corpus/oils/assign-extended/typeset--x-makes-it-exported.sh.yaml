name: typeset -x makes it exported
dialect: bash
source: oils:spec/assign-extended#typeset--x-makes-it-exported
stdout: "lib/\n"
setup: |
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py

---
typeset -rx PYTHONPATH=lib/
printenv.py PYTHONPATH
