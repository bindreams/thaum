name: Are quotes allowed?
dialect: bash
source: oils:spec/array-assign#are-quotes-allowed
status: 1
stdout: "\n"
---

# double quotes allowed in bash
a["1"]=2
echo status=$? len=${#a[@]}

a['2']=3
echo status=$? len=${#a[@]}

# allowed in bash
a[2 + "3"]=5
echo status=$? len=${#a[@]}

a[3 + '4']=5
echo status=$? len=${#a[@]}



# syntax errors are not fatal in bash
