disabled: true
name: '@[maybe(x)]'
dialect: bash
source: oils:spec/ysh-func-builtin#maybex
stdout: "['a', 'X', 'b']\n['a', 'b']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
setvar empty = ''
setvar x = 'X'
argv.py a @[maybe(empty)] @[maybe(x)] b

setvar n = null
argv.py a @[maybe(n)] b
