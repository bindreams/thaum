name: read -t 0 tests if input is available
dialect: bash
source: oils:spec/builtin-read#read--t-0-tests-if-input-is-available
stdout: "0\n0\nreply=\n0\n"
---
case $SH in dash|zsh|mksh) exit ;; esac

# is there input available?
read -t 0 < /dev/null
echo $?

# floating point
read -t 0.0 < /dev/null
echo $?

# floating point
echo foo | { read -t 0; echo reply=$REPLY; }
echo $?
