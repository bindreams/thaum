name: 'Bug: Nix idiom with closing ) next to pattern'
dialect: bash
source: oils:spec/regex#bug-nix-idiom-with-closing-next-to-pattern
stdout: |
  one
  two
---

if [[ ! (" ${params[*]} " =~ " -shared " || " ${params[*]} " =~ " -static ") ]]; then
  echo one
fi

# Reduced idiom
if [[ (foo =~ foo) ]]; then
  echo two
fi
