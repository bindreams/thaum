disabled: true
name: json read doesn't accept comments, but json8 does
dialect: bash
source: oils:spec/ysh-json#json-read-doesnt-accept-comments-but-json8-does
stdout: |-
  status=0
  {
    "key": "val",
    "k2": "v2"
  }
  status=1
---

json8 read <<EOF
{  # comment
  "key":  # zz
  b'val',  # yy
  "k2": "v2"  #
}
EOF
echo status=$?

json8 write (_reply)

json read <<EOF
{"key": "val"}  # comment
EOF
echo status=$?
