name: 'Nested % and # operators (bug reported by Crestwave)'
dialect: bash
source: oils:spec/var-op-strip#nested-and-operators-bug-reported-by-crestwave
stdout: |
  ['']
  ['\n']
  ['\n']
  ['']
  ['a']
  ['a']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
var=$'\n'
argv.py "${var#?}"
argv.py "${var%''}"
argv.py "${var%"${var#?}"}"
var='a'
argv.py "${var#?}"
argv.py "${var%''}"
argv.py "${var%"${var#?}"}"
