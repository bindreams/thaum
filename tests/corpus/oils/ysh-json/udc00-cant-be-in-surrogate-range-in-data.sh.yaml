disabled: true
name: \u{dc00} can't be in surrogate range in data
dialect: bash
source: oils:spec/ysh-json#udc00-cant-be-in-surrogate-range-in-data
stdout: |-
  status=0
  status=1
  status=1
  status=0
---

json8 read <<'EOF'
["long string", u'hello \u{d7ff}', "other"]
EOF
echo status=$?

json8 read <<'EOF'
["long string", u'hello \u{d800}', "other"]
EOF
echo status=$?

json8 read <<'EOF'
["long string", u'hello \u{dfff}', "other"]
EOF
echo status=$?

json8 read <<'EOF'
["long string", u'hello \u{e000}', "other"]
EOF
echo status=$?
