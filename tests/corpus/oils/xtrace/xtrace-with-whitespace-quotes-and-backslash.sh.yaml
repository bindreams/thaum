name: xtrace with whitespace, quotes, and backslash
dialect: bash
source: oils:spec/xtrace#xtrace-with-whitespace-quotes-and-backslash
stdout: "1 2 ' \" \\\n"
stderr: "+ echo '1 2' $'\\'' '\"' $'\\\\'\n"
---
set -o xtrace
echo '1 2' \' \" \\

# YSH is different because backslashes require $'\\' and not '\', but that's OK
