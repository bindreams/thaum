name: automatically creating arrays WITHOUT strict_array
dialect: bash
source: 
  oils:spec/strict-options#automatically-creating-arrays-without-strictarray
stdout: |
  ['x', 'y']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
undef[2]=x
undef[3]=y
argv.py "${undef[@]}"
