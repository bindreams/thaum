name: 'ble.sh: eval -- "$(declare -p var arr)"'
dialect: bash
source: oils:spec/assign-extended#blesh-eval----declare--p-var-arr
stdout: "sum=21\narr[0]=a2\narr[1]=a5\narr[2]=a8\narr[3]=a10\n"
---
# This illustrates an example usage of "eval & declare" for exporting
# multiple variables from $().
eval -- "$(
  printf '%s\n' a{1..10} | {
    sum=0 i=0 arr=()
    while read line; do
      ((sum+=${#line},i++))
      arr[$((i/3))]=$line
    done
    declare -p sum arr
  })"
echo sum=$sum
for ((i=0;i<${#arr[@]};i++)); do
  echo "arr[$i]=${arr[i]}"
done
