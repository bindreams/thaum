name: File in relative subdirectory and no shebang is executed
dialect: bash
source: 
  oils:spec/command#file-in-relative-subdirectory-and-no-shebang-is-executed
status: 0
stdout: "hi\n"
---
cd $TMP
mkdir -p test-no-shebang
echo 'echo hi' > test-no-shebang/script
chmod +x test-no-shebang/script
"$SH" -c 'test-no-shebang/script'
