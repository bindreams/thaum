disabled: true
name: Str.replace(Eggex, Expr)
dialect: bash
source: oils:spec/ysh-regex-api#strreplaceeggex-expr
stdout: |-
  Hello Bob
  Hello Bob (extracted from 'name: Bob')
---
shopt --set ysh:all

var mystr = 'name: Bob'
write $[mystr.replace(/ 'name: ' <capture dot+> /, ^"Hello $1")]
write $[mystr.replace(/ 'name: ' <capture dot+> /, ^"Hello $1 (extracted from '$0')")]
