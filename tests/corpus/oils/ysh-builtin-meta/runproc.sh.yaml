disabled: true
name: runproc
dialect: bash
source: oils:spec/ysh-builtin-meta#runproc
stdout: |-
  f
  1
  2
  status=0
  p
  3
  4
  status=0
  status=1
  status=2
---
shopt --set parse_proc parse_at

f() {
  write -- f "$@"
}
proc p {
  write -- p @ARGV
}
runproc f 1 2
echo status=$?

runproc p 3 4
echo status=$?

runproc invalid 5 6
echo status=$?

runproc
echo status=$?
