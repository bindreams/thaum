disabled: true
name: time with brace group argument
dialect: bash
source: oils:spec/builtin-process#time-with-brace-group-argument
status: 0
stdout: |-
  user
  result=0
  non-zero
---

err=time-$(basename $SH).txt
{
  time {
    sleep 0.01
    sleep 0.02
  }
} 2> $err

grep --only-matching user $err
echo result=$?

# Regression: check fractional seconds
gawk '
BEGIN { ok = 0 }
match( $0, /\.([0-9]+)/, m) {
  if (m[1] > 0) {  # check fractional seconds
    ok = 1
  }
}
END { if (ok) { print "non-zero" } }
' $err


# time doesn't accept a block?

# dash doesn't have time keyword
