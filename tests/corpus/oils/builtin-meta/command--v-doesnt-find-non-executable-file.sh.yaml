name: command -v doesn't find non-executable file
dialect: bash
source: oils:spec/builtin-meta#command--v-doesnt-find-non-executable-file
stdout: "status=1\n_tmp/executable\nstatus=0\n"
---
# PATH resolution is different

mkdir -p _tmp
PATH="_tmp:$PATH"
touch _tmp/non-executable _tmp/executable
chmod +x _tmp/executable

command -v _tmp/non-executable
echo status=$?

command -v _tmp/executable
echo status=$?
