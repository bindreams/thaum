name: 'Regression: silent out-of-bound negative index in ${a[-2]} and $((a[-2]))'
dialect: bash
source: 
  oils:spec/array#regression-silent-out-of-bound-negative-index-in-a-2-and-a-2
stdout: "[]\n0\n[0]\n0\n"
stderr: "  echo \"[${a[-2]}]\"\n           ^\n[ stdin ]:4: Index -2 out of bounds
  for array of length 1\n  echo \"[$((a[-2]))]\"\n             ^\n[ stdin ]:6: Index
  -2 out of bounds for array of length 1\n"
---
case $SH in mksh) exit ;; esac

a=(x)
echo "[${a[-2]}]"
echo $?
echo "[$((a[-2]))]"
echo $?
