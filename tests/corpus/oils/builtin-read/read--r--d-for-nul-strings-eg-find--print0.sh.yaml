name: read -r -d '' for NUL strings, e.g. find -print0
dialect: bash
source: oils:spec/builtin-read#read--r--d-for-nul-strings-eg-find--print0
stdout: "[./a\\b\\c\\d]\n"
---


case $SH in dash|zsh|mksh) exit ;; esac  # NOT IMPLEMENTED

mkdir -p read0
cd read0
rm -f *

touch a\\b\\c\\d  # -r is necessary!

find . -type f -a -print0 | { read -r -d ''; echo "[$REPLY]"; }
