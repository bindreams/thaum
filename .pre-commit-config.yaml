default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: no-llm-author-test
        name: Test hook "no-llm-author"
        entry: pytest scripts/check-no-llm-author.py -q --tb=short --no-header
        language: python
        additional_dependencies: ['pytest']
        pass_filenames: false
        always_run: true

      - id: no-llm-author
        name: LLM cannot be a code author
        entry: scripts/check-no-llm-author.py
        language: python
        stages: [commit-msg]

      - id: no-std-test
        name: "no stray #[test] attribute"
        entry: '^\s*#\[test\]'
        language: pygrep
        types: [rust]

      - id: format-section-comments-test
        name: Test hook "format-section-comments"
        entry: pytest scripts/format-section-comments.py -q --tb=short --no-header
        language: python
        additional_dependencies: ['pytest']
        pass_filenames: false
        always_run: true

      - id: format-section-comments
        name: section comment format
        entry: scripts/format-section-comments.py
        language: python
        types: [rust]

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --features cli -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: format-sh-yaml-test
        name: Test hook "format-sh-yaml"
        entry: pytest scripts/format-sh-yaml.py -q --tb=short --no-header
        language: python
        additional_dependencies: ['pytest', 'ruamel.yaml']
        pass_filenames: false
        always_run: true

      - id: format-sh-yaml
        name: sh.yaml format
        entry: scripts/format-sh-yaml.py
        language: python
        additional_dependencies: ['ruamel.yaml']
        files: '\.sh\.yaml$'

  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.21
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.2.1
    hooks:
      - id: editorconfig-checker
        # Rust indent is enforced by cargo fmt; markdown by mdformat.
        exclude_types: [rust, markdown]
