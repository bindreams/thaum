name: Env bindings shouldn't contain array assignments
dialect: bash
source: 
  oils:spec/assign-extended#env-bindings-shouldnt-contain-array-assignments
status: 2
stdout: ''
setup: |
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py

---
a=1 b[0]=2 c=3 printenv.py a b c
