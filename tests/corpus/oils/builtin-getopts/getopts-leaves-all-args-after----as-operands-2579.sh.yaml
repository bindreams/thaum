name: "getopts leaves all args after '--' as operands #2579"
dialect: bash
source: 
  oils:spec/builtin-getopts#getopts-leaves-all-args-after----as-operands-2579
stdout: |-
  a
  2
  -c operand
---
set -- "-a" "--" "-c" "operand"
while getopts "a" name; do
    case "$name" in
        a)
            echo "a"
            ;;
        c)
            echo "c"
            ;;
        ?)
            echo "?"
            ;;
    esac
done
shift $((OPTIND - 1))
echo "$#"
echo "$@"
