name: command -v
dialect: bash
source: oils:spec/builtin-meta#command--v
stdout: |-
  echo
  0
  myfunc
  0
  nonexistent=1
  empty=1
  for
  0
  ## OK dash/ash STDOUT:
  echo
  0
  myfunc
  0
  nonexistent=127
  empty=127
  for
  0
---
myfunc() { echo x; }
command -v echo
echo $?

command -v myfunc
echo $?

command -v nonexistent  # doesn't print anything
echo nonexistent=$?

command -v ''  # BUG FIX, shouldn't succeed
echo empty=$?

command -v for
echo $?
