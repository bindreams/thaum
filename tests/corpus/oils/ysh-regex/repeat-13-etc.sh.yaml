name: Repeat {1,3} etc.
dialect: bash
source: oils:spec/ysh-regex#repeat-13-etc
stdout: "[[:digit:]]{2}\n[[:digit:]]{1,3}\n[[:digit:]]{1,}\n[[:digit:]]{,3}\n"
---
var pat = null

setvar pat = /d{2}/
echo $pat
setvar pat = /d{1,3}/
echo $pat
setvar pat = /d{1,}/
echo $pat
setvar pat = /d{,3}/
echo $pat
