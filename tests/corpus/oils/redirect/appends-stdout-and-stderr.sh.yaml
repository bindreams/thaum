name: '&>> appends stdout and stderr'
dialect: bash
source: oils:spec/redirect#appends-stdout-and-stderr
stdout: |
  ok
  ok
  ok
environment:
  TMP: /tmp
setup: |-
  #!/bin/sh
  cat > stdout_stderr.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  stdout = sys.argv[1] if len(sys.argv) > 1 else "STDOUT"
  stderr = sys.argv[2] if len(sys.argv) > 2 else "STDERR"
  status = int(sys.argv[3]) if len(sys.argv) > 3 else 0
  print(stdout)
  print(stderr, file=sys.stderr)
  sys.exit(status)
  HELPER
  chmod +x stdout_stderr.py
---

# Fix for flaky tests: dash behaves non-deterministically under load!  It
# doesn't implement the behavior anyway so I don't care why.
case $SH in
  *dash)
    exit 1
    ;;
esac

echo "ok" > $TMP/f.txt
stdout_stderr.py &>> $TMP/f.txt
grep ok $TMP/f.txt >/dev/null && echo 'ok'
grep STDOUT $TMP/f.txt >/dev/null && echo 'ok'
grep STDERR $TMP/f.txt >/dev/null && echo 'ok'
