name: compgen -F _set_COMPREPLY
dialect: bash
source: oils:spec/array-sparse#compgen--f-setcompreply
stdout: |
  0
  1
  3
  5
  7
  8
  9
---
case $SH in mksh) exit ;; esac

_set_COMPREPLY() {
  COMPREPLY=({0..9})
  unset -v 'COMPREPLY[2]' 'COMPREPLY[4]' 'COMPREPLY[6]'
}

compgen -F _set_COMPREPLY
