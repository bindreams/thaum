name: declare -p var
dialect: bash
source: oils:spec/assign-extended#declare--p-var
stdout: "[declare]\ndeclare -- test_var1=111\ndeclare -r test_var2=222\ndeclare -x
  test_var3=333\ndeclare -n test_var4=test_var1\ndeclare -- test_var5=555\n[readonly]\n\
  declare -r test_var2=222\n[export]\ndeclare -x test_var3=333\n[local]\ndeclare --
  test_var5=555\n"
---
# BUG? bash doesn't output anything for 'local/readonly -p var', which seems to
#   contradict with manual.  Besides, 'export -p var' is not described in
#   manual
test_var1=111
readonly test_var2=222
export test_var3=333
declare -n test_var4=test_var1
f1() {
  local test_var5=555
  {
    echo '[declare]'
    declare -p test_var{0..5}
    echo '[readonly]'
    readonly -p test_var{0..5}
    echo '[export]'
    export -p test_var{0..5}
    echo '[local]'
    local -p test_var{0..5}
  } | grep -E '^\[|^\b.*test_var.\b'
}
f1
