disabled: true
name: ASCII control chars can't appear literally in messages
dialect: bash
source: oils:spec/ysh-json#ascii-control-chars-cant-appear-literally-in-messages
stdout: |-
  status=4
  ASCII control chars
---
shopt -s ysh:upgrade

var message=$'"\x01"'
#echo $message | od -c

try {
  var obj = fromJson(message)
}
echo status=$[_error.code]
echo "$[_error.message]" | egrep -o 'ASCII control chars'
