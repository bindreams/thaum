disabled: true
name: Process subs, subshells not allowed with eval()
dialect: bash
source: oils:spec/ysh-purity#process-subs-subshells-not-allowed-with-eval
stdout: |-
  1
  2
  code=5 message=Process subs aren't allowed in pure mode (OILS-ERR-204)

  subshell
  code=5 message=Subshells aren't allowed in pure mode (OILS-ERR-204)
---
shopt --set ysh:upgrade

var cmd = ^( cat <(echo 1) <(echo 2) )
call io->eval(cmd)

try {
  call eval(cmd)
}
echo code=$[_error.code] message=$[_error.message]
echo

var cmd = ^(( echo subshell ) )
call io->eval(cmd)

try {
  call eval(cmd)
}
echo code=$[_error.code] message=$[_error.message]
