name: Unset exported variable, then define it again.  It's NOT still exported.
dialect: bash
source: 
  oils:spec/builtin-vars#unset-exported-variable-then-define-it-again-its-not-still-exported
stdout: |
  u
  None
  newvalue
  None
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
export U
U=u
printenv.py U
unset U
printenv.py U
U=newvalue
echo $U
printenv.py U
