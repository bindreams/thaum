name: history -r reads from the history file, and appends it to the current 
  history
dialect: bash
source: 
  oils:spec/builtin-history#history--r-reads-from-the-history-file-and-appends-it-to-the-current-history
stdout: |
  20
environment:
  TMP: /tmp
---

cd $TMP
printf "cmd orig%s\n" {1..10} > tmp
HISTFILE=tmp

history -c

history -r
history -r

history | grep orig | wc -l
