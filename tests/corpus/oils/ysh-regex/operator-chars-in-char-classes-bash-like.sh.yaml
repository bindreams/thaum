disabled: true
name: Operator chars in char classes (bash-like)
dialect: bash
source: oils:spec/ysh-regex#operator-chars-in-char-classes-bash-like
stdout: |
  hyphen
  backslash
  right bracket
  left bracket
  period
  caret
  no way to have [^]
---

pat='[-]'
[[ '-' =~ $pat ]] && echo hyphen
[[ '\' =~ $pat ]] && echo FAIL

pat='[\]'
[[ '\' =~ $pat ]] && echo backslash
[[ '-' =~ $pat ]] && echo FAIL

pat='[]]'
[[ ']' =~ $pat ]] && echo 'right bracket'
[[ '[' =~ $pat ]] && echo FAIL

pat='[[]'
[[ '[' =~ $pat ]] && echo 'left bracket'
[[ ']' =~ $pat ]] && echo FAIL

pat='[.]'
[[ '.' =~ $pat ]] && echo period
[[ '\' =~ $pat ]] && echo FAIL

pat='[\^]'
[[ '^' =~ $pat ]] && echo caret
[[ '\' =~ $pat ]] && echo 'no way to have [^]'
