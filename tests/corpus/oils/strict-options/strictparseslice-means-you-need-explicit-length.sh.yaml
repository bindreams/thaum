name: strict_parse_slice means you need explicit  length
dialect: bash
source: oils:spec/strict-options#strictparseslice-means-you-need-explicit-length
stdout: "//\nstatus=0\nstatus=2\n"
---
case $SH in bash*|dash|mksh) exit ;; esac

$SH -c '
a=(1 2 3); echo /${a[@]::}/
'
echo status=$?

$SH -c '
shopt --set strict_parse_slice

a=(1 2 3); echo /${a[@]::}/
'
echo status=$?
