disabled: true
name: read --raw-line in a loop
dialect: bash
source: oils:spec/ysh-builtins#read---raw-line-in-a-loop
stdout: |
  (Str)   ""
  (Str)   "a"
  (Str)   "b"
  (Str)   ""

  (Str)   "a"
  (Str)   ""
  (Str)   "b"
---

write --end '' $'\na\nb\n\n' | while read --raw-line; do
  pp test_ (_reply)
done

echo

write --end '' $'a\n\nb' | while read --raw-line; do
  pp test_ (_reply)
done
