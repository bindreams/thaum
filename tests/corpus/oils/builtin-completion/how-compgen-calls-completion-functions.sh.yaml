name: how compgen calls completion functions
dialect: bash
source: oils:spec/builtin-completion#how-compgen-calls-completion-functions
stdout: |
  ['argv', 'compgen', 'foo', '']
  ['COMP_WORDS']
  ['COMP_CWORD', '-1']
  ['COMP_LINE', '']
  ['COMP_POINT', '0']
  one
  two
  three
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
foo_complete() {
  # first, cur, prev
  argv.py argv "$@"
  argv.py COMP_WORDS "${COMP_WORDS[@]}"
  argv.py COMP_CWORD "${COMP_CWORD}"
  argv.py COMP_LINE "${COMP_LINE}"
  argv.py COMP_POINT "${COMP_POINT}"
  #return 124
  COMPREPLY=(one two three)
}
compgen -F foo_complete foo a b c
