name: 'assign builtin appending array: declare d+=(d e)'
dialect: bash
source: oils:spec/append#assign-builtin-appending-array-declare-dd-e
stdout: |
  d e
  d e c l
  r e
  l o
  l o c a
---

declare d+=(d e)
echo "${d[@]}"
declare d+=(c l)
echo "${d[@]}"

readonly r+=(r e)
echo "${r[@]}"
# can't do this again

f() {
  local l+=(l o)
  echo "${l[@]}"

  local l+=(c a)
  echo "${l[@]}"
}

f
