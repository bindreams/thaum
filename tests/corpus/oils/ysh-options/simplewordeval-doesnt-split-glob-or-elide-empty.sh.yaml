disabled: true
name: simple_word_eval doesn't split, glob, or elide empty
dialect: bash
source: oils:spec/ysh-options#simplewordeval-doesnt-split-glob-or-elide-empty
stdout: |
  ['a', 'b', 'bar.z', 'foo.z', 'spam.z', 'spam.z']
  ['-x y', 'z-']
  ['a b', '*.z', '', 'spam.z']
  ['-x y', 'z-']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
mkdir mydir
touch foo.z bar.z spam.z
spaces='a b'
dir=mydir
glob=*.z
prefix=sp
set -- 'x y' z

for i in 1 2; do
  local empty=
  argv.py $spaces $glob $empty $prefix*.z

  # arrays still work too, with this weird rule
  argv.py -"$@"-

  shopt -s simple_word_eval
done
