disabled: true
name: shvar IFS=x { myproc } rather than IFS=x myproc - no dynamic scope
dialect: bash
source: 
  oils:spec/ysh-scope#shvar-ifsx-myproc-rather-than-ifsx-myproc---no-dynamic-scope
stdout: |
  :
   20 09 0a 0a
  IFS= z

  shellfunc IFS= z
  ['x', 'x', 'x']

  shellfunc IFS= x
  ['', 'z', 'z', 'z']

  myproc IFS= z
  ['x', 'x', 'x']

  myproc IFS= x
  ['', 'z', 'z', 'z']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---

# Note: osh/split.py uses dynamic scope to look up IFS
# TODO: Should use LANG example to demonstrate

#shopt --set ysh:upgrade  # this would disable word splitting

shopt --set parse_proc
shopt --set parse_brace
#shopt --set env_obj

s='xzx zxz'

shellfunc() {
  echo shellfunc IFS="$IFS"
  argv.py $s
}

proc myproc() {
  echo myproc IFS="$IFS"
  argv.py $s
}

IFS=: $REPO_ROOT/spec/bin/printenv.py IFS

# default value
echo "$IFS" | od -A n -t x1

IFS=' z'
echo IFS="$IFS"
echo

shellfunc
echo

IFS=' x' shellfunc
echo

# Problem: $IFS in procs only finds GLOBAL values, so we get IFS=' z' rather than IFS=' x'.
# But when actually splitting, $IFS is a 'shvar' which respects DYNAMIC scope.
#
# Can use shvarGet('IFS') instead

IFS=' x' myproc
echo

# YSH solution to the problem
shvar IFS=' x' {
  myproc
}
