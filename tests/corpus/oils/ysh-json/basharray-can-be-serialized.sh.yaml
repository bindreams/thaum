disabled: true
name: BashArray can be serialized
dialect: bash
source: oils:spec/ysh-json#basharray-can-be-serialized
stdout: |
  {
    "type": "BashArray",
    "data": {}
  }
  {
    "type": "BashArray",
    "data": {
      "0": "x",
      "1": "y",
      "5": "z"
    }
  }
---

declare -a empty_array

declare -a array=(x y)
array[5]=z

json write (empty_array)
json write (array)
