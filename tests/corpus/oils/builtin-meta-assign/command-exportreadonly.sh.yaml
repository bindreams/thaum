name: command export,readonly
dialect: bash
source: oils:spec/builtin-meta-assign#command-exportreadonly
stdout: |-
  c=export
  c=readonly
  --
  cc=export
  cc=readonly
---
case $SH in zsh) exit ;; esac

# dash doesn't have declare typeset

command export c=export
echo c=$c

command readonly c=readonly
echo c=$c

echo --

command command export cc=export
echo cc=$cc

command command readonly cc=readonly
echo cc=$cc
