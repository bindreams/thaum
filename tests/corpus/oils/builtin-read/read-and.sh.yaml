name: read and "\ "
dialect: bash
source: oils:spec/builtin-read#read-and
stdout: |
  -- xs... --
  ['', '']
  ['', ' ']
  ['', '  ']
  ['', '   ']
  -- xe... --
  ['', ' ']
  ['', '  ']
  ['', '   ']
  ['', ' ']
  ['', ' ']
  ['', ' ']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

IFS='x '
check() { echo "$1" | (read a b; argv.py "$a" "$b"); }

echo '-- xs... --'
check 'x '
check 'x \ '
check 'x \ \ '
check 'x \ \ \ '
echo '-- xe... --'
check 'x\ '
check 'x\ \ '
check 'x\ \ \ '
check 'x\  '
check 'x\  '
check 'x\    '

# check 'xx\ '
# check 'xx\ '

-- xs... --
['', '']
['', '']
['', '']
['', '']
-- xe... --
['', '']
['', '']
['', '']
['', '']
['', '']
['', '']
