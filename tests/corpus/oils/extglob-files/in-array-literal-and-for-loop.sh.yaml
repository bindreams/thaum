name: In Array Literal and for loop
dialect: bash
source: oils:spec/extglob-files#in-array-literal-and-for-loop
stdout: |-
  bar.py
  foo.py
  ---
  zzz bar.py foo.py
---
shopt -s extglob
mkdir -p eg11
cd eg11
touch {foo,bar,spam}.py
for x in @(fo*|bar).py; do
  echo $x
done

echo ---
declare -a A
A=(zzz @(fo*|bar).py)
echo "${A[@]}"
