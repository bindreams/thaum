disabled: true
name: shvar local
dialect: bash
source: oils:spec/ysh-scope#shvar-local
stdout: |
  ['a', 'b', 'c']
  IFS=x
  ['a b c']
  MYTEMP=foo
  ['a', 'b', 'c']
  MYTEMP=undef
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
shopt --set ysh:upgrade  # blocks
shopt --unset simple_word_eval  # test word splitting

proc foo {
  shvar IFS=x MYTEMP=foo {
    echo IFS="$IFS"
    argv.py $s
    echo MYTEMP=${MYTEMP:-undef}
  }
}
var s = 'a b c'
argv.py $s
foo
argv.py $s
echo MYTEMP=${MYTEMP:-undef}
