name: declare and glob
dialect: bash
source: oils:spec/assign#declare-and-glob
stdout: "['*']\n"
environment:
  TMP: /tmp
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
cd $TMP
touch foo=a foo=b
typeset foo=*
argv.py "$foo"
unset foo
