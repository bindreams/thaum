name: 'symbolic syntax error: start with -'
dialect: bash
source: oils:spec/builtin-umask#symbolic-syntax-error-start-with
status: 0
stdout: |-
  error
  124
  error
  124
  error
  124
---
umask 0124
umask -rwx
if test $? -ne 0; then echo 'error'; fi
umask | tail -c 4

umask 0124
umask -wx
if test $? -ne 0; then echo 'error'; fi
umask | tail -c 4

umask 0124
umask -=+
if test $? -ne 0; then echo 'error'; fi
umask | tail -c 4
