name: printf %6.4s does both truncation and padding
dialect: bash
source: oils:spec/builtin-printf#printf-64s-does-both-truncation-and-padding
stdout: |-
  [   foo]
  [   foo]
  [foo   ]
  [spam-eggs]
  [  spam]
  [spam  ]
---
printf '[%6s]\n' foo
printf '[%6.4s]\n' foo
printf '[%-6.4s]\n' foo
printf '[%6s]\n' spam-eggs
printf '[%6.4s]\n' spam-eggs
printf '[%-6.4s]\n' spam-eggs
