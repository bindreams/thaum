disabled: true
name: eggex capture
dialect: bash
source: oils:spec/ysh-case#eggex-capture
status: 0
stdout: "g0=/foo. g1=oo\ng0=ar g1=ar\nno match\n"
---
for name in foo/foo.py bar/bar.cc zz {
  case (name) {
    / '/f' <capture dot*> '.' / { echo "g0=$[_group(0)] g1=$[_group(1)]" }
    / '/b' <capture dot*> '.' / { echo "g0=$[_group(1)] g1=$[_group(1)]" }
    (else) { echo 'no match' }
  }
}
