name: Compare trap DEBUG vs. trap ERR
dialect: bash
source: oils:spec/builtin-trap-bash#compare-trap-debug-vs-trap-err
stdout: |
  dbg 3
  dbg 3
  dbg 3
  dbg 5
  dbg 5
  dbg 5
  dbg 7
  dbg 9
  err 14
  err 16
  ok
---

# Pipelines and AndOr are problematic

# THREE each
trap 'echo dbg $LINENO' DEBUG

false | false | false

false || false || false

! true

trap - DEBUG


# ONE EACH
trap 'echo err $LINENO' ERR

false | false | false

false || false || false

! true  # not run

echo ok
