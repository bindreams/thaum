name: read --raw-line --with-eol in a loop
dialect: bash
source: oils:spec/ysh-builtins#read---raw-line---with-eol-in-a-loop
stdout: "(Str)   \"\\n\"\n(Str)   \"a\\n\"\n(Str)   \"b\\n\"\n(Str)   \"\\n\"\n\n\
  (Str)   \"a\\n\"\n(Str)   \"\\n\"\n(Str)   \"b\"\n"
---

write --end '' $'\na\nb\n\n' | while read --raw-line --with-eol; do
  pp test_ (_reply)
done

echo

write --end '' $'a\n\nb' | while read --raw-line --with-eol; do
  pp test_ (_reply)
done
