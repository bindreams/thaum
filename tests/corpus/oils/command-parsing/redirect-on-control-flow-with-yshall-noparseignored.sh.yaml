name: Redirect on control flow with ysh:all (no_parse_ignored)
dialect: bash
source: 
  oils:spec/command-parsing#redirect-on-control-flow-with-yshall-noparseignored
status: 0
stdout: |
  REDIRECTED
---
shopt -s ysh:all
rm -f _tmp/r.txt
for x in a b c; do
  break > _tmp/r.txt
done
test -f _tmp/r.txt && echo REDIRECTED
