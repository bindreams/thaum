name: 'read -d : (colon-separated records)'
dialect: bash
source: oils:spec/builtin-read#read--d-colon-separated-records
stdout: "v1=a,b,c\nv1=d v2=e,f\nv1=g v2=h v3=i\n"
---
printf a,b,c:d,e,f:g,h,i | {
  IFS=,
  read -d : v1
  echo "v1=$v1"
  read -d : v1 v2
  echo "v1=$v1 v2=$v2"
  read -d : v1 v2 v3
  echo "v1=$v1 v2=$v2 v3=$v3"
}
