name: bash variable can have an associative array part and a string part
dialect: bash
source: 
  oils:spec/array-assoc#bash-variable-can-have-an-associative-array-part-and-a-string-part
stdout: |
  1 2
  1 2 zero
  1 2 string
---

# and $assoc is equivalent to ${assoc[0]}, just like regular arrays
declare -A assoc
assoc[1]=1
assoc[2]=2
echo ${assoc[1]} ${assoc[2]} ${assoc}
assoc[0]=zero
echo ${assoc[1]} ${assoc[2]} ${assoc}
assoc=string
echo ${assoc[1]} ${assoc[2]} ${assoc}
