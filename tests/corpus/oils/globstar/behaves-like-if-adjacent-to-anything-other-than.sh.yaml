name: '** behaves like * if adjacent to anything other than /'
dialect: bash
source: oils:spec/globstar#behaves-like-if-adjacent-to-anything-other-than
stdout: |-
  directory/leaf.md leaf.md
  directory/leaf.md
  directory/leaf.md
  directory/leaf.md
  directory/leaf.md
---
shopt -s globstar

mkdir directory
touch leaf.md
touch directory/leaf.md

echo **/*.* | sort
echo directory/**/*.md | sort
echo d**/*.md | sort
echo **y/*.md | sort
echo d**y/*.md | sort
