name: read from redirected directory is non-fatal error
dialect: bash
source: oils:spec/builtin-read#read-from-redirected-directory-is-non-fatal-error
stdout: "status=1\n"
environment:
  TMP: /tmp
---

# This tickles an infinite loop bug in our version of mksh!  TODO: upgrade the
# version and enable this
case $SH in mksh) return ;; esac

cd $TMP
mkdir -p dir
read x < ./dir
echo status=$?

# OK mksh stdout: status=2
