name: Basic getopts invocation
dialect: bash
source: oils:spec/builtin-getopts#basic-getopts-invocation
stdout: |
  h=1 c=foo optind=4 argv=x y z
---
set -- -h -c foo x y z
FLAG_h=0
FLAG_c=''
while getopts "hc:" opt; do
  case $opt in
    h) FLAG_h=1 ;;
    c) FLAG_c="$OPTARG" ;;
  esac
done
shift $(( OPTIND - 1 ))
echo h=$FLAG_h c=$FLAG_c optind=$OPTIND argv=$@
