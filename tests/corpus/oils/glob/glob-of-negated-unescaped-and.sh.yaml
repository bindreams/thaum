name: Glob of negated unescaped [[] and []]
dialect: bash
source: oils:spec/glob#glob-of-negated-unescaped-and
stdout: |
  _G _G
  _G _G
environment:
  TMP: /tmp
---
# osh does this "correctly" because it defers to libc!
touch $TMP/_G
cd $TMP
echo _[^\[z] _[^\]z]  # the right way to do it
echo _[^[z] _[^]z]    # also accepted
