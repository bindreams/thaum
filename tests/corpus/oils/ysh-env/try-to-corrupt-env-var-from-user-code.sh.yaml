name: try to corrupt ENV var from user code
dialect: bash
source: oils:spec/ysh-env#try-to-corrupt-env-var-from-user-code
stdout: "(Str)   'aa'\n"
---
shopt --set ysh:all

setglobal ENV.AA = 'aa'

proc p {
  # this doesn't do anything, because Mem still have self.env_object
  setglobal ENV = null

  # TODO: there could be other ways to mess it up, and hit e_die()
  # Right now, it's not possible to mutate 'prototype'.  But if so we could
  # mess up ENV.
}  

FOO=bar p

= ENV.AA
