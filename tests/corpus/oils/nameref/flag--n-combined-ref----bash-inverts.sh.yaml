name: flag -n combined ${!ref} -- bash INVERTS
dialect: bash
source: oils:spec/nameref#flag--n-combined-ref----bash-inverts
stdout: |-
  ref=x
  !ref=foo
  NOW A NAMEREF
  ref=foo
  !ref=x
---
foo=FOO  # should NOT use this

x=foo
ref=x

echo ref=$ref
echo "!ref=${!ref}"

echo 'NOW A NAMEREF'

typeset -n ref
echo ref=$ref
echo "!ref=${!ref}"
