name: Using Hay with --eval flags
dialect: bash
source: oils:spec/hay#using-hay-with---eval-flags
stdout: "{\n  \"type\": \"Package\",\n  \"args\": [\n    \"cpython\"\n  ],\n  \"children\"\
  : [],\n  \"attrs\": {\n    \"version\": \"3.12\",\n    \"url\": \"https://python.org/release/3.12/\"\
  ,\n    \"build\": null\n  }\n}\nversion = 3.12, url = https://python.org/release/3.12/\n"
---
shopt --set ysh:all

echo 'hay define Package' >pre.ysh 

echo '
Package cpython {
  version = "3.12"
  url = "https://python.org/release/$version/"
  proc build {
    echo "version = $version, url = $url"
  }
}
' >def.hay

# TODO:
# null_replacer=true
# JavaScript has a second "replacer" arg, which can be a function, or an array
# I guess you can specify replacer=null
#
# Invert it: Or maybe type_errors=true
#
# When type_errors=false (default), any unserializable value becomes null

echo 'json write (_hay().children[0], type_errors=false)' > stage-1.ysh

# Stage 1

... $[ENV.SH] -o ysh:all
  # TODO: restore purity
  #--eval-pure pre.ysh
  #--eval-pure def.hay
  #--eval-pure stage-1.ysh
  --eval pre.ysh
  --eval def.hay
  --eval stage-1.ysh
  -c '' 
  || true
  ;

# Stage 2

echo '
var pkg = _hay().children[0]
var build_proc = pkg.attrs.build
build_proc
' > stage-2.ysh

# Stage 1

... $[ENV.SH] -o ysh:all
  # TODO: restore purity
  #--eval-pure pre.ysh
  #--eval-pure def.hay
  --eval pre.ysh
  --eval def.hay
  --eval stage-2.ysh  # This one isn't pure
  -c ''
  ;
