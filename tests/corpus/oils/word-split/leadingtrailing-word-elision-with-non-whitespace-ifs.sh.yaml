name: Leading/trailing word elision with non-whitespace IFS
dialect: bash
source: 
  oils:spec/word-split#leadingtrailing-word-elision-with-non-whitespace-ifs
stdout: |
  ['', 'a', 'b']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
# This behavior is weird.
IFS=_
s1='_a_b_'
argv.py $s1
