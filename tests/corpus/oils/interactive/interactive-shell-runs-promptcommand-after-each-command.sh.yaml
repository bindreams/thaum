name: interactive shell runs PROMPT_COMMAND after each command
dialect: bash
source: 
  oils:spec/interactive#interactive-shell-runs-promptcommand-after-each-command
stdout: "PROMPT\none\nPROMPT\ntwo\nPROMPT\n^D\n"
---
export PS1=''  # OSH prints prompt to stdout

case $SH in
  *bash|*osh)
    $SH --rcfile /dev/null -i << EOF
PROMPT_COMMAND='echo PROMPT'
echo one
echo two
EOF
    ;;
esac

# Paper over difference with OSH
case $SH in *bash) echo '^D' ;; esac
