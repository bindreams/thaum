disabled: true
name: Str.replace(Eggex, Str)
dialect: bash
source: oils:spec/ysh-regex-api#strreplaceeggex-str
stdout: |
  mangled-kebab-case
  smaller---to---bigger
---
shopt --set ysh:all

var mystr = 'mangled----kebab--case'
write $[mystr.replace(/ '-'+ /, '-')]

setvar mystr = 'smaller-to-bigger'
write $[mystr.replace(/ '-'+ /, '---')]
