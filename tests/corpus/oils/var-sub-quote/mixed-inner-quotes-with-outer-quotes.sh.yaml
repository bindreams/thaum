name: Mixed inner quotes with outer quotes
dialect: bash
source: oils:spec/var-sub-quote#mixed-inner-quotes-with-outer-quotes
stdout: "['a b c']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
argv.py "${Unset:-"a b" c}"
