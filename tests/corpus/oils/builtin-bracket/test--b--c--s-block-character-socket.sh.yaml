name: test -b -c -S (block, character, socket)
dialect: bash
source: oils:spec/builtin-bracket#test--b--c--s-block-character-socket
stdout: |
  -b
  status=1
  status=1
  status=1
  -c
  status=1
  status=1
  -S
  status=1
  status=1
---
# NOTE: we do not have the "true" case

echo -b
test -b nonexistent
echo status=$?
test -b testdata
echo status=$?
test -b /
echo status=$?

echo -c
test -c nonexistent
echo status=$?
test -c testdata
echo status=$?

echo -S
test -S nonexistent
echo status=$?
test -S testdata
echo status=$?
