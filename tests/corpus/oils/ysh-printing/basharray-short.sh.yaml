disabled: true
name: BashArray, short
dialect: bash
source: oils:spec/ysh-printing#basharray-short
stdout: |
  (BashArray)
  (BashArray [0]='hello')

  (Dict)  {k: (BashArray)}
  (Dict)  {k: (BashArray [0]='hello')}

  {"type":"BashArray","data":{}}
  {"type":"BashArray","data":{"0":"hello"}}

  (Dict)   {"k":{"type":"BashArray","data":{}}}
  (Dict)   {"k":{"type":"BashArray","data":{"0":"hello"}}}
---
declare -a empty=()
declare -a array_1=(hello)

pp value (empty)
pp value (array_1)
echo

pp value ({k: empty})
pp value ({k: array_1})
echo

pp test_ (empty)
pp test_ (array_1)
echo

pp test_ ({k: empty})
pp test_ ({k: array_1})
