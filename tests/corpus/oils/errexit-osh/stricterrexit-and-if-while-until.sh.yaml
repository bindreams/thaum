name: strict_errexit and ! && || if while until
dialect: bash
source: oils:spec/errexit-osh#stricterrexit-and-if-while-until
stdout: |-
  bang=1
  --
  or=1
  --
  and=1
  --
  if=1
  --
  while=1
  --
  until=1
  --
---
prelude='set -o errexit
shopt -s strict_errexit || true
fun() { echo fun; }'

$SH -c "$prelude; ! fun; echo 'should not get here'"
echo bang=$?
echo --

$SH -c "$prelude; fun || true"
echo or=$?
echo --

$SH -c "$prelude; fun && true"
echo and=$?
echo --

$SH -c "$prelude; if fun; then true; fi"
echo if=$?
echo --

$SH -c "$prelude; while fun; do echo while; exit; done"
echo while=$?
echo --

$SH -c "$prelude; until fun; do echo until; exit; done"
echo until=$?
echo --
