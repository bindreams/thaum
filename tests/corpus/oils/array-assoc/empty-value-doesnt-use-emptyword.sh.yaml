name: Empty value (doesn't use EmptyWord?)
dialect: bash
source: oils:spec/array-assoc#empty-value-doesnt-use-emptyword
stdout: |
  ['']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
declare -A A=(["k"]= )
argv.py "${A["k"]}"
