name: Tilde expansion come before var expansion
dialect: bash
source: oils:spec/brace-expansion#tilde-expansion-come-before-var-expansion
stdout: |
  /home/bob
  ~
---
HOME=/home/bob
foo=~
echo $foo
foo='~'
echo $foo
# In the second instance, we expand into a literal ~, and since var expansion
# comes after tilde expansion, it is NOT tried again.
