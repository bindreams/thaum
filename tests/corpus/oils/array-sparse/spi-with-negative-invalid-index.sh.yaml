name: ${sp[i]} with negative invalid index
dialect: bash
source: oils:spec/array-sparse#spi-with-negative-invalid-index
stdout: |
  sp[-10]: ''.
  sp[-11]: ''.
  sp[-19]: ''.
stderr: |2-
    echo "sp[-10]: '${sp[-10]}'."
                      ^~
  [ stdin ]:8: Index -10 out of bounds for array of length 9
    echo "sp[-11]: '${sp[-11]}'."
                      ^~
  [ stdin ]:9: Index -11 out of bounds for array of length 9
    echo "sp[-19]: '${sp[-19]}'."
                      ^~
  [ stdin ]:10: Index -19 out of bounds for array of length 9
---
case $SH in mksh) exit ;; esac

sp=({1..9})
unset -v 'sp[2]'
unset -v 'sp[3]'
unset -v 'sp[7]'

echo "sp[-10]: '${sp[-10]}'."
echo "sp[-11]: '${sp[-11]}'."
echo "sp[-19]: '${sp[-19]}'."
