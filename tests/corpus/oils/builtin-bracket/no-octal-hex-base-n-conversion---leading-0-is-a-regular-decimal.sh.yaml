name: No octal, hex, base N conversion - leading 0 is a regular decimal
dialect: bash
source: 
  oils:spec/builtin-bracket#no-octal-hex-base-n-conversion---leading-0-is-a-regular-decimal
stdout: "59\n-59\n\nstatus=0\nstatus=0\n\nhex=2\nbaseN=2\n"
---

# arithmetic has octal conversion
echo $(( 073 ))
echo $(( -073 ))

echo

# Bracket does NOT have octal conversion!  That is annoying.
[ 073 -eq 73 ]
echo status=$?

[ -073 -eq -73 ]
echo status=$?

echo

[ 0xff -eq 255 ]
echo hex=$?
[ 64#a -eq 10 ]
echo baseN=$?
