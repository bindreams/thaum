name: -G and -O for effective user ID and group ID
dialect: bash
source: oils:spec/builtin-bracket#g-and--o-for-effective-user-id-and-group-id
stdout: "status=0\nstatus=1\nstatus=0\nstatus=1\n"
---

mkdir -p $TMP/bin

test -O $TMP/bin
echo status=$?
test -O __nonexistent__
echo status=$?

test -G $TMP/bin
echo status=$?
test -G __nonexistent__
echo status=$?
