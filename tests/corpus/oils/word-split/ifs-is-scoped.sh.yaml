name: IFS is scoped
dialect: bash
source: oils:spec/word-split#ifs-is-scoped
stdout: "['ab', 'd']\n['a', 'cd']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
IFS=b
word=abcd
f() { local IFS=c; argv.py $word; }
f
argv.py $word
