[package]
name = "shell-parser"
version = "0.1.0"
edition = "2021"

[features]
default = []
cli = ["dep:colored"]

[dependencies]
thiserror = "2"
contracts = "0.6"
colored = { version = "3", optional = true }

[dev-dependencies]
pretty_assertions = "1"

[[bin]]
name = "shell-parse"
path = "src/main.rs"
required-features = ["cli"]
