name: Parsing Nested Attributes nodes (bug fix)
dialect: bash
source: oils:spec/hay#parsing-nested-attributes-nodes-bug-fix
status: 2
stdout: "\n"
---

shopt --set parse_brace parse_equals

hay define Package/License

Package glibc {
  version = '1.0'

  License {
    path = 'LICENSE.txt'
  }

  other = 'foo'
}

json write (_hay()) | jq '.children[0].children[0].attrs' > actual.txt

diff -u - actual.txt <<EOF
{
  "path": "LICENSE.txt"
}
EOF

invalid = 'syntax'  # parse error
