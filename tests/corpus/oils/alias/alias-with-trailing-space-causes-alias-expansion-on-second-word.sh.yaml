name: alias with trailing space causes alias expansion on second word
dialect: bash
source: 
  oils:spec/alias#alias-with-trailing-space-causes-alias-expansion-on-second-word
stdout: "hello world !!!\nhello world punct\n"
---
shopt -s expand_aliases  # bash requires this

alias hi='echo hello world '
alias punct='!!!'

hi punct

alias hi='echo hello world'  # No trailing space

hi punct
