name: Ignore dirs dist/*:node_modules/*
dialect: bash
source: oils:spec/globignore#ignore-dirs-distnodemodules
stdout: "compose/base.compose.yaml compose/dev.compose.yaml src/a.js src/b.js\n"
---
mkdir {src,compose,dist,node_modules}
touch src/{a.js,b.js}
touch compose/{base.compose.yaml,dev.compose.yaml}
touch dist/index.js
touch node_modules/package.js
GLOBIGNORE=dist/*:node_modules/*
echo */*
