disabled: true
name: simple_word_eval and strict_array conflict over globs
dialect: bash
source: oils:spec/ysh-options#simplewordeval-and-strictarray-conflict-over-globs
status: 1
stdout: |
  ['foo.txt']
  ['foo.txt']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
