name: literal ''
dialect: bash
source: oils:spec/ysh-regex#literal
stdout: "abcdef\nno\nyes\n"
---
shopt -s ysh:all
var pat = ''

setvar pat = /'abc' 'def'/
echo $pat

#setvar pat = /'abc' '^ + * ?'/
#echo $pat

if ('abcde' ~ pat) { echo yes } else { echo no }
if ('abcdef' ~ pat) { echo yes } else { echo no }
