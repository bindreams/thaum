name: compgen doesn't need shell quoting
dialect: bash
source: oils:spec/builtin-completion#compgen-doesnt-need-shell-quoting
stdout: |
  foo bar
  foo'bar
environment:
  TMP: /tmp
---
# There is an obsolete comment in bash_completion that claims the opposite.
cd $TMP
touch 'foo bar'
touch "foo'bar"
compgen -f "foo b"
compgen -f "foo'"
