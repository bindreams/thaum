name: unquoted (a  b) as pattern, (a  b|c)
dialect: bash
source: oils:spec/regex#unquoted-a-b-as-pattern-a-bc
stdout: |-
  one
  two
  three
---

if [[ 'a  b' =~ (a  b) ]]; then
  echo one
fi

if [[ 'a b' =~ (a  b) ]]; then
  echo BAD
fi

if [[ 'a b' =~ (a b|c) ]]; then
  echo two
fi

# I think spaces are only allowed within ()

if [[ '  c' =~ (a|  c) ]]; then
  echo three
fi
