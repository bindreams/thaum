name: HISTFILE set to array
dialect: bash
source: oils:spec/builtin-history#histfile-set-to-array
stdout: |-
  status=1
  ^D
---

echo '
HISTFILE=(a b c)
history -a
echo status=$?
' | $SH -i

case $SH in bash) echo '^D' ;; esac

# note that bash actually writes the file 'a', since that's ${HISTFILE[0]} 
