name: 'let idiom can be written in POSIX shell - eval ": \$(( ))"'
dialect: bash
source: oils:spec/nix-idioms#let-idiom-can-be-written-in-posix-shell---eval
stdout: "i=0\nNIX_ENFORCE_NO_NATIVE=0\nNIX_ENFORCE_NO_NATIVE_x86_64_unknown_linux_gnu=0\n\
  \ni=1\nNIX_ENFORCE_NO_NATIVE=1\nNIX_ENFORCE_NO_NATIVE_x86_64_unknown_linux_gnu=1\n\
  \ni=2\nNIX_ENFORCE_NO_NATIVE=2\nNIX_ENFORCE_NO_NATIVE_x86_64_unknown_linux_gnu=3\n\
  \n"
---

for i in 0 1 2; do
  echo i=$i

  NIX_ENFORCE_NO_NATIVE=$i

  outputVar=NIX_ENFORCE_NO_NATIVE_x86_64_unknown_linux_gnu
  inputVar=NIX_ENFORCE_NO_NATIVE

  # Original Nix idiom

  if test -n "$BASH_VERSION"; then
    let "${outputVar} |= ${!inputVar:-0}" "1"
  else
    # OSH alternative
    eval ": \$(( ${outputVar} |= ${!inputVar:-0} ))"
  fi

  echo NIX_ENFORCE_NO_NATIVE=$NIX_ENFORCE_NO_NATIVE
  echo NIX_ENFORCE_NO_NATIVE_x86_64_unknown_linux_gnu=$NIX_ENFORCE_NO_NATIVE_x86_64_unknown_linux_gnu
  echo

done
