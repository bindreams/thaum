name: test -v a[i] with arith expressions
dialect: bash
source: oils:spec/array#test--v-ai-with-arith-expressions
stdout: |-
  status=0
  status=1

  dbracket
  status=0
  status=1
---

array=(1 2 3 '')

test -v 'array[1+1]'
echo status=$?

test -v 'array[4+1]'
echo status=$?

echo
echo dbracket

[[ -v array[1+1] ]]
echo status=$?

[[ -v array[4+1] ]]
echo status=$?
