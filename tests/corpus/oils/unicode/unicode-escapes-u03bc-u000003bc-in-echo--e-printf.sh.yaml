name: Unicode escapes \u03bc \U000003bc in $'', echo -e, printf
dialect: bash
source: oils:spec/unicode#unicode-escapes-u03bc-u000003bc-in-echo--e-printf
stdout: "μ μ\nμ μ\nμ μ\n"
---

case $SH in dash|ash) exit ;; esac

echo $'\u03bc \U000003bc'

echo -e '\u03bc \U000003bc'

printf '\u03bc \U000003bc\n'
