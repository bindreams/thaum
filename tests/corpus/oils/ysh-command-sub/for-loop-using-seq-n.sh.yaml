disabled: true
name: for loop using @(seq $n)
dialect: bash
source: oils:spec/ysh-command-sub#for-loop-using-seq-n
stdout: "[1]\n[2]\n[3]\n['z']\n['z']\n['z']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
shopt -s oil:upgrade

for x in @(seq 3) {
  echo "[$x]"
}
for x in @(seq 3) {
  argv.py z @[glob("[$x]")]
}
