disabled: true
name: Extra data after valid JSON
dialect: bash
source: oils:spec/ysh-json#extra-data-after-valid-json
stdout: |
  num space 0
  obj space 0
  num comment 0
  obj comment 0
  num bracket 1
  obj bracket 1
---

# Trailing space is OK
echo '42  ' | json read
echo num space $?

echo '{}  ' | json read
echo obj space $?

echo '42 # comment' | json8 read
echo num comment $?

echo '{}   # comment ' | json8 read
echo obj comment $?

echo '42]' | json read
echo num bracket $?

echo '{}]' | json read
echo obj bracket $?
