name: Extended glob with word splitting
dialect: bash
source: oils:spec/extglob-files#extended-glob-with-word-splitting
stdout: "['a', 'bar.cc', 'bar.h']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
shopt -s extglob
mkdir -p 3
cd 3

x='a b'
touch bar.{cc,h}

# OSH may disallow splitting when there's an extended glob
argv.py $x*.@(cc|h)
