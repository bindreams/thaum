disabled: true
name: BashAssoc, short
dialect: bash
source: oils:spec/ysh-printing#bashassoc-short
stdout: |-
  (BashAssoc)
  (BashAssoc ['k']=$'foo \u0001μ')

  (Dict)  {k: (BashAssoc)}
  (Dict)  {k: (BashAssoc ['k']=$'foo \u0001μ')}

  {"type":"BashAssoc","data":{}}
  {"type":"BashAssoc","data":{"k":"foo \u0001μ"}}

  (Dict)   {"k":{"type":"BashAssoc","data":{}}}
  (Dict)   {"k":{"type":"BashAssoc","data":{"k":"foo \u0001μ"}}}
---
declare -A empty
declare -A assoc=(['k']=$'foo \x01\u03bc')

pp value (empty)
pp value (assoc)
echo

pp value ({k:empty})
pp value ({k:assoc})
echo

pp test_ (empty)
pp test_ (assoc)
echo

pp test_ ({k:empty})
pp test_ ({k:assoc})
