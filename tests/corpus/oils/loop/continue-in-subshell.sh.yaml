name: continue in subshell
dialect: bash
source: oils:spec/loop#continue-in-subshell
stdout: |
  # osh lets you fail
  > 1
  subshell status=1
  . 1
  > 2
  subshell status=1
  . 2
---
for i in $(seq 2); do
  echo "> $i"
  ( if true; then continue; fi; echo "Should not print" )
  echo subshell status=$?
  echo ". $i"
done
