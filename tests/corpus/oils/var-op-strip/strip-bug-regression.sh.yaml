name: strip * (bug regression)
dialect: bash
source: oils:spec/var-op-strip#strip-bug-regression
stdout: |
  ['abc']
  ['']
  ['abc']
  ['']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
x=abc
argv.py "${x#*}"
argv.py "${x##*}"
argv.py "${x%*}"
argv.py "${x%%*}"
