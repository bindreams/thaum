name: printf %d with + prefix (positive sign)
dialect: bash
source: oils:spec/builtin-printf#printf-d-with-prefix-positive-sign
stdout: |-
  decimal
  42
  octal
  63
  hex lowercase
  171
  hex uppercase
  171
---

echo decimal
printf '%d\n' +42

echo octal
printf '%d\n' +077

echo hex lowercase
printf '%d\n' +0xab

echo hex uppercase
printf '%d\n' +0XAB
