name: kill -15 %- kills previous job
dialect: bash
source: oils:spec/builtin-kill#kill--15---kills-previous-job
stdout: "kill=0\nwait=143\n"
---
#case $SH in mksh|dash) exit ;; esac

sleep 0.1 &  # previous job
sleep 0.2 &  # current job

kill -15 %-
echo kill=$?

wait %-
echo wait=$?

# what does bash define here as the previous job?  May be a bug
#wait %-
#echo wait=$?
