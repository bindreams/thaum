disabled: true
name: Number of digits in 1/3
dialect: bash
source: oils:spec/ysh-int-float#number-of-digits-in-13
stdout: |
  pass
---
shopt --set ysh:upgrade

# - Python 2 and bin/ysh: 14
# - Python 3: 18
# - YSH C++: 18

var s = str(1/3)
#echo "ysh len $[len(s)]"
#echo ysh=$s

# Don't bother to distinguish OSH Python vs C++ here
case (len(s)) {
  (14) { echo pass }
  (18) { echo pass }
  (else) { echo FAIL }
}

exit

var py2 = $(python2 -c 'print(1.0/3)')
echo "py2 len $[len(py2)]"
echo py2=$py2

var py3 = $(python3 -c 'print(1/3)')
echo "py3 len $[len(py3)]"
echo py3=$py3
