disabled: true
name: Special rule for <<< ''' and <<< """ - no extra newline
dialect: bash
source: oils:spec/ysh-string#special-rule-for-and---no-extra-newline
stdout: |-
  (Str)   "unquoted\n"
  (Str)   "single with newline\n"
  (Str)   "double with newline\n"
  (Str)   "j8 with newline\n"

  (Str)   "multi\nsingle\n"
  (Str)   "multi\ndouble\n"
  (Str)   "multi\nj8\n"
---

read --all <<< unquoted
pp test_ (_reply)

read --all <<< 'single with newline'
pp test_ (_reply)

read --all <<< "double with newline"
pp test_ (_reply)

read --all <<< u'j8 with newline'
pp test_ (_reply)

echo

read --all <<< '''
multi
single
'''
pp test_ (_reply)

read --all <<< """
multi
double
"""
pp test_ (_reply)

read --all <<< u'''
multi
j8
'''
pp test_ (_reply)
