name: glob within array yields separate elements
dialect: bash
source: oils:spec/array#glob-within-array-yields-separate-elements
stdout: "['y.Y', 'yy.Y']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
touch y.Y yy.Y
a=(*.Y)
argv.py "${a[@]}"
