name: sh -c -x 'echo hi' - order is reversed
dialect: bash
source: oils:spec/sh-usage#sh--c--x-echo-hi---order-is-reversed
stdout: |
  hi
  status=127
stderr: |-
  + echo hi
---
case $SH in zsh) exit ;; esac  # different -x format

$SH -c -x 'echo hi'

# two flags before the command
$SH -c -x -e 'zz; true' 2> /dev/null
echo status=$?
