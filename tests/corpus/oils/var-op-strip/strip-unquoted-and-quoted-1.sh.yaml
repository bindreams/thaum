name: strip unquoted and quoted []
dialect: bash
source: oils:spec/var-op-strip#strip-unquoted-and-quoted
stdout: |-
  foo[]
  foo[]
  foo[]
  foo[]
---
# LooksLikeGlob('[]') is true
# I guess dash, mksh, and zsh treat unquoted [ as an invalid glob?
var='[]foo[]'
echo ${var#[]}
echo ${var#"[]"}
echo "${var#[]}"
echo "${var#"[]"}"
