name: getopts with with -
dialect: bash
source: oils:spec/builtin-getopts#getopts-with-with
stdout: |-
  -h -
  status=0
---
set -- -h -
echo "$@"
while getopts "hc:" opt; do
  case $opt in
    h) FLAG_h=1 ;;
    c) FLAG_c="$OPTARG" ;;
    '?') echo ERROR $OPTIND; exit 2; ;;
  esac
done
echo status=$?
