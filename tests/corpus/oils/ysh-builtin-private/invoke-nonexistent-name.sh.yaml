disabled: true
name: invoke nonexistent name
dialect: bash
source: oils:spec/ysh-builtin-private#invoke-nonexistent-name
stdout: |
  status=2
  status=127
  status=127
---
case $SH in bash) exit ;; esac

invoke zz
echo status=$?

invoke --builtin zz
echo status=$?

invoke --builtin -- zz
echo status=$?
