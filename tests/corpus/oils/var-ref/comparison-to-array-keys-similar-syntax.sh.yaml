name: comparison to ${!array[@]} keys (similar SYNTAX)
dialect: bash
source: oils:spec/var-ref#comparison-to-array-keys-similar-syntax
stdout: |
  ['0', '1']
  a_keys=0
  ['']
  a_nobrackets=0
  ---
  ['A', 'B']
  A_keys=0
  A_nobrackets=1
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

declare -a a=(x y)
argv.py "${!a[@]}"
echo a_keys=$?

argv.py "${!a}"  # missing [] is equivalent to ${!a[0]} ?
echo a_nobrackets=$?

echo ---
declare -A A=([A]=a [B]=b)

argv.py $(printf '%s\n' ${!A[@]} | sort)
echo A_keys=$?

(argv.py "${!A}")  # missing [] is equivalent to ${!A[0]} ?
echo A_nobrackets=$?
