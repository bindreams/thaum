name: Here doc from another input file descriptor
dialect: bash
source: oils:spec/here-doc#here-doc-from-another-input-file-descriptor
stdout: "8: here doc on descriptor\n"
setup: |
  #!/bin/sh
  cat > read_from_fd.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for arg in sys.argv[1:]:
      fd = int(arg)
      try:
          data = os.read(fd, 1024)
      except OSError as e:
          print(f"FATAL: Error reading from fd {fd}: {e}", file=sys.stderr)
          sys.exit(1)
      sys.stdout.write(f"{fd}: ")
      sys.stdout.buffer.write(data)
  HELPER
  chmod +x read_from_fd.py

---
# NOTE: OSH fails on descriptor 9, but not descriptor 8?  Is this because of
# the Python VM?  How  to inspect state?
read_from_fd.py 8  8<<EOF
here doc on descriptor
EOF
