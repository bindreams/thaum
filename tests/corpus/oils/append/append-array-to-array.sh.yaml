name: Append array to array
dialect: bash
source: oils:spec/append#append-array-to-array
stdout: |
  ['x', 'y', 't', 'u v']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
a=(x y )
a+=(t 'u v')
argv.py "${a[@]}"
