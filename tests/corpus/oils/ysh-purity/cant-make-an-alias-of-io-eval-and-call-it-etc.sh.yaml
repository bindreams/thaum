name: Can't make an alias of io->eval and call it, etc.
dialect: bash
source: oils:spec/ysh-purity#cant-make-an-alias-of-io-eval-and-call-it-etc
stdout: "\n"
---
shopt --set ysh:upgrade

# The --eval-pure could be make an alias, and then "trick" the post-amble into
# calling it.

var f = io->eval

var cmd = ^(echo hi)

call f(cmd)
