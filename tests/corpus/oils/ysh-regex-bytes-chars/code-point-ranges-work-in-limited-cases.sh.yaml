disabled: true
name: Code point ranges work in limited cases
dialect: bash
source: oils:spec/ysh-regex-bytes-chars#code-point-ranges-work-in-limited-cases
stdout: |
  (Bool)   false
  (Bool)   true
---
shopt -s ysh:all

var range1 = /[ \u{1} - \u{7e} ]/;

pp test_ (u'\u{7f}' ~ range1)
pp test_ (u'\u{7e}' ~ range1)

exit

# Invalid collation character?  Unicode ranges don't work I guess
var range2 = /[ \u{1} - \u{3bc} ]/;

pp test_ (b'\y7f' ~ range2)
pp test_ (b'\y7e' ~ range2)
