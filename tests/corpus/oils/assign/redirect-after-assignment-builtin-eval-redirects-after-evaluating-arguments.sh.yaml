name: redirect after assignment builtin (eval redirects after evaluating 
  arguments)
dialect: bash
source: 
  oils:spec/assign#redirect-after-assignment-builtin-eval-redirects-after-evaluating-arguments
stdout: "done\n"
stderr: "STDERR\n"
---

# See also: spec/redir-order.test.sh (#2307)
# The $(stdout_stderr.py) is evaluated *before* the 2>/dev/null redirection

readonly x=$(stdout_stderr.py) 2>/dev/null
echo done
