name: IFS=x and '' and unquoted $@ - reduction of case above - copied into 
  spec/word-split
dialect: bash
source: 
  oils:spec/toysh-posix#ifsx-and-and-unquoted---reduction-of-case-above---copied-into-specword-split
stdout: |
  ['one', '', 'two']
  -one-
  --
  -two-
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

setopt SH_WORD_SPLIT
#set -x

set -- one "" two

IFS=x

argv.py $@

for i in $@; do
  echo -$i-
done
