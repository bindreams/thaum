name: ulimit accepts 'unlimited'
dialect: bash
source: oils:spec/builtin-process#ulimit-accepts-unlimited
stdout: |2+
    arg zz
  unlimited
  status=0
  FAILED

    arg unlimited
  unlimited
  status=0

...
---

for arg in zz unlimited; do
  echo "  arg $arg"
  ulimit -f
  echo status=$?
  ulimit -f $arg
  if test $? -ne 0; then
    echo 'FAILED'
  fi
  echo
done
