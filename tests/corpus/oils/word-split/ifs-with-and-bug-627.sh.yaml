name: "IFS='' with $@ and $* (bug #627)"
dialect: bash
source: oils:spec/word-split#ifs-with-and-bug-627
stdout: |
  ['at', 'a', 'b c']
  ['star', 'a', 'b c']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
set -- a 'b c'
IFS=''
argv.py at $@
argv.py star $*

# zsh agrees
