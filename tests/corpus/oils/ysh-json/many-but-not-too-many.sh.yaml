disabled: true
name: Many [[[ , but not too many
dialect: bash
source: oils:spec/ysh-json#many-but-not-too-many
stdout: "(List)   [[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[[]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]\n\
  len=1\n"
---

shopt -s ysh:upgrade

proc pairs(n) {
  var m = int(n)  # TODO: 1 .. n should auto-convert?

  for i in (1 ..< m) {
    write -n -- '['
  }
  for i in (1 ..< m) {
    write -n -- ']'
  }
}

# This is all Python can handle; C++ can handle more
msg=$(pairs 50)

#echo $msg

echo "$msg" | json read
pp test_ (_reply)
echo len=$[len(_reply)]
