name: test -v a[i] with arith expressions
dialect: bash
source: oils:spec/array#test--v-ai-with-arith-expressions
stdout: "status=0\nstatus=1\n\ndbracket\nstatus=0\nstatus=1\n"
---

array=(1 2 3 '')

test -v 'array[1+1]'
echo status=$?

test -v 'array[4+1]'
echo status=$?

echo
echo dbracket

[[ -v array[1+1] ]]
echo status=$?

[[ -v array[4+1] ]]
echo status=$?
