disabled: true
name: Regex in a loop (bug regression)
dialect: bash
source: oils:spec/ysh-regex-api#regex-in-a-loop-bug-regression
stdout: |-
  1
  2
---

shopt --set ysh:all

var content = [ 1, 2 ]
var i = 0
while (i < len(content)) {
  var line = content[i]
  write $[content[i]]
  if (str(line) ~ / s* 'imports' s* '=' s* .* /) {
    exit
  }
  setvar i += 1
}
