name: printf -v %q
dialect: bash
source: oils:spec/builtin-printf#printf--v-q
stdout: "OK\n"
---
val='"quoted" with spaces and \'

# quote 'val' and store it in foo
printf -v foo %q "$val"
# then round trip back to eval
eval "bar=$foo"

# debugging:
#echo foo="$foo"
#echo bar="$bar"
#echo val="$val"

test "$bar" = "$val" && echo OK
