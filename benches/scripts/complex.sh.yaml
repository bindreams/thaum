dialect: bash
---
# Combined benchmark: exercises all major code paths.

# --- Variables and expansion ---
prefix="bench"
suffix="mark"
name="${prefix}_${suffix}"
echo "name: $name (${#name} chars)"

# --- Arrays ---
items=(alpha bravo charlie delta echo foxtrot)
echo "items: ${#items[@]}"
echo "first: ${items[0]}"

# --- Associative array ---
declare -A scores
scores[alice]=95
scores[bob]=87
scores[carol]=92
for key in "${!scores[@]}"; do
    echo "$key: ${scores[$key]}"
done

# --- Iterative gcd ---
gcd() {
    local a="$1" b="$2"
    while (( b != 0 )); do
        local tmp=$((a % b))
        a=$b
        b=$tmp
    done
    echo "$a"
}

echo "gcd(48,18) = $(gcd 48 18)"
echo "gcd(100,75) = $(gcd 100 75)"

# --- Arithmetic loops ---
sum=0
for (( i = 1; i <= 50; i++ )); do
    (( sum += i * i ))
done
echo "sum of squares: $sum"

# --- Nested control flow ---
classify() {
    local n="$1"
    if (( n < 0 )); then
        echo "negative"
    elif (( n == 0 )); then
        echo "zero"
    elif (( n < 10 )); then
        echo "small"
    elif (( n < 100 )); then
        echo "medium"
    else
        echo "large"
    fi
}

classify -5
classify 0
classify 3
classify 42
classify 999

# --- Case with patterns ---
check_ext() {
    case "$1" in
        *.sh)    echo "shell"  ;;
        *.rs)    echo "rust"   ;;
        *.py)    echo "python" ;;
        *.*)     echo "other"  ;;
        *)       echo "none"   ;;
    esac
}

check_ext "main.rs"
check_ext "test.py"
check_ext "run.sh"
check_ext "Makefile"

# --- String operations ---
long="the quick brown fox jumps over the lazy dog"
echo "upper: ${long^^}"
echo "replace: ${long//the/THE}"
echo "prefix: ${long#the }"
echo "suffix: ${long% dog}"

# --- While loop ---
count=0
while (( count < 10 )); do
    (( count++ ))
done
echo "counted to $count"

# --- Nested functions ---
outer() {
    local x=10
    echo $((x + 20))
}
echo "nested: $(outer)"
