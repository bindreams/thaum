name: '"${array[@]} with set -u (bash is outlier)'
dialect: bash
source: oils:spec/var-op-test#array-with-set--u-bash-is-outlier
status: 1
stdout: |-
  empty //
---
case $SH in dash) exit ;; esac

set -u

typeset -a empty
empty=()

echo empty /"${empty[@]}"/
echo undefined /"${undefined[@]}"/



# empty array is unset in mksh
