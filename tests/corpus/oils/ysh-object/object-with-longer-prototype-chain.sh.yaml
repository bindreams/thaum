name: Object with longer prototype chain
dialect: bash
source: oils:spec/ysh-object#object-with-longer-prototype-chain
stdout: "(Obj)   (\"foo\":1,\"bar\":2,\"x\":3) --> (\"foo\":42,\"bar\":[1,2]) -->
  (\"foo\":\"zz\")\n(Obj)   (foo: 1, bar: 2, x: 3) --> (foo: 42, bar: [1, 2]) -->
  (foo: 'zz')\n"
---

# prototypal inheritance pattern
var superClassMethods = Object(null, {foo: 'zz'})
var methods = Object(superClassMethods, {foo: 42, bar: [1,2]})
var instance = Object(methods, {foo: 1, bar: 2, x: 3})

pp test_ (instance)
pp value (instance)
