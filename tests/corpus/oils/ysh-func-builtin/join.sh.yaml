disabled: true
name: join()
dialect: bash
source: oils:spec/ysh-func-builtin#join
stdout: |
  ['abc d']
  ['a:b:c d']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
var x = :|a b 'c d'|

var y = join(x)
argv.py $y

var z = join(x, ":")
argv.py $z
