name: parse error in PROMPT_COMMAND
dialect: bash
source: oils:spec/interactive#parse-error-in-promptcommand
stdout: |-
  one
  two
  ^D
---
export PS1=''  # OSH prints prompt to stdout

case $SH in
  *bash|*osh)
    $SH --rcfile /dev/null -i << EOF
PROMPT_COMMAND=';'
echo one
echo two
EOF
    ;;
esac

# Paper over difference with OSH
case $SH in *bash) echo '^D' ;; esac
