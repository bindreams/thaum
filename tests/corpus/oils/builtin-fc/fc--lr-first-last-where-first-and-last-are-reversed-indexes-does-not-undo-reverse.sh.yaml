name: fc -lr [first] [last] where first and last are reversed indexes does not 
  undo reverse
dialect: bash
source: 
  oils:spec/builtin-fc#fc--lr-first-last-where-first-and-last-are-reversed-indexes-does-not-undo-reverse
stdout: |-
  3	 echo 2
  2	 echo 1
  ^D
---
printf "echo %s\n" {1..3} > tmp

echo '
HISTFILE=tmp
history -c
history -r

fc -lr 3 2
' | $SH --norc -i

# match osh's behaviour of echoing ^D for EOF
case $SH in bash) echo '^D' ;; esac
