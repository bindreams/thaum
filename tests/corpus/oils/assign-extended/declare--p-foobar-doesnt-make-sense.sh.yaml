name: declare -p foo=bar doesn't make sense
dialect: bash
source: oils:spec/assign-extended#declare--p-foobar-doesnt-make-sense
stdout: |-
  status=1
  status=1
  declare -- a=b
---
case $SH in mksh) exit 0 ;; esac

declare -p foo=bar
echo status=$?

a=b
declare -p a foo=bar > tmp.txt
echo status=$?
sed 's/"//g' tmp.txt  # don't care about quotes
