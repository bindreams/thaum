disabled: true
name: YSH_HISTFILE
dialect: bash
source: oils:spec/ysh-interactive#yshhistfile
stdout: |
  42
  43
  44
  ^D
  echo 42
  echo 43
  echo 44
---

#export YSH_HISTFILE=myhist

# TODO: HISTFILE/YSH_HISTFILE should be looked up in ENV
setglobal ENV.YSH_HISTFILE = 'myhist'

rm -f myhist

echo 'echo 42
echo 43
echo 44' | $[ENV.SH] --norc -i 

cat myhist
