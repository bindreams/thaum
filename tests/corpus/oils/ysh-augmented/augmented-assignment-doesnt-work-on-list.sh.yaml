disabled: true
name: Augmented assignment doesn't work on List
dialect: bash
source: oils:spec/ysh-augmented#augmented-assignment-doesnt-work-on-list
status: 3
stdout: "['a', 'b c']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---

# I suppose the logic is that string and array concat is ++
#
# I wonder if a ++= operator makes sense?

shopt -s parse_at simple_word_eval
var x = :| a 'b c' |
argv.py @x

setvar x += :| d e |  # fatal error
argv.py @x
