disabled: true
name: with eval builtin command, in local scope
dialect: bash
source: oils:spec/ysh-proc-meta#with-eval-builtin-command-in-local-scope
stdout: |-
  prefix a
  prefix b
  prefix a
---

proc p {
  for param in a b {
    eval """
    proc echo_$param(prefix) {
      echo \$prefix $param
    }
    """
    # We need to "escape" the for loop scope
    call setVar("echo_$param", getVar("echo_$param"), global=true)
  }

  # calling globals
  echo_a prefix
  echo_b prefix
}

p

# the global is available
echo_a prefix
