name: declare -F with shopt -s extdebug prints more info
dialect: bash
source: 
  oils:spec/assign-extended#declare--f-with-shopt--s-extdebug-prints-more-info
stdout: "declare -f add\ndeclare -f g\n\nadd 7 main\ng 3 ROOT/spec/testdata/bash-source-2.sh\n"
---
case $SH in mksh) exit ;; esac

source $REPO_ROOT/spec/testdata/bash-source-2.sh

shopt -s extdebug

add () { expr 4 + 4; }

declare -F 
echo

declare -F add
# in bash-source-2
declare -F g | sed "s;$REPO_ROOT;ROOT;g"
