disabled: true
name: Here doc
dialect: bash
source: oils:spec/ysh-xtrace#here-doc
stdout: |
  2
  3
stderr: |
  . builtin ':' begin
  | command 12345: tac
  ; process 12345: status 0
  . builtin set '+x'
---
shopt --set ysh:upgrade
shopt --unset errexit
set -x

{
  : begin
  tac <<EOF
3
2
EOF

  set +x
} 2>err.txt

sed --regexp-extended 's/[[:digit:]]{2,}/12345/g' err.txt >&2
