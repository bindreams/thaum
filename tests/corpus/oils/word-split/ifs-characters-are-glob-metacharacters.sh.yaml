name: IFS characters are glob metacharacters
dialect: bash
source: oils:spec/word-split#ifs-characters-are-glob-metacharacters
stdout: |
  ['a', 'b', 'c']
  ['', 'x', 'y', 'z']
  ['', 'x', 'y', 'z']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
IFS='* '
s='a*b c'
argv.py $s

IFS='?'
s='?x?y?z?'
argv.py $s

IFS='['
s='[x[y[z['
argv.py $s
