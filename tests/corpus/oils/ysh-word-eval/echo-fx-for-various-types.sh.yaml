disabled: true
name: echo $[f(x)] for various types
dialect: bash
source: oils:spec/ysh-word-eval#echo-fx-for-various-types
stdout: |-
  bool true
  int 2
  float 3.14
  str identity
  ---
  bool expr true
  bool splice true
---
shopt --set ysh:upgrade

source $LIB_YSH/math.ysh

echo bool $[identity(true)]
echo int $[len(['a', 'b'])]
echo float $[abs(-3.14)]  # FIXME: this causes issues with float vs. int comparison
echo str $[identity('identity')]

echo ---
echo bool expr $[true]
echo bool splice @[identity([true])]
