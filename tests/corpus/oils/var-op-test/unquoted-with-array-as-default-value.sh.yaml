name: Unquoted with array as default value
dialect: bash
source: oils:spec/var-op-test#unquoted-with-array-as-default-value
stdout: "['Xx1', '2', '3', '4xX']\n['Xx1', '2', '3', '4xX']\n"
---
set -- '1 2' '3 4'
argv.py X${unset=x"$@"x}X
argv.py X${unset=x$@x}X  # If you want OSH to split, write this
# osh
