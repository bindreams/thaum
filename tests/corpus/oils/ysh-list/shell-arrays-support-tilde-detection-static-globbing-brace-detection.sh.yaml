disabled: true
name: Shell arrays support tilde detection, static globbing, brace detection
dialect: bash
source: 
  oils:spec/ysh-list#shell-arrays-support-tilde-detection-static-globbing-brace-detection
stdout: |
  ['/home/bob/src', 'bar.py', 'foo.py', 'andy@example.com', 'bob@example.com', '*.py']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
shopt -s parse_at simple_word_eval
touch {foo,bar}.py

# could this also be __defaults__.HOME or DEF.HOME?
setglobal ENV.HOME = '/home/bob'
no_dynamic_glob='*.py'

var x = :| ~/src *.py {andy,bob}@example.com $no_dynamic_glob |
argv.py @x
