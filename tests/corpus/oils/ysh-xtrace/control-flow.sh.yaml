name: Control Flow
dialect: bash
source: oils:spec/ysh-xtrace#control-flow
stdout: "1\n2\na y\na z\nb y\nb z\n"
stderr: ". builtin echo 1\n. builtin echo 2\n+ break 1\n. builtin echo a y\n+ continue
  1\n. builtin echo a z\n. builtin echo b y\n+ continue 1\n. builtin echo b z\n> proc
  zero\n  + return 0\n< proc zero\n"
---
shopt --set ysh:upgrade
set -x

for i in 1 2 3 {
  echo $i
  if (i === '2') {
    break
  }
}

for j in a b {
  for k in y z {
    echo $j $k
    if (k === 'y') {
      continue
    }
  }
}

proc zero {
  return 0
}

proc one {
  return 1
}

zero
# one
