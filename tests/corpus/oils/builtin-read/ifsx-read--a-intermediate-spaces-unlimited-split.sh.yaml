name: "IFS='x ' read -a: intermediate spaces (unlimited split)"
dialect: bash
source: oils:spec/builtin-read#ifsx-read--a-intermediate-spaces-unlimited-split
stdout: "['a', 'b']\n['a', '', 'b']\n['a', '', '', 'b']\n['a', '', 'b']\n['a', '',
  'b']\n['a', 'b']\n['a', '', 'b']\n['a', '', 'b']\n['a', '', '', 'b']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
case $SH in mksh|ash|dash|zsh) exit 99; esac
IFS='x '
echo 'a x b'   | (read -a a; argv.py "${a[@]}")
echo 'a xx b'  | (read -a a; argv.py "${a[@]}")
echo 'a xxx b' | (read -a a; argv.py "${a[@]}")
echo 'a x xb'  | (read -a a; argv.py "${a[@]}")
echo 'a x x b' | (read -a a; argv.py "${a[@]}")
echo 'ax b'    | (read -a a; argv.py "${a[@]}")
echo 'ax xb'   | (read -a a; argv.py "${a[@]}")
echo 'ax  xb'  | (read -a a; argv.py "${a[@]}")
echo 'ax x xb' | (read -a a; argv.py "${a[@]}")
