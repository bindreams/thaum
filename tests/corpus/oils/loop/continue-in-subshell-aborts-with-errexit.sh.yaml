name: continue in subshell aborts with errexit
dialect: bash
source: oils:spec/loop#continue-in-subshell-aborts-with-errexit
status: 1
stdout: "> 1\n"
---
# The other shells don't let you recover from this programming error!
set -o errexit
for i in $(seq 2); do
  echo "> $i"
  ( if true; then continue; fi; echo "Should not print" )
  echo 'should fail after subshell'
  echo ". $i"
done
