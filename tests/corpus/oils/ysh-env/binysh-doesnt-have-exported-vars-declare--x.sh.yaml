disabled: true
name: bin/ysh doesn't have exported vars (declare -x)
dialect: bash
source: oils:spec/ysh-env#binysh-doesnt-have-exported-vars-declare--x
stdout: |-
  OSH ok
  sh=null
---

osh=$SH  # this file is run by OSH

case $osh in
  *osh)
    echo 'OSH ok'
    ;;
esac

var ysh = osh.replace('osh', 'ysh')

# NOT exported
$ysh -c 'echo sh=$[getVar("SH")]'
