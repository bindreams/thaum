name: printf -v a[1]
dialect: bash
source: oils:spec/builtin-printf#printf--v-a1
stdout: "status=0\n['a', 'foo', 'c']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
a=(a b c)
printf -v 'a[1]' %s 'foo'
echo status=$?
argv.py "${a[@]}"
