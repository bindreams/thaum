name: fc -l lists history commands with default page size
dialect: bash
source: oils:spec/builtin-fc#fc--l-lists-history-commands-with-default-page-size
stdout: |-
  2	 echo 1
  3	 echo 2
  4	 echo 3
  5	 echo 4
  6	 echo 5
  7	 echo 6
  8	 echo 7
  9	 echo 8
  10	 echo 9
  11	 echo 10
  12	 echo 11
  13	 echo 12
  14	 echo 13
  15	 echo 14
  16	 echo 15
  17	 echo 16
  ^D
---
printf "echo %s\n" {1..16} > tmp

echo '
HISTFILE=tmp
history -c
history -r

fc -l
' | $SH --norc -i

# match osh's behaviour of echoing ^D for EOF
case $SH in bash) echo '^D' ;; esac
