name: pass assoc array by reference
dialect: bash
source: oils:spec/nameref#pass-assoc-array-by-reference
stdout: |-
  jam
---
show_value() {
  local -n array_name=$1
  local idx=$2
  echo "${array_name[$idx]}"
}
days=([monday]=eggs [tuesday]=bread [sunday]=jam)
show_value days sunday
#  mksh note: it coerces "days" to 0?  Horrible.
