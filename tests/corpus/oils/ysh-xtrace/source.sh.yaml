disabled: true
name: source
dialect: bash
source: oils:spec/ysh-xtrace#source
stdout: |
  $1 = a
  $1 = x
stderr: |-
  > source lib.sh a b c
    . builtin echo '$1 = a'
  < source lib.sh
  > source lib.sh x $'\xfe' $'\xff'
    . builtin echo '$1 = x'
  < source lib.sh
---
echo 'echo "\$1 = $1"' > lib.sh

shopt --set ysh:upgrade
set -x

source lib.sh a b c

# Test the quoting style.  TODO: Don't use bash style in YSH.

source lib.sh x $'\xfe' $'\xff'
