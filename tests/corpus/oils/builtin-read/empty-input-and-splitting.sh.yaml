name: empty input and splitting
dialect: bash
source: oils:spec/builtin-read#empty-input-and-splitting
stdout: "[]\n[]\n[]\n"
---
case $SH in mksh|ash|dash|zsh) exit 99; esac
echo '' | (read -a a; argv.py "${a[@]}")
IFS=x
echo '' | (read -a a; argv.py "${a[@]}")
IFS=
echo '' | (read -a a; argv.py "${a[@]}")
