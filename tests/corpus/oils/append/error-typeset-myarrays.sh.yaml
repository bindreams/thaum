name: 'error: typeset myarray+=s'
dialect: bash
source: oils:spec/append#error-typeset-myarrays
status: 1
stdout: |
  ['x', 'y']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
typeset a=(x y)
argv.py "${a[@]}"
typeset a+=s
argv.py "${a[@]}"
