name: assoc array and - and +
dialect: bash
source: oils:spec/var-op-test#assoc-array-and---and
stdout: |-
  empty=minus
  empty=
  assoc=v
  assoc=plus
  ---
  empty=minus
  empty=
  assoc=v
  assoc=plus
---
case $SH in dash|mksh) exit ;; esac

declare -A empty=()
declare -A assoc=(['k']=v)

echo empty=${empty[@]-minus}
echo empty=${empty[@]+plus}
echo assoc=${assoc[@]-minus}
echo assoc=${assoc[@]+plus}

echo ---
echo empty=${empty[@]:-minus}
echo empty=${empty[@]:+plus}
echo assoc=${assoc[@]:-minus}
echo assoc=${assoc[@]:+plus}
