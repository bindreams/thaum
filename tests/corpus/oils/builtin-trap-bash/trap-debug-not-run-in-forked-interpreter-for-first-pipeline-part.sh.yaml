name: trap DEBUG not run in forked interpreter for first pipeline part
dialect: bash
source: 
  oils:spec/builtin-trap-bash#trap-debug-not-run-in-forked-interpreter-for-first-pipeline-part
stdout: "  LINENO=8\npipe1\npipe2\n  LINENO=9\nok\n"
---

debuglog() {
  #echo "  PID=$$ BASHPID=$BASHPID LINENO=$1"
  echo "  LINENO=$1"
}
trap 'debuglog $LINENO' DEBUG

{ echo pipe1;
  echo pipe2; } \
  | cat
echo ok
