name: '%(strftime format)T'
dialect: bash
source: oils:spec/builtin-printf#strftime-formatt
stdout: "2019-05-16\n2019-05-15\nstatus=0\n"
---
# The result depends on timezone
export TZ=Asia/Tokyo
printf '%(%Y-%m-%d)T\n' 1557978599
export TZ=US/Eastern
printf '%(%Y-%m-%d)T\n' 1557978599
echo status=$?
