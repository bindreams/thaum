name: Turning extglob on changes the meaning of [[ !(str) ]] in bash
dialect: bash
source: 
  oils:spec/extglob-match#turning-extglob-on-changes-the-meaning-of-str-in-bash
stdout: |
  TRUE
  FALSE
  TRUE
  TRUE
---
empty=''
str='x'
[[ !($empty) ]]  && echo TRUE   # test if $empty is empty
[[ !($str) ]]    || echo FALSE  # test if $str is empty
shopt -s extglob  # mksh doesn't have this
[[ !($empty) ]]  && echo TRUE   # negated glob
[[ !($str) ]]    && echo TRUE   # negated glob
