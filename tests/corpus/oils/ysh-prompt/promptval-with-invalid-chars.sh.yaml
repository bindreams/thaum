disabled: true
name: promptVal() with invalid chars
dialect: bash
source: oils:spec/ysh-prompt#promptval-with-invalid-chars
status: 3
stdout: |-
  x=<Error: \D{} not in promptVal()> 
  x=<Error: \/ is invalid or unimplemented in $PS1> 
---

# \D{} will be supported with date and time functions
var x = io.promptVal('D')
echo x=$x

# something else
var x = io.promptVal('/')
echo x=$x

var x = io.promptVal('ZZ')
echo x=$x
