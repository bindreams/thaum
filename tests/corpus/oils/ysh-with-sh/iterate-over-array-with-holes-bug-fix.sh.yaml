disabled: true
name: Iterate over array with holes (bug fix)
dialect: bash
source: oils:spec/ysh-with-sh#iterate-over-array-with-holes-bug-fix
status: 3
stdout: "['a', 'b', 'c']\narray=([0]=a [1]=b [5]=c)\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---

declare -a array=(a b)
array[5]=c
argv.py "${array[@]}"

# TODO: Should print this like this bash, with value.BashArray
declare -a

for i, item in (array) {
  echo "$i $item"
}
