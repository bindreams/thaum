name: Env value doesn't persist
dialect: bash
source: oils:spec/assign#env-value-doesnt-persist
stdout: "foo\n--\n"
setup: |
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py

---
FOO=foo printenv.py FOO
echo -$FOO-
