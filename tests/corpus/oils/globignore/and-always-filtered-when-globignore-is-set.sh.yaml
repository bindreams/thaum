name: . and .. always filtered when GLOBIGNORE is set
dialect: bash
source: oils:spec/globignore#and-always-filtered-when-globignore-is-set
stdout: |-
  .hidden
  .hidden
---
# When GLOBIGNORE is set to any non-null value, . and .. are always filtered
touch .hidden
GLOBIGNORE=*.txt

echo .*
shopt -u globskipdots
echo .*
