name: "bash bug: (( A[\"$key\"] = 1 )) doesn't work"
dialect: bash
source: oils:spec/array-assoc#bash-bug-akey-1-doesnt-work
stdout: |
  ['\\']
  ['42']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
key='\'
declare -A A
#A["$key"]=1

# Works in both
#A["$key"]=42

# Works in bash only
#(( A[\$key] = 42 ))

(( A["$key"] = 42 ))

argv.py "${!A[@]}"
argv.py "${A[@]}"
