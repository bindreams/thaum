name: 'read multiple lines with IFS=:'
dialect: bash
source: oils:spec/builtin-read#read-multiple-lines-with-ifs
stdout: "[  \\a |b: c|d  e|]\n"
environment:
  TMP: /tmp
---
# The leading spaces are stripped if they appear in IFS.
# IFS chars are escaped with :.
tmp=$TMP/$(basename $SH)-read-ifs.txt
IFS=:
cat >$tmp <<'EOF'
  \\a :b\: c:d\
  e
EOF
read a b c d < $tmp
# Use printf because echo in dash/mksh interprets escapes, while it doesn't in
# bash.
printf "%s\n" "[$a|$b|$c|$d]"
