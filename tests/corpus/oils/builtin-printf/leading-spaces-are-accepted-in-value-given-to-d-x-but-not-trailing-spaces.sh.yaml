name: leading spaces are accepted in value given to %d %X, but not trailing 
  spaces
dialect: bash
source: 
  oils:spec/builtin-printf#leading-spaces-are-accepted-in-value-given-to-d-x-but-not-trailing-spaces
stdout: "-123\nstatus=0\n-123\nstatus=1\n---\n63\nstatus=0\n255\nstatus=0\nFF\nstatus=0\n\
  ff\nstatus=0\n"
---

case $SH in zsh) exit ;; esac

# leading space is allowed
printf '%d\n' ' -123'
echo status=$?
printf '%d\n' ' -123 '
echo status=$?

echo ---

printf '%d\n' ' +077'
echo status=$?

printf '%d\n' ' +0xff'
echo status=$?

printf '%X\n' ' +0xff'
echo status=$?

printf '%x\n' ' +0xff'
echo status=$?
