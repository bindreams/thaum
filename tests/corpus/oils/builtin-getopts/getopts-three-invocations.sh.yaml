name: getopts three invocations
dialect: bash
source: oils:spec/builtin-getopts#getopts-three-invocations
stdout: |
  status=0 opt=h
  status=0 opt=c
  status=1 opt=?
---
set -- -h -c foo
getopts 'hc:' opt
echo status=$? opt=$opt
getopts 'hc:' opt
echo status=$? opt=$opt
getopts 'hc:' opt
echo status=$? opt=$opt
