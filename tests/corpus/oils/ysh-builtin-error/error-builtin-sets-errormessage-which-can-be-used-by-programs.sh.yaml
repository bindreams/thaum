disabled: true
name: error builtin sets _error.message, which can be used by programs
dialect: bash
source: 
  oils:spec/ysh-builtin-error#error-builtin-sets-errormessage-which-can-be-used-by-programs
stdout: |-
  status=3
  message=divide by zero: 42 / 0
  status=3
  message=divide by zero: 5 / 0
---

func divide(a, b) {
  if (b === 0) {
    error "divide by zero: $a / $b" (code=3)
  }
  return (a / b)
}

try { = divide(42, 0) }
echo status=$[_error.code]
echo message=$[_error.message]

proc p {
  echo $[divide(5, 0)]
}

try { p }
echo status=$[_error.code]
echo message=$[_error.message]
