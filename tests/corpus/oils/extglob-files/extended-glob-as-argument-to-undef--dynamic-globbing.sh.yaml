name: Extended glob as argument to ${undef:-} (dynamic globbing)
dialect: bash
source: 
  oils:spec/extglob-files#extended-glob-as-argument-to-undef--dynamic-globbing
stdout: "bar.py foo.py spam.py\nbar.py foo.py\n"
---

# This case popped into my mind after inspecting osh/word_eval.py for calls to
# _EvalWordToParts()

shopt -s extglob

mkdir -p eg8
cd eg8
touch {foo,bar,spam}.py

# regular glob
echo ${undef:-*.py}

# extended glob
echo ${undef:-@(foo|bar).py}
