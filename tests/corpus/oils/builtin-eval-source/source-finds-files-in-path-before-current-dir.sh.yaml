name: source finds files in PATH before current dir
dialect: bash
source: 
  oils:spec/builtin-eval-source#source-finds-files-in-path-before-current-dir
stdout: "path\nstatus=0\n"
environment:
  TMP: /tmp
---
cd $TMP
mkdir -p dir
echo "echo path" > dir/cmd
echo "echo current dir" > cmd
PATH="dir:$PATH"
. cmd
echo status=$?
