disabled: true
name: parse_at can be specified through sh -O
dialect: bash
source: oils:spec/ysh-options#parseat-can-be-specified-through-sh--o
stdout: |
  ['@words']
  ['a', 'b c']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
$SH +O parse_at -c 'words=(a "b c"); argv.py @words'
$SH -O parse_at -c 'words=(a "b c"); argv.py @words'
