name: Ignore globs with char classes like [[:alnum:]]
dialect: bash
source: oils:spec/globignore#ignore-globs-with-char-classes-like-alnum
stdout: ".env _testing.py\n20231114.log has space.docx pyproject.toml\n.env 20231114.log
  _testing.py pyproject.toml\nhas space.docx pyproject.toml\n"
---
touch {_testing.py,pyproject.toml,20231114.log,.env}
touch 'has space.docx'
GLOBIGNORE=[[:alnum:]]*
echo *.*
GLOBIGNORE=[![:alnum:]]*
echo *.*
GLOBIGNORE=*[[:space:]]*
echo *.*
GLOBIGNORE=[[:digit:]_.]*
echo *.*
