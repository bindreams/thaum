name: 'Regression: "${v:-AxBxC}"x should not be split'
dialect: bash
source: oils:spec/word-split#regression-v-axbxcx-should-not-be-split
stdout: |-
  AxBxC
  AxBxCx
  A B C
  A B Cx
  AxBxC
  AxBxCx
  AxBxC
  AxBxCx
---
IFS=x
v=
echo "${v:-AxBxC}"
echo "${v:-AxBxC}"x  # <-- osh failed this
echo ${v:-AxBxC}
echo ${v:-AxBxC}x
echo ${v:-"AxBxC"}
echo ${v:-"AxBxC"}x
echo "${v:-"AxBxC"}"
echo "${v:-"AxBxC"}"x
