name: \break \continue \return \exit
dialect: bash
source: oils:spec/loop#break-continue-return-exit
status: 5
stdout: |
  - break
  1
  - continue
  1
  3
  - return
  1
  2
  status=99
  - exit
---

echo '- break'
for i in 1 2 3; do
  echo $i
  \break
done

echo '- continue'
for i in 1 2 3; do
  if test $i = 2; then
    \continue
  fi
  echo $i
done

f() {
  echo '- return'
  for i in 1 2 3; do
    echo $i
    if test $i = 2; then
      \return 99
    fi
  done
}
f
echo status=$?

echo '- exit'
\exit 5
echo 'not executed'
