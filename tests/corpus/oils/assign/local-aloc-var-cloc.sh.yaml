name: local a=loc $var c=loc
dialect: bash
source: oils:spec/assign#local-aloc-var-cloc
stdout: |
  global
  ['loc', '', 'loc']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
var='b'
b=global
echo $b
f() {
  local a=loc $var c=loc
  argv.py "$a" "$b" "$c"
}
f
