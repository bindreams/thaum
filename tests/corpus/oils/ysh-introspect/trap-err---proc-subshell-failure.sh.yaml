disabled: true
name: trap ERR - proc subshell failure
dialect: bash
source: oils:spec/ysh-introspect#trap-err---proc-subshell-failure
status: 42
stdout: |-
  [ stdin ]:16
      f
      ^
  [ stdin ]:9
        g
        ^
---

source $[ENV.REPO_ROOT]/spec/testdata/debug-frame-lib.ysh

trap --add ERR {
  print-stack (prefix=false)
}
set -o errtrace  # enable always

proc f {
  g
}

proc g {
  forkwait { exit 42 }
  #return 42
}

f
