name: change reference itself
dialect: bash
source: oils:spec/nameref#change-reference-itself
stdout: |-
  ref=XX
  x=XX
  y=YY
  ----
  ref=YY
  x=XX
  y=YY
  ----
  ref=z
  x=XX
  y=z
---
x=XX
y=YY
typeset -n ref=x
echo ref=$ref
echo x=$x
echo y=$y

echo ----
typeset -n ref=y
echo ref=$ref
echo x=$x
echo y=$y
echo ----
ref=z
echo ref=$ref
echo x=$x
echo y=$y
