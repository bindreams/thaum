name: trap DEBUG for each
dialect: bash
source: oils:spec/builtin-trap-bash#trap-debug-for-each
stdout: |2-
    [6]
    [7]
  x=1
    [6]
    [7]
  x=2
    [10]
  ok
---

debuglog() {
  echo "  [$@]"
}
trap 'debuglog $LINENO' DEBUG

for x in 1 2; do
  echo x=$x
done

echo ok


