name: \ in unquoted substitutions is preserved without glob matching
dialect: bash
source: 
  oils:spec/glob#in-unquoted-substitutions-is-preserved-without-glob-matching
stdout: "['x/unmatching.*\\\\*.txt']\n"
---
mkdir x
touch \
  'x/test.ifs.\.txt' \
  'x/test.ifs.*.txt'
v='*\*.txt'
argv.py x/unmatching.$v
