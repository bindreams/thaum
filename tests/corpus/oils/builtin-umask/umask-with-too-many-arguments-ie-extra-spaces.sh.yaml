name: umask with too many arguments (i.e. extra spaces)
dialect: bash
source: oils:spec/builtin-umask#umask-with-too-many-arguments-ie-extra-spaces
status: 0
stdout: |
  ok
  111
---
umask 0111
# spaces are an error in bash
# dash & mksh only interpret the first one
umask u=, g+, o-
if test $? -ne 0; then
  echo ok
fi
umask | tail -c 4
