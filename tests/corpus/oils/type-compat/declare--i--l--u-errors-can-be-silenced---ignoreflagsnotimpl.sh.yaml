name: declare -i -l -u errors can be silenced - ignore_flags_not_impl
dialect: bash
source: 
  oils:spec/type-compat#declare--i--l--u-errors-can-be-silenced---ignoreflagsnotimpl
stdout: "status=2\nfoo=\n\nstatus=0\nbar=2+3\n"
---

declare -i foo=2+3
echo status=$?
echo foo=$foo
echo

shopt -s ignore_flags_not_impl
declare -i bar=2+3
echo status=$?
echo bar=$bar


# bash doesn't need this
