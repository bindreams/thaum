disabled: true
name: crash dump
dialect: bash
source: oils:spec/ysh-dev#crash-dump
stdout: "status=1\nstatus=0\n"
---

rm -f $TMP/*.json

OILS_CRASH_DUMP_DIR=$TMP $SH -c '
g() {
  local glocal="glocal"
  echo $(( 1 / 0 ))
}
f() {
  local flocal="flocal"
  shift
  FOO=bar g
}
readonly array=(A B C)
f "${array[@]}"
' dummy a b c

echo status=$?

# Just check that we can parse it.  TODO: Test properties.
python3 -c '
import json, sys
from pprint import pprint

for path in sys.argv[1:]:
  #print(path)
  with open(path) as f:
    dump = json.load(f)

    if 0:
      print("DUMP")
      print("status = %d" % dump["status"])
      print("pid = %d" % dump["pid"])

    if 0:
      # This has msg, source, line
      print("error %s" % dump["error"])
      print()

    if 0:
      # It would be nice if this has the proc name, I guess debug_stack has it
      print("argv_stack")
      pprint(dump["argv_stack"])
      print()

    if 0:
      print("debug_stack")
      pprint(dump["debug_stack"])
      print()

    if 0:
      print("var_stack")
      pprint(dump["var_stack"])

' $TMP/*.json
echo status=$?
