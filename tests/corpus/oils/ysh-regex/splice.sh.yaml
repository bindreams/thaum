disabled: true
name: '@splice'
dialect: bash
source: oils:spec/ysh-regex#splice
stdout: |
  [[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+
  yes
  no
---
shopt -s ysh:all
var d = /d+/;
var ip = / @d '.' @d '.' @d '.' @d /
echo $ip
if ('0.0.0.0' ~ ip) { echo yes } else { echo no }
if ('0.0.0' ~ ip) { echo yes } else { echo no }
