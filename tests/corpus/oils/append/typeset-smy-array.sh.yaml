name: typeset s+=(my array)
dialect: bash
source: oils:spec/append#typeset-smy-array
status: 0
stdout: |
  abc
  status=0
  ['abc', 'd', 'e', 'f']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
typeset s='abc'
echo $s

typeset s+=(d e f)
echo status=$?
argv.py "${s[@]}"
