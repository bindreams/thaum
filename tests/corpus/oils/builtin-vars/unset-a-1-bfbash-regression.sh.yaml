name: unset a[-1] (bf.bash regression)
dialect: bash
source: oils:spec/builtin-vars#unset-a-1-bfbash-regression
stdout: |
  len=2
  last=2
  last=2
  1 42
---
case $SH in dash|zsh) exit ;; esac

a=(1 2 3)
unset a[-1]
echo len=${#a[@]}

echo last=${a[-1]}
(( last = a[-1] ))
echo last=$last

(( a[-1] = 42 ))
echo "${a[@]}"
