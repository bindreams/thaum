name: strict_errexit prevents errexit from being disabled in function
dialect: bash
source: 
  oils:spec/errexit-osh#stricterrexit-prevents-errexit-from-being-disabled-in-function
status: 1
stdout: |
  fun
  builtin ok
  external ok
---
set -o errexit
fun() { echo fun; }

fun || true  # this is OK

shopt -s strict_errexit || true

echo 'builtin ok' || true
env echo 'external ok' || true

fun || true  # this fails
