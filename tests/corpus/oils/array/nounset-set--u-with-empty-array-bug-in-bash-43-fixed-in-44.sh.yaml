name: nounset / set -u with empty array (bug in bash 4.3, fixed in 4.4)
dialect: bash
source: 
  oils:spec/array#nounset-set--u-with-empty-array-bug-in-bash-43-fixed-in-44
stdout: |
  []
  status=0
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

# http://lists.gnu.org/archive/html/help-bash/2017-09/msg00005.html

set -o nounset
empty=()
argv.py "${empty[@]}"
echo status=$?
