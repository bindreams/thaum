name: Multiple here docs in pipeline
dialect: bash
source: oils:spec/here-doc#multiple-here-docs-in-pipeline
stdout: "0: 3: fd3\n5: fd5\nok\n"
---
case $SH in *osh) exit ;; esac

# The second instance reads its stdin from the pipe, and fd 5 from a here doc.
read_from_fd.py 3 3<<EOF3 | read_from_fd.py 0 5 5<<EOF5
fd3
EOF3
fd5
EOF5

echo ok
