name: Condition that's greater than 32 bits
dialect: bash
source: oils:spec/for-expr#condition-thats-greater-than-32-bits
stdout: "4294967296\n4294967297\n4294967298\n4294967299\n4294967300\n"
---

iters=0

for ((i = 1 << 32; i; ++i)); do
  echo $i
  iters=$(( iters + 1 ))
  if test $iters -eq 5; then
    break
  fi
done
