name: (YSH) @[sp] and @sp
dialect: bash
source: oils:spec/array-sparse#ysh-sp-and-sp
stdout: "['0', '3', '5']\n['0', '3', '5']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
case $SH in bash|mksh) exit ;; esac

a=({0..5})
unset -v 'a[1]' 'a[2]' 'a[4]'

shopt -s parse_at
argv.py @[a]
argv.py @a
