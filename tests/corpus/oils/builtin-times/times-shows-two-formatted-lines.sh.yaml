name: times shows two formatted lines
dialect: bash
source: oils:spec/builtin-times#times-shows-two-formatted-lines
status: 0
stdout: |
  pass
  pass
  2
---
output=$(times)
echo "$output" | while read line
do
	echo "$line" | egrep -q '[0-9]+m[0-9]+.[0-9]+s [0-9]+m[0-9]+.[0-9]+s' && echo "pass"
done

echo "$output" | wc -l
