name: 'Char class special: ^ - ] \'
dialect: bash
source: oils:spec/ysh-regex#char-class-special
stdout: "caret=[x^]\ncaret2=[x^]\ncaret3=[x^]\nmatch x\nmatch ^\n---\nhyphen=[ab-]\n\
  hyphen2=[ab-]\nmatch -\nmatch a\n---\nrbracket=[][]\nrbracket2=[][]\nmatch [\nmatch
  ]\n---\nbackslash=[xn\\\\]\nbackslash2=[xn\\\\]\nbackslash3=[xn\\\\]\nmatch x\n\
  match n\nmatch backslash\n"
---

# See demo/ere-char-class-literals.sh
#
# \ is special because of gawk

shopt -s ysh:upgrade


# Note: single caret disalowed
var caret = / ['^' 'x'] /
echo caret=$caret

var caret2 = / [ \x5e 'x'] /
echo caret2=$caret2

var caret3 = / [ \u{5e} 'x'] /
echo caret3=$caret3

if ('x' ~ caret3) {
  echo 'match x'
}
if ('^' ~ caret3) {
  echo 'match ^'
}

echo ---

var hyphen = / ['a' '-' 'b'] /
echo hyphen=$hyphen

var hyphen2 = / ['a' \x2d 'b' ] /
echo hyphen2=$hyphen2

if ('-' ~ hyphen2) {
  echo 'match -'
}

if ('a' ~ hyphen2) {
  echo 'match a'
}

if ('c' ~ hyphen2) {
  echo 'match c'
}

echo ---

var rbracket = / [ '[' ']' ] /
echo rbracket=$rbracket

var rbracket2 = / [ \x5b \x5d ] /
echo rbracket2=$rbracket2

if ('[' ~ rbracket2) {
  echo 'match ['
}

if (']' ~ rbracket2) {
  echo 'match ]'
}

echo ---

var backslash = / [ 'x' \\ 'n' ] /
echo backslash=$backslash

var backslash2 = / [ 'x' \x5c 'n' ] /
echo backslash2=$backslash2

var backslash3 = / [ 'x' $'\\' 'n' ] /
echo backslash3=$backslash3

if ('x' ~ backslash3) {
  echo 'match x'
}

if ('n' ~ backslash3) {
  echo 'match n'
}

if (b'\\' ~ backslash3) {
  echo 'match backslash'
}

if ($'\n' ~ backslash3) {
  echo 'match nnewline'
}
