disabled: true
name: 'cd builtin: break in block'
dialect: bash
source: oils:spec/ysh-control-flow#cd-builtin-break-in-block
status: 1
stdout: "one\n1\n"
---
shopt -s ysh:all
f() {
  cd / {
    echo one
    for i in 1 2; do
      echo $i
      break  # break out of loop
    done

    break  # break out of block isn't valid
    echo two
  }
  echo end func
}
f
