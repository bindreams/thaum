name: shopt histappend toggle check
dialect: bash
source: oils:spec/builtin-history#shopt-histappend-toggle-check
stdout: |
  status=0
  shopt -s histappend
  status=0
  shopt -u histappend
  ^D
---

shopt -s histappend
echo status=$?
shopt -p histappend
shopt -u histappend
echo status=$?
shopt -p histappend

# match osh's behaviour of echoing ^D for EOF
case $SH in bash) echo '^D' ;; esac
