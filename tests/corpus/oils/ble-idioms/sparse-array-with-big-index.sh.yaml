name: Sparse array with big index
dialect: bash
source: oils:spec/ble-idioms#sparse-array-with-big-index
stdout: |
  len=1
---

# TODO: more InternalStringArray idioms / stress tests ?

a=()

if false; then
  # This takes too long!  # From Zulip
  i=$(( 0x0100000000000000 ))
else
  # smaller number that's OK
  i=$(( 0x0100000 ))
fi

a[i]=1

echo len=${#a[@]}
