name: typeset +x
dialect: bash
source: oils:spec/assign-extended#typeset-x
stdout: |
  E
  None
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
export e=E
printenv.py e
typeset +x e=E2
printenv.py e  # no longer exported
