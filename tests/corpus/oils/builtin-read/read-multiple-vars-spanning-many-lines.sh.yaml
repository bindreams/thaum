name: read multiple vars spanning many lines
dialect: bash
source: oils:spec/builtin-read#read-multiple-vars-spanning-many-lines
stdout: |
  ['one-two', 'three-four five-six', '']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
read x y << 'EOF'
one-\
two three-\
four five-\
six
EOF
argv.py "$x" "$y" "$z"
