name: Env value with escaped <
dialect: bash
source: oils:spec/assign#env-value-with-escaped
stdout: |
  foo<foo
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
FOO=foo\<foo printenv.py FOO
