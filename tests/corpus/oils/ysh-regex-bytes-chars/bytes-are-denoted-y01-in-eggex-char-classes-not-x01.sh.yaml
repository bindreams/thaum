name: Bytes are denoted \y01 in Eggex char classes (not \x01)
dialect: bash
source: 
  oils:spec/ysh-regex-bytes-chars#bytes-are-denoted-y01-in-eggex-char-classes-not-x01
stdout: "(Bool)   true\n(Bool)   false\n"
---

# That is, eggex does have MODES like re.UNICODE
#
# We UNAMBIGUOUSLY accept
# - \y01 or \u{1} - these are the same
# - \yff or \u{ff} - these are DIFFERENT

var pat = / [\y01] /
pp test_ (b'\y01' ~ pat)
pp test_ ('a' ~ pat)
