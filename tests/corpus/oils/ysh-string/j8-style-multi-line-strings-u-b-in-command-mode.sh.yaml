disabled: true
name: J8-style multi-line strings u''' b''' in command mode
dialect: bash
source: oils:spec/ysh-string#j8-style-multi-line-strings-u-b-in-command-mode
stdout: |-
  --
  a
  --
  --
  b
  --
---

write --end '' -- u'''
  --
  \u{61}
  --
  '''
write --end '' -- b'''
--
\y62
--
'''

