name: command skips function lookup
dialect: bash
source: oils:spec/builtin-meta#command-skips-function-lookup
stdout: |
  3
  1
  2
  3
  1
  2
  3
---
seq() {
  echo "$@"
}
command  # no-op
seq 3
command seq 3
# subshell shouldn't fork another process (but we don't have a good way of
# testing it)
( command seq 3 )
