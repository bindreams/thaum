name: --rcfile in non-interactive shell prints warnings
dialect: bash
source: oils:spec/sh-usage#rcfile-in-non-interactive-shell-prints-warnings
stderr: "warned=1\nwarned=0\n"
---
echo 'echo rc' > rc

$SH --rcfile rc -i </dev/null 2>interactive.txt
grep -q 'warning' interactive.txt
echo warned=$? >&2

$SH --rcfile rc </dev/null 2>non-interactive.txt
grep -q 'warning' non-interactive.txt
echo warned=$? >&2

head *interactive.txt
