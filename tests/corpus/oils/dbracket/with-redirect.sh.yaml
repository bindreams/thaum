name: '[[ ]] with redirect'
dialect: bash
source: oils:spec/dbracket#with-redirect
stdout: |
  0
  --
  STDERR
environment:
  TMP: /tmp
setup: |-
  #!/bin/sh
  cat > stdout_stderr.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  stdout = sys.argv[1] if len(sys.argv) > 1 else "STDOUT"
  stderr = sys.argv[2] if len(sys.argv) > 2 else "STDERR"
  status = int(sys.argv[3]) if len(sys.argv) > 3 else 0
  print(stdout)
  print(stderr, file=sys.stderr)
  sys.exit(status)
  HELPER
  chmod +x stdout_stderr.py
---
[[ $(stdout_stderr.py) == STDOUT ]] 2>$TMP/x.txt
echo $?
echo --
cat $TMP/x.txt
