name: type -f builtin -> function and file exists
dialect: bash
source: oils:spec/builtin-type-bash#type--f-builtin---function-and-file-exists
stdout: |
  mv is /tmp/mv
  tar is /tmp/tar
  grep is /tmp/grep
---
touch /tmp/{mv,tar,grep}
chmod +x /tmp/{mv,tar,grep}
PATH=/tmp:$PATH

mv () { ls; }
tar () { ls; }
grep () { ls; }
type -f mv tar grep
