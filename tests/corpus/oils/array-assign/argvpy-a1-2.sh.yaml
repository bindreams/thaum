name: argv.py a[1 + 2]=
dialect: bash
source: oils:spec/array-assign#argvpy-a1-2
stdout: |
  ['a[1', '+', '2]=']
  status=0
  ['a[1', '+', '2]+=']
  status=0
  ['a[3', '+', '4]=']
  ['a[3', '+', '4]+=']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
case $SH in zsh|ash) exit ;; esac

# This tests that the worse parser doesn't unconditinoally treat a[ as special

a[1 + 2]= argv.py a[1 + 2]=
echo status=$?

a[1 + 2]+= argv.py a[1 + 2]+=
echo status=$?

argv.py a[3 + 4]=

argv.py a[3 + 4]+=
