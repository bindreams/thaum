name: var ref TO array var, with subscripts
dialect: bash
source: oils:spec/var-ref#var-ref-to-array-var-with-subscripts
stdout: |
  ['']
  ['x']
  ['z']
  ['x', 'y', 'z']
  ['x y z']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
f() {
  argv.py "${!1}"
}
f 'nonexistent[0]'
array=(x y z)
f 'array[0]'
f 'array[1+1]'
f 'array[@]'
f 'array[*]'
# Also associative arrays.
