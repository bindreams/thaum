disabled: true
name: 'Consistency: Unwanted Blocks Are Errors'
dialect: bash
source: oils:spec/ysh-blocks#consistency-unwanted-blocks-are-errors
stdout: |
  true 2
  false 2
  echo block 2
  echo args 2
  command echo 2
  builtin echo 2
  pushd 2
environment:
  TMP: /tmp
---
shopt --set parse_brace

true { echo BAD }
echo true $?

false ( 42, 43 )
echo false $?

echo { echo BAD }
echo echo block $?

echo ( 42, 43 )
echo echo args $?

command echo 'command block' { echo BAD }
echo command echo $?

builtin echo 'builtin block' { echo BAD }
echo builtin echo $?

pushd $TMP { echo BAD }
echo pushd $?
