name: ${a[@]/pat/rep}
dialect: bash
source: oils:spec/array-sparse#apatrep
stdout: |
  ['0', '1', '5', '6', '8', '9']
  ['', '', '', '', '', '']
  ['0', '1', '5', '6', '8', '9']
  ['v', 'v', 'v', 'v', 'v', 'v']
  ['x0', 'x1', 'x5', 'x6', 'x8', 'x9']
  ['x0', 'x1', 'x5', 'x6', 'x8', 'x9']
  ['vD', 'vD', 'vD', 'v6', 'v8', 'v9']
  ['_0', '_1', '_5', '__', '__', '__']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

case $SH in mksh) exit ;; esac

a=(v{0..9})
unset -v 'a[2]' 'a[3]' 'a[4]' 'a[7]'

argv.py "${a[@]/?}"
argv.py "${a[@]//?}"
argv.py "${a[@]/#?}"
argv.py "${a[@]/%?}"

argv.py "${a[@]/v/x}"
argv.py "${a[@]//v/x}"
argv.py "${a[@]/[0-5]/D}"
argv.py "${a[@]//[!0-5]/_}"
