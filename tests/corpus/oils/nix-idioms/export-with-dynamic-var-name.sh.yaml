name: export with dynamic var name +=
dialect: bash
source: oils:spec/nix-idioms#export-with-dynamic-var-name
stdout: "declare -x NIX_LDFLAGS_foo=\" -Lone/lib64\"\ndeclare -x NIX_LDFLAGS_foo=\"\
  \ -Lone/lib64\"\n"
---

orig() {
  export NIX_LDFLAGS${role_post}+=" -L$1/lib64"
}

new() {
  local var_name="NIX_LDFLAGS$role_post"
  local value=" -L$1/lib64"

  eval "$var_name"+='$value'
  export "$var_name"
}

role_post='_foo'

# set -u

if test -n "${BASH_VERSION:-}"; then
  orig one
fi

declare -p NIX_LDFLAGS_foo  # inspect it
unset NIX_LDFLAGS_foo

new one

declare -p NIX_LDFLAGS_foo  # inspect it
