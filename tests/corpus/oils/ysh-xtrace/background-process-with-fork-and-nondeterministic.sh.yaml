disabled: true
name: Background process with fork and & (nondeterministic)
dialect: bash
source: oils:spec/ysh-xtrace#background-process-with-fork-and-nondeterministic
stdout: ''
stderr: |2-
    . 12345 exec sleep 0.1
    . 12345 exec sleep 0.1
    ; process 12345: status 0
    ; process 12345: status 0
  . builtin fork
  . builtin set '+x'
  . builtin shopt -s 'ysh:upgrade'
  < wait
  < wait
  > wait
  > wait
  | fork 12345
  | fork 12345
---
shopt --set ysh:upgrade
set -x

{
  sleep 0.1 &
  wait

  shopt -s ysh:upgrade

  fork {
    sleep 0.1
  }
  wait
  set +x
} 2>err.txt

# SORT for determinism
sed --regexp-extended 's/[[:digit:]]{2,}/12345/g' err.txt |
  LC_ALL=C sort >&2


