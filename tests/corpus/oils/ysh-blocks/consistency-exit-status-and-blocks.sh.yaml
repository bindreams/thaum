disabled: true
name: 'Consistency: Exit Status and Blocks'
dialect: bash
source: oils:spec/ysh-blocks#consistency-exit-status-and-blocks
stdout: |
  cd=0
  shopt=0
    FOO=foo
  shvar=0
  try=0
---
shopt --set parse_brace

cd / {
  false 
}
echo cd=$?

shopt --unset errexit {
  false
}
echo shopt=$?

shvar FOO=foo {
  echo "  FOO=$FOO"
  false
}
echo shvar=$?

try {
  false
}
echo try=$?
