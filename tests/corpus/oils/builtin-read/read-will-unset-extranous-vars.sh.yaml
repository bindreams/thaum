name: read will unset extranous vars
dialect: bash
source: oils:spec/builtin-read#read-will-unset-extranous-vars
stdout: "'a' 'b' ''\n'a' 'b' ''\n"
environment:
  TMP: /tmp
---

echo 'a b' > $TMP/read-few.txt

c='some value'
read a b c < $TMP/read-few.txt
echo "'$a' '$b' '$c'"

case $SH in dash) exit ;; esac # dash does not implement -n

c='some value'
read -n 3 a b c < $TMP/read-few.txt
echo "'$a' '$b' '$c'"
