name: command -v
dialect: bash
source: oils:spec/builtin-meta#command--v
stdout: "echo\n0\nmyfunc\n0\nnonexistent=1\nempty=1\nfor\n0\n## OK dash/ash STDOUT:\n\
  echo\n0\nmyfunc\n0\nnonexistent=127\nempty=127\nfor\n0\n"
---
myfunc() { echo x; }
command -v echo
echo $?

command -v myfunc
echo $?

command -v nonexistent  # doesn't print anything
echo nonexistent=$?

command -v ''  # BUG FIX, shouldn't succeed
echo empty=$?

command -v for
echo $?
