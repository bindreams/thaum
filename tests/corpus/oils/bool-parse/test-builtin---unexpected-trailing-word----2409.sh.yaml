name: test builtin - Unexpected trailing word '--' (#2409)
dialect: bash
source: oils:spec/bool-parse#test-builtin---unexpected-trailing-word----2409
stdout: |-
  status=0
  status=0
  status=0
  status=0
  status=0
---

# Minimal repro of sqsh build error
set -- -o; test $# -ne 0 -a "$1" != "--"
echo status=$?

# Now hardcode $1
test $# -ne 0 -a "-o" != "--"
echo status=$?

# Remove quotes around -o
test $# -ne 0 -a -o != "--"
echo status=$?

# How about a different flag?
set -- -z; test $# -ne 0 -a "$1" != "--"
echo status=$?

# A non-flag?
set -- z; test $# -ne 0 -a "$1" != "--"
echo status=$?
