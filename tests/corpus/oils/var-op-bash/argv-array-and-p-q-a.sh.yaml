name: argv array and @P @Q @a
dialect: bash
source: oils:spec/var-op-bash#argv-array-and-p-q-a
stdout: "a b c\nstatus=0\n'a' 'b\\nc'\nstatus=0\n\nstatus=0\n"
---
$SH -c 'echo ${@@P}' dummy a b c
echo status=$?
$SH -c 'echo ${@@Q}' dummy a 'b\nc'
echo status=$?
$SH -c 'echo ${@@a}' dummy a b c
echo status=$?
