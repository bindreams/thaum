name: Command Sub trailing newline removed
dialect: bash
source: oils:spec/command-sub#command-sub-trailing-newline-removed
stdout: |
  ['ab\ncd']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
s=$(python2 -c 'print("ab\ncd\n")')
argv.py "$s"
