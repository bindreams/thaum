name: trap ERR doesn't run in subprograms - subshell, command sub, async
dialect: bash
source: 
  oils:spec/builtin-trap-err#trap-err-doesnt-run-in-subprograms---subshell-command-sub-async
stdout: |
  subshell
  async
  line=11
  ok
---

trap 'echo line=$LINENO' ERR

( false; echo subshell )

x=$( false; echo command sub )

false & wait

{ false; echo async; } & wait

false
echo ok
