name: trap ERR does not run in errexit situations
dialect: bash
source: oils:spec/builtin-trap-err#trap-err-does-not-run-in-errexit-situations
stdout: |
  until
  line=16
  line=20
  line=20
  line=20
  ok
---

trap 'echo line=$LINENO' ERR

if false; then
  echo if
fi

while false; do
  echo while
done

until false; do
  echo until
  break
done

false || false || false

false && false && false

false; false; false

echo ok
