name: IFS=x and '' and $@ (#2)
dialect: bash
source: oils:spec/word-split#ifsx-and-and-2
stdout: |
  ['=', '=']
  ['=', '=']

  ['=', '=']
  ['=', '=']

  ['=', '=']
  ['=', '=']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
setopt SH_WORD_SPLIT  # for zsh

set -- "" "" "" "" ""
argv.py =$@=
argv.py =$*=
echo

IFS=
argv.py =$@=
argv.py =$*=
echo

IFS=x
argv.py =$@=
argv.py =$*=



# yash-2.49 seems to behave in a strange way, but this behavior seems to have
# been fixed at least in yash-2.57.
