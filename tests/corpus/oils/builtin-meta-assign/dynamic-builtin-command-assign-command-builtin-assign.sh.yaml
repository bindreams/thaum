name: dynamic builtin command ASSIGN, command builtin ASSIGN
dialect: bash
source: 
  oils:spec/builtin-meta-assign#dynamic-builtin-command-assign-command-builtin-assign
stdout: |
  bc=export
  bc=readonly
  --
  cb=export
  cb=readonly
  --
  bce=export
  bcr=readonly
  --
  cbe=export
  cbr=readonly
---
case $SH in dash|ash|zsh) exit ;; esac

b=builtin
c=command
e=export
r=readonly

$b $c export bc=export
echo bc=$bc

$b $c readonly bc=readonly
echo bc=$bc

echo --

$c $b export cb=export
echo cb=$cb

$c $b readonly cb=readonly
echo cb=$cb

echo --

$b $c $e bce=export
echo bce=$bce

$b $c $r bcr=readonly
echo bcr=$bcr

echo --

$c $b $e cbe=export
echo cbe=$cbe

$c $b $r cbr=readonly
echo cbr=$cbr
