disabled: true
name: Invalid UTF-8 in JSON is rejected
dialect: bash
source: oils:spec/ysh-json#invalid-utf-8-in-json-is-rejected
stdout: |-
  status=1
  status=1
  status=1
  status=1
---

echo $'"\xff"' | json read
echo status=$?

echo $'"\xff"' | json8 read
echo status=$?

echo $'\xff' | json read
echo status=$?

echo $'\xff' | json8 read
echo status=$?
