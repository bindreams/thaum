name: set -o errexit while it's being ignored (moot with strict_errexit)
dialect: bash
source: 
  oils:spec/errexit#set--o-errexit-while-its-being-ignored-moot-with-stricterrexit
status: 1
stdout: |
  1
  2
  3
  4
  5
  6
---
set -o errexit
# osh aborts early here
if { echo 1; false; echo 2; set -o errexit; echo 3; false; echo 4; }; then
  echo 5;
fi
echo 6
false  # this is the one that makes shells fail
echo 7
