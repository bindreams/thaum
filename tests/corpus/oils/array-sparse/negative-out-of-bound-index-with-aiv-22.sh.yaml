name: Negative out-of-bound index with a[i]=v (2/2)
dialect: bash
source: oils:spec/array-sparse#negative-out-of-bound-index-with-aiv-22
status: 1
stdout: "\n"
stderr: "  sp1[-21]=F\n  ^~~~\n[ stdin ]:5: fatal: Index -21 is out of bounds for
  array of length 10\n"
---
case $SH in mksh) exit ;; esac

sp1[9]=x

sp1[-21]=F
declare -p sp1
