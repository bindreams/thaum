name: Test that you can remove everything with const
dialect: bash
source: oils:spec/var-op-strip#test-that-you-can-remove-everything-with-const
stdout: |
  ['', '', '', '']
  ['abcd', 'abcd', 'abcd', 'abcd']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
s='abcd'
argv.py "${s%%abcd}" "${s%abcd}" "${s#abcd}" "${s##abcd}"
# failure case:
argv.py "${s%%abcde}" "${s%abcde}" "${s#abcde}" "${s##abcde}"
