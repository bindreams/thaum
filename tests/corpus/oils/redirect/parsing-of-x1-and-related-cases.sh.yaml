name: Parsing of x=1> and related cases
dialect: bash
source: oils:spec/redirect#parsing-of-x1-and-related-cases
stdout: |
  x=1
  x=1
  x=
  +1
  +1
  +
  a1
---

echo x=1>/dev/stdout
echo x=1 >/dev/stdout
echo x= 1>/dev/stdout

echo +1>/dev/stdout
echo +1 >/dev/stdout
echo + 1>/dev/stdout

echo a1>/dev/stdout
