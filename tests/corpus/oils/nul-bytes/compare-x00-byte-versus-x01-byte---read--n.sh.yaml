name: Compare \x00 byte versus \x01 byte - read -n
dialect: bash
source: oils:spec/nul-bytes#compare-x00-byte-versus-x01-byte---read--n
stdout: |
  len=3
   2e 01 2e
  len=2
   2e 2e
  len=0
---
case $SH in dash) exit ;; esac

show_string() {
  read -n 3 s
  echo len=${#s}
  echo -n "$s" | od -A n -t x1
}


printf '.\001.' | show_string

printf '.\000.' | show_string

printf '\000' | show_string
