name: Using ${x-default} after unsetting local shadowing a global
dialect: bash
source: 
  oils:spec/assign#using-x-default-after-unsetting-local-shadowing-a-global
stdout: |
  x=global
  x=local
  - operator = global
  :- operator = global
---
f() {
  echo "x=$x"
  local x='local'
  echo "x=$x"
  unset x
  echo "- operator = ${x-default}"
  echo ":- operator = ${x:-default}"
}
x=global
f
