name: typeset -f
dialect: bash
source: oils:spec/assign-extended#typeset--f
stdout: "1\n1\n0\n"
---
# mksh implement typeset but not declare
typeset  -f myfunc func2
echo $?

myfunc() { echo myfunc; }
# This prints the source code.
typeset  -f myfunc func2 > /dev/null
echo $?

func2() { echo func2; }
typeset  -f myfunc func2 > /dev/null
echo $?
