name: strict_array prevents exporting array
dialect: bash
source: oils:spec/array#strictarray-prevents-exporting-array
status: 1
stdout: "\n"
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---

shopt -s strict_array

export PYTHONPATH
PYTHONPATH=(a b c)
printenv.py PYTHONPATH
