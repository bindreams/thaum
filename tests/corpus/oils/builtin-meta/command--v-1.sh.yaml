name: command -V
dialect: bash
source: oils:spec/builtin-meta#command--v
stdout: "ll is an alias for \"ls -l\"\nstatus=0\necho is a shell builtin\nstatus=0\n\
  myfunc is a function\nstatus=0\nstatus=1\nfor is a shell keyword\nstatus=0\n"
---
myfunc() { echo x; }

shopt -s expand_aliases
alias ll='ls -l'

backtick=\`
command -V ll | sed "s/$backtick/'/g"
echo status=$?

command -V echo
echo status=$?

# Paper over insignificant difference
command -V myfunc | sed 's/shell function/function/'
echo status=$?

command -V nonexistent  # doesn't print anything
echo status=$?

command -V for
echo status=$?
