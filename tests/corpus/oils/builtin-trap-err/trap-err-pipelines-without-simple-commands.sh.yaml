name: trap ERR pipelines without simple commands
dialect: bash
source: oils:spec/builtin-trap-err#trap-err-pipelines-without-simple-commands
stdout: "assign\ndparen\ndbracket\nsubshell\nsubshell2\ngroup\nok\n"
---

trap 'echo assign' ERR
a=$(false) | a=$(false) | a=$(false)

trap 'echo dparen' ERR
(( 0 )) | (( 0 )) | (( 0 ))

trap 'echo dbracket' ERR
[[ a = b ]] | [[ a = b ]] | [[ a = b ]]

# bash anomaly - it gets printed twice?
trap 'echo subshell' ERR
(false) | (false) | (false) | (false)

# same bug
trap 'echo subshell2' ERR 
(false) | (false) | (false) | (false; false)

trap 'echo group' ERR
{ false; } | { false; } | { false; }

echo ok
