disabled: true
name: git completion space issue (disabled for old git, e.g. v2.17.1)
dialect: bash
source: 
  oils:spec/ysh-completion#git-completion-space-issue-disabled-for-old-git-eg-v2171
status: 0
stdout: "status=0\n\"git cherry \"\n\"git cherry-pick \"\n\"git checkout \"\n"
---

# Hack for lenny: version detection for 2.17.1 on Ubuntu 18.02
if ! git --list-cmds=list-complete >/dev/null; then
  cat <<'EOF'
status=0
"git cherry "
"git cherry-pick "
"git checkout "
EOF
  return
fi

. $REPO_ROOT/testdata/completion/git-completion.bash
echo status=$?

#complete

# Bug: it has an extra \ on it
compexport -c 'git ch'
