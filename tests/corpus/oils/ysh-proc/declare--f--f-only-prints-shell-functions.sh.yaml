disabled: true
name: declare -f -F only prints shell functions
dialect: bash
source: oils:spec/ysh-proc#declare--f--f-only-prints-shell-functions
status: 0
stdout: "declare -f myfunc\n---\nstatus=1\nstatus=1\n"
---
shopt --set parse_proc

myfunc() {
  echo hi
}

proc myproc {
  echo hi
}

declare -F
echo ---

declare -F myproc
echo status=$?

declare -f myproc
echo status=$?
