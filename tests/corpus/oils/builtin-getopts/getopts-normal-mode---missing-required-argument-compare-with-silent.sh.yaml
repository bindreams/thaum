name: getopts normal mode - missing required argument (compare with silent)
dialect: bash
source: 
  oils:spec/builtin-getopts#getopts-normal-mode---missing-required-argument-compare-with-silent
status: 0
stdout: "status=0 opt=? OPTARG=\n"
---
# Normal mode returns '?', OPTARG is empty
set -- -a
getopts 'a:' opt 2>/dev/null
echo "status=$? opt=$opt OPTARG=$OPTARG"
