name: no splitting when IFS is empty
dialect: bash
source: oils:spec/word-split#no-splitting-when-ifs-is-empty
stdout: |
  ['a b']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
IFS=""
foo="a b"
argv.py $foo
