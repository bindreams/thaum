name: $_ with pipeline and subshell
dialect: bash
source: oils:spec/vars-special#with-pipeline-and-subshell
stdout: |-
  last=
  pipeline=last=
  subshell=pipeline=last=
  done=pipeline=last=
---
case $SH in dash|mksh) exit ;; esac

shopt -s lastpipe

seq 3 | echo last=$_

echo pipeline=$_

( echo subshell=$_ )
echo done=$_


# very weird semantics for zsh!
