disabled: true
name: Stateful proc with counter
dialect: bash
source: oils:spec/ysh-proc#stateful-proc-with-counter
stdout: |
  counter = 1
  counter = 3
  counter = 6
---
shopt --set ysh:upgrade

proc invokeCounter(; self, inc) {
  setvar self.i += inc
  echo "counter = $[self.i]"
}

var methods = Object(null, {__invoke__: invokeCounter})
var counter = Object(methods, {i: 0})

counter (1)
counter (2)
counter (3)
