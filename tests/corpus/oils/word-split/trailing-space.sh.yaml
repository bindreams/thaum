name: Trailing space
dialect: bash
source: oils:spec/word-split#trailing-space
stdout: |
  ['Xec  ho ']
  ['Xec  ho ']
  ['Xec  ho ']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
argv.py 'Xec  ho '
argv.py X'ec  ho '
argv.py X"ec  ho "
