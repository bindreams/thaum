name: $HOME is NOT set
dialect: bash
source: oils:spec/vars-special#home-is-not-set
stdout: "status=0\nstatus=1\nstatus=1\n"
---
case $SH in *zsh) echo 'zsh sets HOME'; exit ;; esac

home=$(echo $HOME)
test "$home" = ""
echo status=$?

env | grep HOME
echo status=$?

# not in interactive shell either
$SH -i -c 'echo $HOME' | grep /
echo status=$?
