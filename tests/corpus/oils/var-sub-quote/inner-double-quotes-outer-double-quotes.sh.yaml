name: Inner double quotes, outer double quotes
dialect: bash
source: oils:spec/var-sub-quote#inner-double-quotes-outer-double-quotes
stdout: |
  ['b']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
argv.py "${Unset-"b"}"
