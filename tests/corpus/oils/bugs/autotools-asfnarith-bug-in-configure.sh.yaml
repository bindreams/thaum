name: autotools as_fn_arith bug in configure
dialect: bash
source: oils:spec/bugs#autotools-asfnarith-bug-in-configure
stdout: |-
  as_val=1
---

# Causes 'grep -e' check to infinite loop.
# Reduced from a configure script.

as_fn_arith() {
  as_val=$(( $* ))
}

as_fn_arith 0 + 1
echo as_val=$as_val
