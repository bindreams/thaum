name: File redirect that globs to more than one file (bash and zsh only)
dialect: bash
source: 
  oils:spec/redirect-multi#file-redirect-that-globs-to-more-than-one-file-bash-and-zsh-only
stdout: |-
  status=1
  ==> foo-bar <==

  ==> foo-spam <==
---

touch foo-bar
touch foo-spam

echo hi > foo-*
echo status=$?

head foo-bar foo-spam
