name: declare array and then append
dialect: bash
source: oils:spec/array#declare-array-and-then-append
stdout: |
  ['a', 'b', 'c']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
declare -a array
array+=(a)
array+=(b c)
argv.py "${array[@]}"
