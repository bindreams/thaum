name: "IFS='' with ${a[@]} and ${a[*]} (bug #627)"
dialect: bash
source: oils:spec/word-split#ifs-with-a-and-a-bug-627
stdout: "['at', 'a', 'b c']\n['star', 'a', 'b c']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
case $SH in dash | ash) exit 0 ;; esac

myarray=(a 'b c')
IFS=''
argv.py at ${myarray[@]}
argv.py star ${myarray[*]}
