name: ${a[@]:offset:length}
dialect: bash
source: oils:spec/array-sparse#aoffsetlength
stdout: |
  ==== ${a[@]:offset} ====
  [v0 v1 v5 v6 v8 v9][v0 v1 v5 v6 v8 v9]
  [v5 v6 v8 v9][v5 v6 v8 v9]
  [v5 v6 v8 v9][v5 v6 v8 v9]
  [v5 v6 v8 v9][v5 v6 v8 v9]
  [v9][v9]
  [][]
  [][]
  ==== ${a[@]:negative} ====
  [v9][v9]
  [v8 v9][v8 v9]
  [v5 v6 v8 v9][v5 v6 v8 v9]
  [v1 v5 v6 v8 v9][v1 v5 v6 v8 v9]
  [v0 v1 v5 v6 v8 v9][v0 v1 v5 v6 v8 v9]
  [][]
  [][]
  ==== ${a[@]:offset:length} ====
  [][]
  [v0][v0]
  [v0 v1 v5][v0 v1 v5]
  [v5][v5]
  [v5 v6 v8 v9][v5 v6 v8 v9]
  [v5 v6 v8 v9][v5 v6 v8 v9]
  [v5 v6 v8 v9][v5 v6 v8 v9]
  [][]
  [v9][v9]
  [v9][v9]
  [][]
---
case $SH in mksh) exit ;; esac

a=(v{0..9})
unset -v 'a[2]' 'a[3]' 'a[4]' 'a[7]'

echo '==== ${a[@]:offset} ===='
echo "[${a[@]:0}][${a[*]:0}]"
echo "[${a[@]:2}][${a[*]:2}]"
echo "[${a[@]:3}][${a[*]:3}]"
echo "[${a[@]:5}][${a[*]:5}]"
echo "[${a[@]:9}][${a[*]:9}]"
echo "[${a[@]:10}][${a[*]:10}]"
echo "[${a[@]:11}][${a[*]:11}]"

echo '==== ${a[@]:negative} ===='
echo "[${a[@]: -1}][${a[*]: -1}]"
echo "[${a[@]: -2}][${a[*]: -2}]"
echo "[${a[@]: -5}][${a[*]: -5}]"
echo "[${a[@]: -9}][${a[*]: -9}]"
echo "[${a[@]: -10}][${a[*]: -10}]"
echo "[${a[@]: -11}][${a[*]: -11}]"
echo "[${a[@]: -21}][${a[*]: -21}]"

echo '==== ${a[@]:offset:length} ===='
echo "[${a[@]:0:0}][${a[*]:0:0}]"
echo "[${a[@]:0:1}][${a[*]:0:1}]"
echo "[${a[@]:0:3}][${a[*]:0:3}]"
echo "[${a[@]:2:1}][${a[*]:2:1}]"
echo "[${a[@]:2:4}][${a[*]:2:4}]"
echo "[${a[@]:3:4}][${a[*]:3:4}]"
echo "[${a[@]:5:4}][${a[*]:5:4}]"
echo "[${a[@]:5:0}][${a[*]:5:0}]"
echo "[${a[@]:9:1}][${a[*]:9:1}]"
echo "[${a[@]:9:2}][${a[*]:9:2}]"
echo "[${a[@]:10:1}][${a[*]:10:1}]"
