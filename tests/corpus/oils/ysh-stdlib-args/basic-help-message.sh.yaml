disabled: true
name: Basic help message
dialect: bash
source: oils:spec/ysh-stdlib-args#basic-help-message
stdout: |
  usage: program-name [-h] [-v] src dst

  Reference Implementation

  positional arguments:
   src
   dst

  options:
   -h, --help           show this help message and exit
   -v, --verbose        Verbose
---

source $LIB_YSH/args.ysh

parser (&spec) {
  # TODO: implement description, prog and help message
  description '''
     Reference Implementation
  '''
  prog "program-name"

  arg -v --verbose (Bool, help = "Verbose")
  arg src
  arg dst
}
var argv = ['-h', 'src', 'dst']

# Help
var args = parseArgs(spec, argv)
