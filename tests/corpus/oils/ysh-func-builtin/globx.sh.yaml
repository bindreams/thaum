disabled: true
name: '@[glob(x)]'
dialect: bash
source: oils:spec/ysh-func-builtin#globx
stdout: |
  A
  B
  ___
  a.z
  b.z
  ___
  -.z
  a.z
  b.z
---

# empty glob
write -- A @[glob('__nope__')] B
echo ___

touch -- a.z b.z -.z
write -- @[glob('?.z')]
echo ___

# add it back
shopt --unset no_dash_glob
write -- @[glob('?.z')]
