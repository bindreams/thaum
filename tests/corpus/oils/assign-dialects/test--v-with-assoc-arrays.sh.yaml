name: test -v with assoc arrays
dialect: bash
source: oils:spec/assign-dialects#test--v-with-assoc-arrays
stdout: |+
  A=1
  A[0]=1

  A=0
  A[0]=0

  A[1]=1
  A[x]=1

...
---

typeset -A A

test -v A
echo A=$?
test -v 'A[0]'
echo "A[0]=$?"
echo

A['0']=x

test -v A
echo A=$?
test -v 'A[0]'
echo "A[0]=$?"
echo

test -v 'A[1]'
echo "A[1]=$?"

# stupid rule about undefined 'x'
test -v 'A[x]'
echo "A[x]=$?"
echo
