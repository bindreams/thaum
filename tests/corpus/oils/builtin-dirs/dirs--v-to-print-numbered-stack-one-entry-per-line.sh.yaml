name: dirs -v to print numbered stack, one entry per line
dialect: bash
source: 
  oils:spec/builtin-dirs#dirs--v-to-print-numbered-stack-one-entry-per-line
status: 0
stdout: "--\n 0  /tmp\n 1  /\n--\n 0  /dev\n 1  /tmp\n 2  /\n"
---
set -o errexit
cd /
pushd /tmp >/dev/null
echo --
dirs -v
pushd /dev >/dev/null
echo --
dirs -v
#
#  zsh uses tabs
