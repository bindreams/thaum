name: trap DEBUG case
dialect: bash
source: oils:spec/builtin-trap-bash#trap-debug-case
stdout: |2-
    [6]
    [8]
    [10]
  python
    [16]
  ok
---
debuglog() {
  echo "  [$@]"
}
trap 'debuglog $LINENO' DEBUG

name=foo.py

case $name in 
  *.py)
    echo python
    ;;
  *.sh)
    echo shell
    ;;
esac
echo ok
