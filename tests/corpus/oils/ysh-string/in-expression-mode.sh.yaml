disabled: true
name: "''' in Expression Mode"
dialect: bash
source: oils:spec/ysh-string#in-expression-mode
stdout: |
  [two = $two '
  three = $three ''
   \u{61}
  ]
  [two = $two '
  three = $three ''
   a
  ]
  [two = $two '
  three = $three ''
   a a
  ]
---

var two = 2
var three = 2

var x = r''' 
  two = $two '
  three = $three ''
   \u{61}
  '''
echo "[$x]"

var x = u''' 
  two = $two '
  three = $three ''
   \u{61}
  '''
echo "[$x]"

var x = b''' 
  two = $two '
  three = $three ''
   \u{61} \y61
  '''
echo "[$x]"
