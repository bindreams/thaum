disabled: true
name: list() does shallow copy
dialect: bash
source: oils:spec/ysh-convert#list-does-shallow-copy
stdout: |
  2
  2
  3
---
shopt --set parse_ysh_expr_sub

var l = [1]
var l2 = l
call l2->append(2)
echo $[len(l)] # d2 should be an alias for d

var l3 = list(l)
call l3->append(3)

# l3 should NOT be an alias
echo $[len(l)]
echo $[len(l3)]
