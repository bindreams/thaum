name: ${@:offset:length}
dialect: bash
source: oils:spec/array-sparse#offsetlength
stdout: |
  ==== ${@:offset:length} ====
  [$SH v1 v2][$SH v1 v2]
  [v1 v2 v3][v1 v2 v3]
  [v3 v4 v5][v3 v4 v5]
  [v5 v6 v7 v8 v9][v5 v6 v7 v8 v9]
  ==== ${@:negative} ====
  [v9][v9]
  [v7 v8 v9][v7 v8 v9]
  [v1 v2 v3 v4 v5 v6 v7 v8 v9][v1 v2 v3 v4 v5 v6 v7 v8 v9]
  [$SH v1 v2 v3 v4 v5 v6 v7 v8 v9][$SH v1 v2 v3 v4 v5 v6 v7 v8 v9]
  [][]
  [v7 v8][v7 v8]
  [v1 v2 v3 v4][v1 v2 v3 v4]
  [$SH v1 v2 v3][$SH v1 v2 v3]
  [][]
---
case $SH in mksh) exit ;; esac

set -- v{1..9}

{
  echo '==== ${@:offset:length} ===='
  echo "[${*:0:3}][${*:0:3}]"
  echo "[${*:1:3}][${*:1:3}]"
  echo "[${*:3:3}][${*:3:3}]"
  echo "[${*:5:10}][${*:5:10}]"

  echo '==== ${@:negative} ===='
  echo "[${*: -1}][${*: -1}]"
  echo "[${*: -3}][${*: -3}]"
  echo "[${*: -9}][${*: -9}]"
  echo "[${*: -10}][${*: -10}]"
  echo "[${*: -11}][${*: -11}]"
  echo "[${*: -3:2}][${*: -3:2}]"
  echo "[${*: -9:4}][${*: -9:4}]"
  echo "[${*: -10:4}][${*: -10:4}]"
  echo "[${*: -11:4}][${*: -11:4}]"
} | sed "s:$SH:\$SH:g;s:${SH##*/}:\$SH:g"
