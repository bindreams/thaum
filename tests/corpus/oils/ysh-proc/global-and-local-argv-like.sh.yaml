disabled: true
name: Global and local ARGV, like "$@"
dialect: bash
source: oils:spec/ysh-proc#global-and-local-argv-like
stdout: |
  []
  []
  ['a b', 'c']
  []
  ['1', '2 3']
  []
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

$SH -o ysh:upgrade -c '
argv.py "$@"
argv.py @ARGV
#argv.py "${ARGV[@]}"  # not useful, but it works!

set -- "a b" c
argv.py "$@"
argv.py @ARGV  # separate from the argv stack

f() {
  argv.py "$@"
  argv.py @ARGV  # separate from the argv stack
}
f 1 "2 3"
'
