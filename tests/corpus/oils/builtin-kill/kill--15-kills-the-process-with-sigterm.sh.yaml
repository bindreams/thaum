name: kill -15 kills the process with SIGTERM
dialect: bash
source: oils:spec/builtin-kill#kill--15-kills-the-process-with-sigterm
stdout: |
  kill=0
  wait=143
---
case $SH in mksh) exit ;; esac  # mksh is flaky

sleep 0.1 &
pid=$!
kill -15 $pid
echo kill=$?

wait $pid
echo wait=$?  # 143 is 128 + SIGTERM
