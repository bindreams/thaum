name: 'proc eval string: break'
dialect: bash
source: oils:spec/ysh-control-flow#proc-eval-string-break
status: 1
stdout: "one\n1\n"
---
shopt -s ysh:all

proc proc-that-evals (s) {
  eval $s
}

f() {
  proc-that-evals '
    echo one
    for i in 1 2; do
      echo $i
      break  # break out of loop
    done

    break  # break out of string is not valid
    echo two
  '
  echo end func
}
f
