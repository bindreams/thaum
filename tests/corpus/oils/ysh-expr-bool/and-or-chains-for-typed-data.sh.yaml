source: oils:spec/ysh-expr-bool#and-or-chains-for-typed-data
stdout: |-
  s
  None
  x
  y
  y

  42
  0
  42
  0
  0.5
  0.0
  ['a']
  []
  {'d': 1}
  {}
  OR
