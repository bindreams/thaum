name: 'bad mutation through nameref: ref[0]= where ref is array[0]'
dialect: bash
source: oils:spec/nameref#bad-mutation-through-nameref-ref0-where-ref-is-array0
stdout: |
  status=1
  X Y Z
---
array=(X Y Z)
typeset -n ref='array[0]'
ref[0]=foo  # error in bash: 'array[0]': not a valid identifier
echo status=$?
echo ${array[@]}
