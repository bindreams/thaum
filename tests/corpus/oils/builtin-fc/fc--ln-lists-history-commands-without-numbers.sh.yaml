name: fc -ln lists history commands without numbers
dialect: bash
source: oils:spec/builtin-fc#fc--ln-lists-history-commands-without-numbers
stdout: "\t history -r\n\t echo 1\n\t echo 2\n\t echo 3\n^D\n"
---
printf "echo %s\n" {1..3} > tmp

echo '
HISTFILE=tmp
history -c
history -r

fc -ln
' | $SH --norc -i

# match osh's behaviour of echoing ^D for EOF
case $SH in bash) echo '^D' ;; esac
