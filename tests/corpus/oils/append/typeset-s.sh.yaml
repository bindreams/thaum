name: typeset s+=
dialect: bash
source: oils:spec/append#typeset-s
stdout: |-
  s=foo
  t=foo
  t=foofoo
---

typeset s+=foo
echo s=$s

# bash and mksh agree that this does NOT respect set -u.
# I think that's a mistake, but += is a legacy construct, so let's copy it.

set -u

typeset t+=foo
echo t=$t
typeset t+=foo
echo t=$t
