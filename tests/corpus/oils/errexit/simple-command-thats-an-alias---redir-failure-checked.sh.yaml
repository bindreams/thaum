name: simple command that's an alias - redir failure checked
dialect: bash
source: oils:spec/errexit#simple-command-thats-an-alias---redir-failure-checked
stdout: "status=1\n"
---

# bash 5.2 fixed bash 4.4 bug: this is now checked

$SH -c '
shopt -s expand_aliases

set -o errexit
alias zz="{ echo 1; echo 2; }"
zz > /
echo alias status=$?
'
echo status=$?
