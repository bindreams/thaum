name: Exporting a parent func variable (dynamic scope)
dialect: bash
source: oils:spec/builtin-vars#exporting-a-parent-func-variable-dynamic-scope
stdout: "before inner\nNone\ninner: X\nX\nafter inner\nX\n"
setup: |
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py

---
# The algorithm is to walk up the stack and export that one.
inner() {
  export outer_var
  echo "inner: $outer_var"
  printenv.py outer_var
}
outer() {
  local outer_var=X
  echo "before inner"
  printenv.py outer_var
  inner
  echo "after inner"
  printenv.py outer_var
}
outer
