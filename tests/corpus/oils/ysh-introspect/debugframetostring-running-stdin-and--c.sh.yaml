disabled: true
name: DebugFrame.toString() running stdin and -c
dialect: bash
source: oils:spec/ysh-introspect#debugframetostring-running-stdin-and--c
stdout: "  %1 [ stdin ]:1\n    source $[ENV.REPO_ROOT]/spec/testdata/debug-frame-lib.ysh;
  my-proc\n                                                               ^~~~~~~\n\
  \  %2 MYROOT/spec/testdata/debug-frame-lib.ysh:15\n      print-stack\n      ^~~~~~~~~~~\n\
  \n  %1 [ -c flag ]:1\n    source $[ENV.REPO_ROOT]/spec/testdata/debug-frame-lib.ysh;
  my-proc\n                                                               ^~~~~~~\n\
  \  %2 MYROOT/spec/testdata/debug-frame-lib.ysh:15\n      print-stack\n      ^~~~~~~~~~~\n"
---

# stdin
echo 'source $[ENV.REPO_ROOT]/spec/testdata/debug-frame-lib.ysh; my-proc' |
  $[ENV.SH] |
  sed -e "s;$[ENV.REPO_ROOT];MYROOT;g" -e 's;#;%;g'
echo

# -c
$[ENV.SH] -c 'source $[ENV.REPO_ROOT]/spec/testdata/debug-frame-lib.ysh; my-proc' |
  sed -e "s;$[ENV.REPO_ROOT];MYROOT;g" -e 's;#;%;g'
