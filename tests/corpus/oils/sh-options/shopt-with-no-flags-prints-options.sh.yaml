name: shopt with no flags prints options
dialect: bash
source: oils:spec/sh-options#shopt-with-no-flags-prints-options
stdout: |
  2 one.txt
  nullglob
  failglob
  1
environment:
  TMP: /tmp
---
cd $TMP

# print specific options.  OSH does it in a different format.
shopt nullglob failglob > one.txt
wc -l one.txt
grep -o nullglob one.txt
grep -o failglob one.txt

# print all options
shopt | grep nullglob | wc -l
