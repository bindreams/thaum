name: set -o verbose prints unevaluated code
dialect: bash
source: oils:spec/xtrace#set--o-verbose-prints-unevaluated-code
stdout: |-
  foo
  bar
  ## STDERR:
  x=foo
  y=bar
  echo $x
  echo $(echo $y)
  ## OK bash STDERR:
  x=foo
  y=bar
  echo $x
  echo $(echo $y)
---
set -o verbose
x=foo
y=bar
echo $x
echo $(echo $y)
