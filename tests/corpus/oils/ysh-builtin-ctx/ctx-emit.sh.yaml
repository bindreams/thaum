disabled: true
name: ctx emit
dialect: bash
source: oils:spec/ysh-builtin-ctx#ctx-emit
stdout: |
  {
    "flag": [
      {
        "short_name": "-v"
      }
    ]
  }
  {
    "flag": [
      {
        "short_name": "-v"
      },
      {
        "short_name": "-c"
      }
    ]
  }
  {
    "flag": [
      {
        "short_name": "-v"
      },
      {
        "short_name": "-c"
      }
    ]
  }
---
var p = {}
ctx push (p) {
  ctx emit flag ({short_name: '-v'})
  # p => {'flag': [{short_name: '-v'}]}
  json write (p)

  ctx emit flag ({short_name: '-c'})
  # p => {'flag': [{short_name: '-v'}, {short_name: '-c'}]}
  json write (p)
}
json write (p)
