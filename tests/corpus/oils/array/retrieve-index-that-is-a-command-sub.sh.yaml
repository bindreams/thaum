name: Retrieve index that is a command sub
dialect: bash
source: oils:spec/array#retrieve-index-that-is-a-command-sub
stdout: "['2 3']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
a=(1 '2 3')
argv.py "${a[$(echo 1)]}"
