name: \D{%H:%M} for strftime
dialect: bash
source: oils:spec/prompt#dhm-for-strftime
stdout: "matched=0\nmatched=0\n"
---
PS1='foo \D{%H:%M} bar'
echo "${PS1@P}" | egrep -q 'foo [0-9][0-9]:[0-9][0-9] bar'
echo matched=$?

PS1='foo \D{%H:%M:%S} bar'
echo "${PS1@P}" | egrep -q 'foo [0-9][0-9]:[0-9][0-9]:[0-9][0-9] bar'
echo matched=$?
