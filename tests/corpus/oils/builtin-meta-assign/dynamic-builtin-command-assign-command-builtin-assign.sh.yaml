name: dynamic builtin command ASSIGN, command builtin ASSIGN
dialect: bash
source: 
  oils:spec/builtin-meta-assign#dynamic-builtin-command-assign-command-builtin-assign
stdout: "bc=export\nbc=readonly\n--\ncb=export\ncb=readonly\n--\nbce=export\nbcr=readonly\n\
  --\ncbe=export\ncbr=readonly\n"
---
case $SH in dash|ash|zsh) exit ;; esac

b=builtin
c=command
e=export
r=readonly

$b $c export bc=export
echo bc=$bc

$b $c readonly bc=readonly
echo bc=$bc

echo --

$c $b export cb=export
echo cb=$cb

$c $b readonly cb=readonly
echo cb=$cb

echo --

$b $c $e bce=export
echo bce=$bce

$b $c $r bcr=readonly
echo bcr=$bcr

echo --

$c $b $e cbe=export
echo cbe=$cbe

$c $b $r cbr=readonly
echo cbr=$cbr
