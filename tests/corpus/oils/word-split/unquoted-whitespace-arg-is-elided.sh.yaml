name: unquoted whitespace arg is elided
dialect: bash
source: oils:spec/word-split#unquoted-whitespace-arg-is-elided
stdout: |
  ['1', '2']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
space=" "
argv.py 1 $space 2
