name: Strip unicode prefix
dialect: bash
source: oils:spec/var-op-strip#strip-unicode-prefix
stdout: |2-
     -  \n
    2d  0a

     -  \n
    2d  0a

     -  \n
    2d  0a

     -  \n
    2d  0a
  ## BUG dash/mksh/ash STDOUT:
   274   -  \n
    bc  2d  0a

   274   -  \n
    bc  2d  0a

     - 316  \n
    2d  ce  0a

     - 316  \n
    2d  ce  0a
---

show_hex() { od -A n -t c -t x1; }

# NOTE: LANG is set to utf-8.
# ? is a glob that stands for one character

v='μ-'
echo ${v#?} | show_hex
echo
echo ${v##?} | show_hex
echo

v='-μ'
echo ${v%?} | show_hex
echo
echo ${v%%?} | show_hex
