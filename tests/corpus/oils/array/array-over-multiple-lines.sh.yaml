name: array over multiple lines
dialect: bash
source: oils:spec/array#array-over-multiple-lines
status: 0
stdout: |
  ['1', '2 3']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
