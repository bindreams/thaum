name: shopt -s strict:all
dialect: bash
source: oils:spec/sh-options#shopt--s-strictall
stdout: |
  shopt -u strict_arg_parse
  shopt -u strict_argv
  -
  shopt -s strict_arg_parse
  shopt -s strict_argv
  -
  shopt -s strict_arg_parse
  shopt -u strict_argv
  -
---
n=2

show-strict() {
  shopt -p | grep 'strict_' | head -n $n
  echo -
}

show-strict
shopt -s strict:all
show-strict
shopt -u strict_argv
show-strict
