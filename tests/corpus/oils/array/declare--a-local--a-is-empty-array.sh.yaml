name: declare -a / local -a is empty array
dialect: bash
source: oils:spec/array#declare--a-local--a-is-empty-array
stdout: "[]\n['x']\n[]\n['x']\n"
---
declare -a myarray
argv.py "${myarray[@]}"
myarray+=('x')
argv.py "${myarray[@]}"

f() {
  local -a myarray
  argv.py "${myarray[@]}"
  myarray+=('x')
  argv.py "${myarray[@]}"
}
f
