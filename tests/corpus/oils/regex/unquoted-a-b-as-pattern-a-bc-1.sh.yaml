name: unquoted [a  b] as pattern, [a  b|c]
dialect: bash
source: oils:spec/regex#unquoted-a-b-as-pattern-a-bc
stdout: "yes\n[ab]=0\n[a b]=2\nyes\n[a b]=0\n"
---

$SH <<'EOF'
[[ a =~ [ab] ]] && echo yes
EOF
echo "[ab]=$?"

$SH <<'EOF'
[[ a =~ [a b] ]] && echo yes
EOF
echo "[a b]=$?"

$SH <<'EOF'
[[ a =~ ([a b]) ]] && echo yes
EOF
echo "[a b]=$?"
