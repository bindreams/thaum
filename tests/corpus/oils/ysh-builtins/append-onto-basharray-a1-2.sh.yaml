disabled: true
name: append onto BashArray a=(1 2)
dialect: bash
source: oils:spec/ysh-builtins#append-onto-basharray-a1-2
stdout: "['1', '2', '3 4', '5']\n['1', '2', '3 4', '5', '6']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
shopt -s parse_at
a=(1 2)
append '3 4' '5' (a)
argv.py "${a[@]}"

append -- 6 (a)
argv.py "${a[@]}"
