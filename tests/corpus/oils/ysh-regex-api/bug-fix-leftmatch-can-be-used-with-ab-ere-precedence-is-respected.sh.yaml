disabled: true
name: 'Bug fix: leftMatch() can be used with a|b (ERE precedence is respected)'
dialect: bash
source: 
  oils:spec/ysh-regex-api#bug-fix-leftmatch-can-be-used-with-ab-ere-precedence-is-respected
stdout: "(List)   [\"2\",\"2\",null]\n(List)   [\"t\",null,\"t\"]\n\n(List)   [0,\"\
  o\"]\n(List)   [1,\"n\"]\n(List)   [2,\"e\"]\n\n(List)   [0,\"o\"]\n(List)   [1,\"\
  n\"]\n(List)   [2,\"e\"]\n"
---
shopt --set ysh:upgrade

var lines = '''
  one
  2
  three
  '''

proc show-matches(; pattern) {
  var pos = 0
  while (true) {
    var m = lines.leftMatch(pattern, pos=pos)
    #var m = lines.search(pattern, pos=pos)

    if (m is null) {
      return
    }

    #pp test_ ([m.group(0), m.group(1), m.group(2)])
    pp test_ ([pos, m.group(0)])

    setvar pos = m.end(0)
  }
}

# Alternation requires special logic
var p3 = / <capture [0-9] as number> | <capture [a-z] as letter> /
var p4 = / <capture [0-9] as number> | <capture [a-z] as letter> ; ; reg_newline /

var m = lines.leftMatch(p3, pos=3)
assert [m is null]

var m = lines.leftMatch(p3, pos=4)
pp test_ ([m.group(0), m.group(1), m.group(2)])

var m = lines.leftMatch(p3, pos=5)
assert [m is null]

var m = lines.leftMatch(p3, pos=6)
pp test_ ([m.group(0), m.group(1), m.group(2)])

echo
show-matches (p3)

echo
show-matches (p4)
