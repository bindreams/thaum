name: fc -l [first] [last] where first and last are offsets from current command
dialect: bash
source: 
  oils:spec/builtin-fc#fc--l-first-last-where-first-and-last-are-offsets-from-current-command
stdout: "2\t echo 1\n3\t echo 2\n^D\n"
---
printf "echo %s\n" {1..3} > tmp

echo '
HISTFILE=tmp
history -c
history -r

fc -l -3 -2
' | $SH --norc -i

# match osh's behaviour of echoing ^D for EOF
case $SH in bash) echo '^D' ;; esac
