name: getopts doesn't look for flags after args
dialect: bash
source: oils:spec/builtin-getopts#getopts-doesnt-look-for-flags-after-args
stdout: "h=0 c= optind=1 argv=x -h -c y\n"
---
set -- x -h -c y
FLAG_h=0
FLAG_c=''
while getopts "hc:" opt; do
  case $opt in
    h) FLAG_h=1 ;;
    c) FLAG_c="$OPTARG" ;;
  esac
done
shift $(( OPTIND - 1 ))
echo h=$FLAG_h c=$FLAG_c optind=$OPTIND argv=$@
