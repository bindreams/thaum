disabled: true
name: parse_at
dialect: bash
source: oils:spec/ysh-options#parseat
stdout: "['@words']\n['a', 'b c']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
words=(a 'b c')
argv.py @words

shopt -s parse_at
argv.py @words
