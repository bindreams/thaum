name: read -n 4 with backslash + delim
dialect: bash
source: oils:spec/builtin-read#read--n-4-with-backslash-delim
stdout: |
  ['abcd']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
case $SH in zsh) exit 99;; esac  # read -n not implemented

echo $'abc\\\ndefg' | (read -n 4; argv.py "$REPLY")

# mksh and ash implements "-n NUM" as number of bytes.
['abc']
