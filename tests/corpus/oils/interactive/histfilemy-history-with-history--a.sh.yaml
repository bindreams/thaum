name: HISTFILE=my-history with history -a
dialect: bash
source: oils:spec/interactive#histfilemy-history-with-history--a
stdout: "2\n\n-- after shell exit --\necho 1\nhistory -a\necho 2\n"
---

echo 'echo 1' > my-history

# paper over OSH difference by deleting the ^D line
echo 'history -a
echo 2' | HISTFILE=my-history $SH --rcfile /dev/null -i | sed '/\^D/d'

echo
echo '-- after shell exit --'
cat my-history
