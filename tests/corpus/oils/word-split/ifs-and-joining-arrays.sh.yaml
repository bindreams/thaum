name: IFS and joining arrays
dialect: bash
source: oils:spec/word-split#ifs-and-joining-arrays
stdout: "['x', 'y z']\n['x', 'y z']\n['x:y z']\n['x', 'y z']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
IFS=:
set -- x 'y z'
argv.py "$@"
argv.py $@
argv.py "$*"
argv.py $*
