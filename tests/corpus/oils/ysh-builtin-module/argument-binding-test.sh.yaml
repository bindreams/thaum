name: argument binding test
dialect: bash
source: oils:spec/ysh-builtin-module#argument-binding-test
stdout: "(List)   [\"w1\",\"w2\"]\n(List)   [\"w3\",\"w4\"]\n\n(List)   [3,4]\n(List)\
  \   [5,6]\n\n(List)   [7,8]\n(Dict)   {\"n3\":9}\n\n<Command>\n---\n(List)   [\"\
  w1\",\"w2\"]\n(List)   []\n\n(List)   [3,4]\n(List)   []\n\n(List)   [42,43]\n(Dict)\
  \   {\"n3\":9}\n\n<Command>\n"
---
shopt --set ysh:upgrade

use $REPO_ROOT/spec/testdata/module2/util2.ysh

util2 echo-args w1 w2 w3 w4 (3, 4, 5, 6, n1=7, n2=8, n3=9) {
  echo hi
}

echo ---

util2 echo-args w1 w2 (3, 4, n3=9) {
  echo hi
}
