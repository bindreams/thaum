name: typeset -a a[1]=a a[3]=c
dialect: bash
source: oils:spec/assign-deferred#typeset--a-a1a-a3c
stdout: "['x', 'z']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
# declare works the same way in bash, but not mksh.
# spaces are NOT allowed here.
typeset -a a[1*1]=x a[1+2]=z
argv.py "${a[@]}"
