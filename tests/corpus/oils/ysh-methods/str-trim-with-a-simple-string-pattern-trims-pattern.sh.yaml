disabled: true
name: Str => trim*() with a simple string pattern trims pattern
dialect: bash
source: 
  oils:spec/ysh-methods#str-trim-with-a-simple-string-pattern-trims-pattern
status: 0
stdout: |
  "", "", ""
  "   ", "   ", "   "
  "xy", "xy", "xy"
  "yz", "yz", "yz"
  "", "", ""
  "xyz", "xyz", ""
  "xyzxyz", "xyzxyz", "xyz"
---
func test(s, p) { write --sep ', ' --j8 $[s => trimStart(p)] $[s => trimEnd(p)] $[s => trim(p)] }

call test(''         , 'xyz')
call test('   '      , 'xyz')
call test('xy'       , 'xyz')
call test('yz'       , 'xyz')
call test('xyz'      , 'xyz')
call test('xyzxyz'   , 'xyz')
call test('xyzxyzxyz', 'xyz')
