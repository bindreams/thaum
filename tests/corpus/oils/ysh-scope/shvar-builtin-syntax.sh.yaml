disabled: true
name: shvar builtin syntax
dialect: bash
source: oils:spec/ysh-scope#shvar-builtin-syntax
stdout: |-
  status=2
  status=2
  status=2
---
shopt --set ysh:upgrade
shopt --unset errexit

# no block
shvar
echo status=$?

shvar {  # no arg
  true
}
echo status=$?

shvar foo {  # should be name=value
  true
}
echo status=$?
