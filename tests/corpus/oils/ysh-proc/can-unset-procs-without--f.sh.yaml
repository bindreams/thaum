name: can unset procs without -f
dialect: bash
source: oils:spec/ysh-proc#can-unset-procs-without--f
stdout: "bar\nstatus=0\n<Proc>\nstatus=127\n"
---
shopt -s ysh:upgrade

proc foo() {
  echo bar
}

try { foo }
echo status=$[_error.code]

pp test_ (foo)
unset foo
#pp test_ (foo)

try { foo }
echo status=$[_error.code]
