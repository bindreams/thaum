disabled: true
name: runproc
dialect: bash
source: oils:spec/ysh-builtin-meta#runproc
stdout: "f\n1\n2\nstatus=0\np\n3\n4\nstatus=0\nstatus=1\nstatus=2\n"
---
shopt --set parse_proc parse_at

f() {
  write -- f "$@"
}
proc p {
  write -- p @ARGV
}
runproc f 1 2
echo status=$?

runproc p 3 4
echo status=$?

runproc invalid 5 6
echo status=$?

runproc
echo status=$?
