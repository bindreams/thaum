name: declare -A A=() allowed
dialect: bash
source: oils:spec/array-assoc#declare--a-a-allowed
stdout: |-
  len=0
  len=1
  unset len=0
---
set -o nounset
shopt -s strict_arith || true

declare -A ASSOC=()
echo len=${#ASSOC[@]}

# Check that it really can be used like an associative array
ASSOC['k']='32'
echo len=${#ASSOC[@]}

# bash allows a variable to be an associative array AND unset, while OSH
# doesn't
set +o nounset
declare -A u
echo unset len=${#u[@]}
