disabled: true
name: BashAssoc, long
dialect: bash
source: oils:spec/ysh-printing#bashassoc-long
stdout: |-
  (BashAssoc)
  (BashAssoc ['1']='one')
  (BashAssoc ['1']='one' ['two']='2' ['3']='three')
  (BashAssoc
      ['Lorem']='ipsum'
      ['dolor']='sit amet,'
      ['consectetur adipiscing']='elit, sed'
      ['do']='eiusmod.'
  )
---
declare -A assoc_0=()
declare -A assoc_1=([1]=one)
declare -A assoc_3=([1]=one [two]=2 [3]=three)
declare -A assoc_long=([Lorem]=ipsum [dolor]="sit amet," ['consectetur adipiscing']="elit, sed" [do]="eiusmod.")
= assoc_0
= assoc_1
= assoc_3
= assoc_long
