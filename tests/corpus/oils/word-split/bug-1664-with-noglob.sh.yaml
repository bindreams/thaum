name: 'Bug #1664, \\ with noglob'
dialect: bash
source: oils:spec/word-split#bug-1664-with-noglob
stdout: |
  ['[\\]_']
  ['[\\]_']
  noglob
  ['[\\]_']
  ['[\\]_']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

# Note that we're not changing IFS

argv.py [\\]_
argv.py "[\\]_"

# TODO: no difference observed here, go back to original bug

#argv.py [\\_
#argv.py "[\\_"

echo noglob

# repeat cases with -f, noglob
set -f

argv.py [\\]_
argv.py "[\\]_"

