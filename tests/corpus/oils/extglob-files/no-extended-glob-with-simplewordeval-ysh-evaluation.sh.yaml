name: No extended glob with simple_word_eval (YSH evaluation)
dialect: bash
source: 
  oils:spec/extglob-files#no-extended-glob-with-simplewordeval-ysh-evaluation
status: 1
stdout: "\n"
---
shopt -s ysh:all
shopt -s extglob
mkdir -p eg12
cd eg12
touch {foo,bar,spam}.py
builtin write -- x@(fo*|bar).py
builtin write -- @(fo*|bar).py
