name: value.BashArray internal representation - Indexed
dialect: bash
source: oils:spec/array-compat#valuebasharray-internal-representation---indexed
stdout: |
  declare -a z=()
  declare -a z=([0]="b" [1]="c")
  declare -a z=([0]="b" [1]="c" [5]="d")
  declare -a z=([0]="b" [1]="ZZZ" [5]="d")
  declare -a z=([0]="b" [1]="ZZZ" [5]="d" [6]="f" [7]="g")
  declare -a z=([0]="b-mystr" [1]="ZZZ" [5]="d" [6]="f" [7]="g")
  declare -a z=([0]="b-mystr" [1]="ZZZ-append" [5]="d" [6]="f" [7]="g")
  ['keys', '0', '1', '5', '6', '7']
  ['values', 'b-mystr', 'ZZZ-append', 'd', 'f', 'g']
  status=1
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---

case $SH in mksh) exit ;; esac

z=()
declare -a | grep z=

z+=(b c)
declare -a | grep z=

# z[5]= finds the index, or puts it in SORTED order I think
z[5]=d
declare -a | grep z=

z[1]=ZZZ
declare -a | grep z=

# Adds after last index
z+=(f g)
declare -a | grep z=

# This is the equivalent of z[0]+=mystr
z+=-mystr
declare -a | grep z=

z[1]+=-append
declare -a | grep z=

argv.py keys "${!z[@]}"  # 0 1 5 6 7
argv.py values "${z[@]}"

# can't do this conversion
declare -A z
declare -A | grep z=

echo status=$?
