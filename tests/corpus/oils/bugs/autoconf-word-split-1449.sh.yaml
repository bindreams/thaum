name: autoconf word split (#1449)
dialect: bash
source: oils:spec/bugs#autoconf-word-split-1449
stdout: |-
  --- $()
  [-n]
  [my sed command]
  [f1]
  [f2]
  --- backticks
  [-n]
  [my sed command]
  [f1]
  [f2]
  NOT SPLIT
---

mysed() {
  for line in "$@"; do
    echo "[$line]"
  done
}

sedinputs="f1 f2"
sedscript='my sed command'

# Parsed and evaluated correctly: with word_part.EscapedLiteral \"

x=$(eval "mysed -n \"\$sedscript\" $sedinputs")
echo '--- $()'
echo "$x"

# With backticks, the \" gets lost somehow

x=`eval "mysed -n \"\$sedscript\" $sedinputs"`
echo '--- backticks'
echo "$x"


# Test it in a case statement

case `eval "mysed -n \"\$sedscript\" $sedinputs"` in 
  (*'[my sed command]'*)
    echo 'NOT SPLIT'
    ;;
esac
