name: Globbing after splitting
dialect: bash
source: oils:spec/word-eval#globbing-after-splitting
stdout: |
  ['_tmp/foo.hh', '_tmp/bar.gg', '_tmp/foo.gg']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
mkdir -p _tmp
touch _tmp/foo.gg _tmp/bar.gg _tmp/foo.hh
pat='_tmp/*.hh _tmp/*.gg'
argv.py $pat
