disabled: true
name: BashArray, new representation for bash array
dialect: bash
source: oils:spec/ysh-printing#basharray-new-representation-for-bash-array
stdout: |
  (BashArray)
  (BashArray [0]='hello' [5]='5')

  (Dict)  {k: (BashArray)}
  (Dict)  {k: (BashArray [0]='hello' [5]='5')}

  {"type":"BashArray","data":{}}
  {"type":"BashArray","data":{"0":"hello","5":"5"}}

  (Dict)   {"k":{"type":"BashArray","data":{}}}
  (Dict)   {"k":{"type":"BashArray","data":{"0":"hello","5":"5"}}}
---
declare -a empty=()
declare -a array_1=(hello)
array_1[5]=5

pp value (empty)
pp value (array_1)
echo

pp value ({k: empty})
pp value ({k: array_1})
echo

pp test_ (empty)
pp test_ (array_1)
echo

pp test_ ({k: empty})
pp test_ ({k: array_1})
