disabled: true
name: $[expr_sub] in expression mode
dialect: bash
source: oils:spec/ysh-expr-sub#exprsub-in-expression-mode
status: 3
stdout: |
  (Str)   "42"
  (Str)   "3"
  (Str)   "3"
  d = 15
  len(e) = 3
---

# Test that $[...] works in expression mode, not just in command/word mode

# Basic integer expression
var a = $[42]
pp test_ (a)

# Arithmetic expression
var b = $[1 + 2]
pp test_ (b)

# Function call
var arr = [1, 2, 3]
var c = $[len(arr)]
pp test_ (c)

# Nested expression
var d = $[$[5] + $[10]]
echo "d = $d"

# Combined with @[] splice
var items = [10, 20, 30]
var e = @[items]
echo "len(e) = $[len(e)]"

# Error case: list cannot be stringified
var x = $[ [42] ]
