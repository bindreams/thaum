name: interactive shell starts with emacs mode on
dialect: bash
source: oils:spec/sh-options#interactive-shell-starts-with-emacs-mode-on
stdout: |
  non-interactive
  1
  1
  interactive
  0
  1
---
case $SH in dash) exit ;; esac
case $SH in bash|*osh) flag='--rcfile /dev/null' ;; esac

code='test -o emacs; echo $?; test -o vi; echo $?'

echo non-interactive
$SH $flag -c "$code"

echo interactive
$SH $flag -i -c "$code"
