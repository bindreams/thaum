name: history -a
dialect: bash
source: oils:spec/builtin-history#history--a
stdout: |
  1
  HISTFILE=tmp
  echo 1
  history -a
  2
  HISTFILE=tmp
  echo 1
  history -a
  ^D
---
rm -f tmp

echo '
history -c

HISTFILE=tmp
echo 1
history -a
cat tmp

echo 2

cat tmp
' | $SH -i

# match osh's behaviour of echoing ^D for EOF
case $SH in bash) echo '^D' ;; esac
