disabled: true
name: setvar obj.attr = and += and ...
dialect: bash
source: oils:spec/ysh-object#setvar-objattr-and-and
stdout: |-
  (Obj)   ("x":3,"y":4)
  (Obj)   ("x":3,"y":99)
  (Obj)   ("x":3,"y":102)
  (Obj)   ("x":15,"y":102)
---

var rect = Object(null, {x: 3, y: 4})
pp test_ (rect)

setvar rect.y = 99
pp test_ (rect)

setvar rect.y += 3
pp test_ (rect)

setvar rect.x *= 5
pp test_ (rect)
