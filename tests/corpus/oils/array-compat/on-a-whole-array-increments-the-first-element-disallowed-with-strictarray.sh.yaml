name: ++ on a whole array increments the first element (disallowed with 
  strict_array)
dialect: bash
source: 
  oils:spec/array-compat#on-a-whole-array-increments-the-first-element-disallowed-with-strictarray
stdout: "2 10\n"
---
shopt -s strict_array

a=(1 10)
(( a++ ))  # doesn't make sense
echo "${a[@]}"
