name: Arbitrary base 64#a is rejected (unlike in shell arithmetic)
dialect: bash
source: 
  oils:spec/builtin-printf#arbitrary-base-64a-is-rejected-unlike-in-shell-arithmetic
stdout: |
  status=1
---

printf '%d\n' '64#a'
echo status=$?

# bash, dash, and mksh print 64 and return status 1
# zsh and ash print 0 and return status 1
# OSH rejects it completely (prints nothing) and returns status 1
