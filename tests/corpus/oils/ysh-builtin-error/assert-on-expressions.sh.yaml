disabled: true
name: assert on expressions
dialect: bash
source: oils:spec/ysh-builtin-error#assert-on-expressions
stdout: |+
  passed
  code 0

  code 3

  code 3


  code 3

  passed
  code 0

...
---

try {
  $[ENV.SH] -c '
  assert [true]
  echo passed
  '
}
echo code $[_error.code]
echo

try {
  $[ENV.SH] -c '
  func f() { return (false) }

  assert [f()]
  echo "unreachable"
  '
}
echo code $[_error.code]
echo

try {
  $[ENV.SH] -c '
  assert [null]
  echo "unreachable"
  '
}
echo code $[_error.code]
echo

try {
  $[ENV.SH] -c '
  func f() { return (false) }

  assert [true === f()]
  echo "unreachable"
  ' | grep -v '(Bool)'
}
echo code $[_error.code]
echo

try {
  $[ENV.SH] -c '
  assert [42 === 42]
  echo passed
  '
}
echo code $[_error.code]
echo
