name: IFS='x ' incomplete backslash
dialect: bash
source: oils:spec/builtin-read#ifsx-incomplete-backslash
stdout: "['a b']\n['a', 'b']\n['a', 'ax  x    hello']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
echo ' a b \' | (read a; argv.py "$a")
echo ' a b \' | (read a b; argv.py "$a" "$b")
IFS='x '
echo $'a ax  x    \\\nhello' | (read a b; argv.py "$a" "$b")
