name: "%(strftime format)T doesn't respect TZ if not exported"
dialect: bash
source: 
  oils:spec/builtin-printf#strftime-formatt-doesnt-respect-tz-if-not-exported
stdout: |
  not equal
---

# note: this test leaks!  It assumes that /etc/localtime is NOT Portugal.

TZ=Portugal  # NOT exported
localtime=$(printf '%(%Y-%m-%d %H:%M:%S)T\n' 1557978599)

# TZ is respected
export TZ=Portugal
tz=$(printf '%(%Y-%m-%d %H:%M:%S)T\n' 1557978599)

#echo $localtime
#echo $tz

if ! test "$localtime" = "$tz"; then
  echo 'not equal'
fi
