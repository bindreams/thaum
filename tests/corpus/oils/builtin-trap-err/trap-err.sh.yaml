name: trap ERR
dialect: bash
source: oils:spec/builtin-trap-err#trap-err
status: 99
stdout: "A\nerr [x y] 1\nB\nerr [x y] 42\nC\nD\nafter errexit 99\n"
---
err() {
  echo "err [$@] $?"
}
trap 'err x y' ERR 

echo A

false
echo B

( exit 42 )
echo C

trap - ERR  # disable trap

false
echo D

trap 'echo after errexit $?' ERR 

set -o errexit

( exit 99 )
echo E
