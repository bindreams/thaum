name: 'Prefix assignments persist after special builtins, like : (set -o posix)'
dialect: bash
source: 
  oils:spec/builtin-special#prefix-assignments-persist-after-special-builtins-like-set--o-posix
stdout: "foo=bar\nz=\n"
---
case $SH in
  bash) set -o posix ;;
esac

foo=bar :
echo foo=$foo

# Not true when you use 'builtin'
z=Z builtin :
echo z=$Z
