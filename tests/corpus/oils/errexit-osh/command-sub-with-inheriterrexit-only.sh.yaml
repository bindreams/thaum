name: command sub with inherit_errexit only
dialect: bash
source: oils:spec/errexit-osh#command-sub-with-inheriterrexit-only
stdout: |
  zero
  one
  parent status=0
---
set -o errexit
shopt -s inherit_errexit || true
echo zero
echo $(echo one; false; echo two)  # bash/ash keep going
echo parent status=$?
