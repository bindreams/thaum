name: assign and glob
dialect: bash
source: oils:spec/assign#assign-and-glob
stdout: |
  ['*']
  ['*']
environment:
  TMP: /tmp
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
cd $TMP
touch foo=a foo=b
foo=*
argv.py "$foo"
unset foo

export foo=*
argv.py "$foo"
unset foo
