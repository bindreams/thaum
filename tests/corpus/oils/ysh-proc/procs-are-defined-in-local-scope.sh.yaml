disabled: true
name: procs are defined in local scope
dialect: bash
source: oils:spec/ysh-proc#procs-are-defined-in-local-scope
stdout: |2-
      [frame_vars_] __E__ ARGV localproc
---
shopt -s ysh:upgrade

proc gen-proc {
  eval 'proc localproc { echo hi }'
  pp frame_vars_

}

gen-proc

# can't suppress 'grep' failure
if false {
  try {
    pp frame_vars_ | grep localproc
  }
  pp test_ (_pipeline_status)
  #pp test_ (PIPESTATUS)
}
