name: Export existing local variable
dialect: bash
source: oils:spec/builtin-vars#export-existing-local-variable
setup: |-
  #!/bin/sh
  cat > printenv.py <<'HELPER'
  #!/usr/bin/env python3
  import os, sys
  for name in sys.argv[1:]:
      print(os.environ.get(name))
  HELPER
  chmod +x printenv.py
---
f() {
  local L1=local1
  export L1
  printenv.py L1
}
f
printenv.py L1
local1
None
