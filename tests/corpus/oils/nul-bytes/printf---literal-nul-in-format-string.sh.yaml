name: printf - literal NUL in format string
dialect: bash
source: oils:spec/nul-bytes#printf---literal-nul-in-format-string
stdout: |2-
     x
    78
  ---
     x
    78
  ---
---
case $SH in dash|ash) return ;; esac

# Show both printable and hex
show_hex() { od -A n -t c -t x1; }

printf $'x\U0z' | show_hex
echo ---

printf $'x\U00z' | show_hex
echo ---

printf $'\U0z' | show_hex
