name: Assignment doesn't do word splitting
dialect: bash
source: oils:spec/assign#assignment-doesnt-do-word-splitting
stdout: "['one two']\n"
setup: |
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py

---
words='one two'
a=$words
argv.py "$a"
