name: Eval in does tilde expansion
dialect: bash
source: oils:spec/builtin-eval-source#eval-in-does-tilde-expansion
stdout: |
  FALSE
  FALSE
  TRUE
---

x="~"
eval y="$x"  # scalar
test "$x" = "$y" || echo FALSE
[[ $x == /* ]] || echo FALSE  # doesn't start with /
[[ $y == /* ]] && echo TRUE

#argv "$x" "$y"
