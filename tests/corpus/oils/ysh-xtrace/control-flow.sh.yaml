disabled: true
name: Control Flow
dialect: bash
source: oils:spec/ysh-xtrace#control-flow
stdout: |
  1
  2
  a y
  a z
  b y
  b z
stderr: |-
  . builtin echo 1
  . builtin echo 2
  + break 1
  . builtin echo a y
  + continue 1
  . builtin echo a z
  . builtin echo b y
  + continue 1
  . builtin echo b z
  > proc zero
    + return 0
  < proc zero
---
shopt --set ysh:upgrade
set -x

for i in 1 2 3 {
  echo $i
  if (i === '2') {
    break
  }
}

for j in a b {
  for k in y z {
    echo $j $k
    if (k === 'y') {
      continue
    }
  }
}

proc zero {
  return 0
}

proc one {
  return 1
}

zero
# one
