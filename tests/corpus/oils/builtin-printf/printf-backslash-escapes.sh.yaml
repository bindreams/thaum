name: printf backslash escapes
dialect: bash
source: oils:spec/builtin-printf#printf-backslash-escapes
stdout: |
  ['a\tb']
  ['\xe2\x98\xa0']
  ['$e']
  ['\x1f7']
setup: |-
  #!/bin/sh
  cat > argv.py <<'HELPER'
  #!/usr/bin/env python3
  import sys
  print(sys.argv[1:])
  HELPER
  chmod +x argv.py
---
argv.py "$(printf 'a\tb')"
argv.py "$(printf '\xE2\x98\xA0')"
argv.py "$(printf '\044e')"
argv.py "$(printf '\0377')"  # out of range
