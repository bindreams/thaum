name: static builtin command ASSIGN, command builtin ASSIGN
dialect: bash
source: 
  oils:spec/builtin-meta-assign#static-builtin-command-assign-command-builtin-assign
stdout: |
  bc=export
  bc=readonly
  --
  cb=export
  cb=readonly
---
case $SH in dash|ash|zsh) exit ;; esac

# dash doesn't have declare typeset

builtin command export bc=export
echo bc=$bc

builtin command readonly bc=readonly
echo bc=$bc

echo --

command builtin export cb=export
echo cb=$cb

command builtin readonly cb=readonly
echo cb=$cb
