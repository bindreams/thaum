disabled: true
name: Two here docs
dialect: bash
source: oils:spec/ysh-xtrace#two-here-docs
stdout: "yy\nxx\nzz\n"
stderr: "| command 12345: tac - /dev/fd/3\n; process 12345: status 0\n. builtin set
  '+x'\n"
---

# BUG: This trace shows an extra process?

shopt --set ysh:upgrade
shopt --unset errexit
set -x

{
  tac - /dev/fd/3 <<EOF 3<<EOF2
xx
yy
EOF
zz
EOF2

  set +x
} 2>err.txt

sed --regexp-extended 's/[[:digit:]]{2,}/12345/g' err.txt >&2
