name: Proc with ... "rest" word params
dialect: bash
source: oils:spec/ysh-proc#proc-with-rest-word-params
stdout: "names:\na\nb\nc\nstatus=0\n"
---

# TODO: opts goes with this
# var opt = grep_opts.parse(ARGV)
