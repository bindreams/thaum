name: Mutable variables are frozen - beware!
dialect: bash
source: oils:spec/ysh-builtin-module#mutable-variables-are-frozen---beware
stdout: "[for-xtrace]\ncounter = 5\ncounter = 6\n(Int)   6\ncounter = 7\n(Int)   6\n\
  counter = 8\n"
---

shopt --set ysh:upgrade

use $REPO_ROOT/spec/testdata/module2/for-xtrace.ysh

for-xtrace increment

var mod = getVar('for-xtrace')
pp test_ (mod.counter)

for-xtrace increment

pp test_ (mod.counter)

for-xtrace increment
